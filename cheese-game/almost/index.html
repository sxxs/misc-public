<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Almost.</title>
    <meta name="description" content="Mach ein Foto. Verfehl das Ziel knapp. Versuch's nochmal.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f5f5f5">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
        html, body, #root { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; background: #0a0a0a; color: #f0f0f0; }
        video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .safe-bottom { padding-bottom: max(1.5rem, env(safe-area-inset-bottom)); }
        .safe-top { padding-top: max(1rem, env(safe-area-inset-top)); }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes ringFill {
            from { stroke-dashoffset: 283; }
        }
        .fade-up { animation: fadeUp 0.3s ease-out; }
        .ring-animate { animation: ringFill 0.9s ease-out forwards; }
        @keyframes pulse-ring {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.5; }
        }
        .pulse { animation: pulse-ring 1.5s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>const APP_VERSION = '0.3.0';</script>
    <script src="challenges.js?v=0.3.0"></script>
    <script src="analysis.js?v=0.3.0"></script>
    <script type="text/babel" src="game.js?v=0.3.0"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(console.warn);
        }
    </script>
</body>
</html>
