<style>
:root{
  --glaze:#0F3239;        /* dunkle Glasur, Hintergrund */
  --tile:#164751;         /* Kachelfläche */
  --tile-hi:#1D5C68;      /* Kachel hell */
  --grout:#E9E2D3;        /* Fuge */
  --chalk:#F3EEE2;        /* Text hell */
  --mustard:#E3A72F;      /* Akzent: gern */
  --tomato:#C9452F;       /* Akzent: nie */
  --sage:#8FAE93;         /* Akzent: unbekannt */

  --r:3px;
  --disp:"Archivo Black","Arial Black",system-ui,sans-serif;
  --body:"Archivo","Helvetica Neue",system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--glaze);
  color:var(--chalk);
  font-family:var(--body);
  font-size:16px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  padding:0 0 64px;
}
/* Fugenraster im Hintergrund */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--grout) 1px,transparent 1px),linear-gradient(90deg,var(--grout) 1px,transparent 1px);
  background-size:56px 56px;opacity:.045;
}
.wrap{position:relative;z-index:1;max-width:840px;margin:0 auto;padding:0 20px}
header{padding:40px 0 28px;border-bottom:1px solid rgba(233,226,211,.16);margin-bottom:28px}
h1{font-family:var(--disp);font-size:clamp(34px,7vw,58px);line-height:.95;margin:0 0 10px;letter-spacing:-.02em}
h1 em{font-style:normal;color:var(--mustard)}
.sub{color:var(--dim);max-width:52ch;font-size:15px;margin:0}
h2{font-family:var(--disp);font-size:19px;letter-spacing:.01em;margin:34px 0 12px}
h3{font-family:var(--disp);font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--mustard);margin:26px 0 10px}
p{margin:0 0 12px}
.muted{color:var(--dim);font-size:14px}

nav.tabs{display:flex;gap:2px;margin-bottom:26px;flex-wrap:wrap}
nav.tabs button{
  font-family:var(--body);font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;
  background:var(--tile);color:var(--dim);border:0;border-radius:var(--r);
  padding:11px 15px;cursor:pointer;transition:background .15s,color .15s;
}
nav.tabs button:hover{background:var(--tile-hi);color:var(--chalk)}
nav.tabs button[aria-selected="true"]{background:var(--mustard);color:#12262B}

/* Personen-Kacheln */
.people{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:2px}
.person{
  background:var(--tile);border:0;border-radius:var(--r);color:var(--chalk);
  padding:20px 16px 16px;text-align:left;cursor:pointer;font-family:var(--body);
  transition:background .15s, transform .15s;
}
.person:hover{background:var(--tile-hi)}
.person .nm{font-family:var(--disp);font-size:22px;display:block;margin-bottom:8px}
.bar{height:5px;background:rgba(243,238,226,.14);border-radius:99px;overflow:hidden;margin:8px 0 6px}
.bar i{display:block;height:100%;background:var(--mustard);transition:width .3s}
.person .st{font-size:12px;color:var(--dim);letter-spacing:.03em}

/* Sichtungskarte */
.card{
  background:var(--tile);border-radius:var(--r);padding:34px 26px;text-align:center;
  min-height:190px;display:flex;flex-direction:column;justify-content:center;align-items:center;
}
.card .dish{font-family:var(--disp);font-size:clamp(24px,5.2vw,36px);line-height:1.1;margin:0 0 14px;max-width:16ch}
.chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.chip{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);border:1px solid rgba(243,238,226,.2);padding:3px 8px;border-radius:99px}
.answers{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:2px}
.answers button{
  border:0;border-radius:var(--r);padding:18px 6px;cursor:pointer;font-family:var(--body);
  font-weight:700;font-size:13px;letter-spacing:.03em;background:var(--tile);color:var(--chalk);
  transition:background .12s,color .12s;line-height:1.3;
}
.answers button span{display:block;font-size:22px;margin-bottom:4px;font-weight:400}
.answers button:hover{background:var(--tile-hi)}
.a-gern:hover{background:var(--mustard)!important;color:#12262B!important}
.a-nie:hover{background:var(--tomato)!important}
.a-neu:hover{background:var(--sage)!important;color:#12262B!important}
.progress{display:flex;justify-content:space-between;align-items:center;margin:18px 0 10px;font-size:13px;color:var(--dim)}

/* Duell */
.duel{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.duel button{
  background:var(--tile);border:0;border-radius:var(--r);color:var(--chalk);cursor:pointer;
  padding:38px 18px;font-family:var(--disp);font-size:clamp(17px,3.4vw,23px);line-height:1.15;
  transition:background .12s,color .12s;
}

.vs{text-align:center;font-family:var(--disp);color:var(--dim);font-size:12px;letter-spacing:.3em;margin:10px 0}

/* Ergebnisliste */
ol.rank{list-style:none;margin:0;padding:0;counter-reset:r}
ol.rank li{
  counter-increment:r;display:grid;grid-template-columns:38px 1fr auto;gap:12px;align-items:center;
  background:var(--tile);border-radius:var(--r);padding:12px 14px;margin-bottom:2px;
}
ol.rank li::before{content:counter(r);font-family:var(--disp);color:var(--mustard);font-size:15px}

ol.rank .meta{font-size:12px;color:var(--dim);margin-top:2px}
.faces{display:flex;gap:3px}
.face{width:22px;height:22px;border-radius:2px;display:grid;place-items:center;font-size:10px;font-weight:700;color:#12262B;background:rgba(243,238,226,.16)}
.f-gern{background:var(--mustard)}
.f-ok{background:rgba(243,238,226,.42)}
.f-neu{background:var(--sage)}

.veto{display:flex;flex-wrap:wrap;gap:2px}
.veto span{background:rgba(201,69,47,.16);color:rgba(243,238,226,.7);border-radius:var(--r);padding:6px 10px;font-size:13px}

/* Wochenplan */
.plan{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:2px}
.slot{background:var(--tile);border-radius:var(--r);padding:16px 14px;min-height:118px;display:flex;flex-direction:column}
.slot .day{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mustard);margin-bottom:8px}
.slot .dish{font-family:var(--disp);font-size:16px;line-height:1.15;margin-bottom:auto}
.slot .tag{font-size:11px;color:var(--dim);margin-top:10px;letter-spacing:.03em}
.slot.exp{background:var(--tile-hi);outline:1px solid var(--sage)}

.btn{
  font-family:var(--body);font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;
  background:var(--mustard);color:#12262B;border:0;border-radius:var(--r);padding:13px 20px;cursor:pointer;
}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:var(--tile);color:var(--chalk)}
.btn.ghost:hover{background:var(--tile-hi)}
.row{display:flex;gap:2px;flex-wrap:wrap;margin:16px 0}
.notice{background:var(--mustard);color:#12262B;border-radius:var(--r);padding:11px 14px;font-weight:600;font-size:14px;margin-bottom:16px}
.codetext{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;word-break:break-all;color:var(--dim);margin:14px 0 0;line-height:1.6}
textarea.code{width:100%;background:var(--tile);color:var(--chalk);border:0;border-radius:var(--r);padding:14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;resize:vertical}
textarea.code::placeholder{color:var(--dim)}
.empty{background:var(--tile);border-radius:var(--r);padding:26px;color:var(--dim);font-size:15px}
/* Wochenplan: Tauschen, Pinnen, Brotzeit-Toggle, Einkaufsliste */
.slot .slotrow{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.slot .swap{align-self:flex-start;background:rgba(243,238,226,.08);border:0;border-radius:var(--r);color:var(--dim);font-family:var(--body);font-size:12px;padding:6px 10px;cursor:pointer;transition:background .15s,color .15s}
.slot .swap:hover{background:var(--tile-hi);color:var(--chalk)}
.slot.pinned{outline:1px solid var(--mustard)}
.slot.pinned .pin{background:var(--mustard);color:#12262B}
.shop{margin:0 0 12px;padding-left:22px;columns:2;column-gap:24px}
.shop li{margin-bottom:6px;font-size:14px;break-inside:avoid}
@media(max-width:520px){.shop{columns:1}}
.toggle{display:flex;gap:10px;align-items:center;background:var(--tile);border-radius:var(--r);padding:12px 14px;margin:0 0 12px;font-size:14px;cursor:pointer}
.toggle input{width:18px;height:18px;accent-color:var(--mustard);flex-shrink:0}
.toggle b{color:var(--mustard);font-weight:600}
/* Was ist das? */
.what{font-size:14px;color:var(--dim);margin:6px 0 0;line-height:1.4}
.what b{color:var(--sage);font-weight:600}
/* Übertragen: Ablauf-Schritte */
.steps{margin:0 0 10px;padding-left:22px}
.steps li{margin-bottom:10px;font-size:14px;line-height:1.5;color:var(--chalk)}
.steps b{color:var(--mustard);font-weight:600}
/* Revidier-Liste */
.searchbox{width:100%;background:var(--tile);border:0;border-radius:var(--r);color:var(--chalk);padding:12px 14px;font-family:var(--body);font-size:16px;margin:14px 0 4px}
.searchbox::placeholder{color:var(--dim)}
.rev{display:flex;align-items:center;flex-wrap:wrap;gap:6px 10px;background:var(--tile);border-radius:var(--r);padding:8px 12px;margin-bottom:2px}
.rev .nm{flex:1 1 160px;font-size:14px}
.rev .mini{display:flex;gap:4px}
.rev .mini button{width:44px;height:44px;border:0;border-radius:var(--r);background:rgba(243,238,226,.08);color:var(--dim);cursor:pointer;font-size:16px;font-family:var(--body)}
.rev .mini button:hover{background:var(--tile-hi);color:var(--chalk)}
.rev .mini button.on-gern{background:var(--mustard);color:#12262B}
.rev .mini button.on-ok{background:var(--tile-hi);color:var(--chalk)}
.rev .mini button.on-nie{background:var(--tomato);color:#fff}
.rev .mini button.on-neu{background:var(--sage);color:#12262B}
button:focus-visible,.person:focus-visible{outline:2px solid var(--mustard);outline-offset:2px}
@media (max-width:520px){
  .answers{grid-template-columns:repeat(2,1fr)}
  .duel{grid-template-columns:1fr}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}

<body>
<div class="wrap">
<header>
  <h1>Was gibt's<em>?</em></h1>
  <p class="sub">Jeder sichtet die Gerichteliste einmal durch, dann entscheidet die Familie – und nicht der Kühlschrank um 18 Uhr.</p>
</header>
<nav class="tabs" id="tabs"></nav>
<main id="view"></main>
</div>

<script>
/* ---------- Daten ---------- */
// b = Basis, p = Protein, e = Aufwand 0-3 (0 = wird geliefert), t = Tags,
// w = kindgerechte Erklärung ("Was ist das?"), z = Hauptzutaten (Einkaufsliste)
// Die Gerichteliste liegt in dishes.json (siehe README: nur ans Ende anfügen,
// nie mittendrin einfügen oder löschen; ausmustern per "aus": true).
let DALL=[];   // alle Gerichte, Position = feste id (auch ausgemusterte)
let D=[];      // nur aktive Gerichte, überall in der Oberfläche verwendet
async function loadDishes(){
  const res=await fetch("dishes.json",{cache:"no-cache"});
  if(!res.ok) throw new Error("HTTP "+res.status);
  DALL=(await res.json()).map((d,i)=>({id:i,t:[],...d}));
  D=DALL.filter(d=>!d.aus);
}

const PEOPLE=[
  {id:"felix",name:"Felix"},
  {id:"jakob",name:"Jakob"},
  {id:"moritz",name:"Moritz"},
  {id:"kathrin",name:"Kathrin"},
  {id:"dominik",name:"Dominik"}
];

// Vorbelegte Vetos aus dem, was ihr schon wisst – spart 30 Klicks pro Kind.
const SEED_NIE={
  felix:d=>d.p==="huhn"||d.p==="fisch",
  moritz:d=>d.p==="fisch"||d.t.includes("sushi")||d.t.includes("steak"),
  jakob:()=>false,
  kathrin:()=>false,
  dominik:()=>false
};
const SEED_GERN={
  felix:["Pulled-Pork-Burger","Cheeseburger selbst gemacht","Pommes mit drei Dips","Käsebrot mit Gurke und Karotte","Gurken-Avocado-Maki","Nudeln mit Hackfleischsauce","Flammkuchen klassisch","Kaiserschmarren mit Apfelmus","Wraps mit Gurke und Tomate","Spätzle mit Rahmsauce"],
  jakob:["Lachs-Nigiri und -Maki","Rumpsteak mit Kräuterbutter","Nudeln mit Hackfleischsauce","Pizza Margherita","Flammkuchen klassisch","Kaiserschmarren mit Apfelmus","Apfelstrudel mit Vanillesauce","Wraps mit Hackfleisch und Gemüse","Spätzle mit Rahmsauce"],
  moritz:["Knusperhähnchen mit Pommes","Nudeln mit Tomatensauce","Pizza Margherita","Pommes mit drei Dips","Dampfnudeln mit Vanillesauce","Kaiserschmarren mit Apfelmus","Wraps mit Gurke und Tomate","Spätzle mit Rahmsauce"],
  kathrin:[],
  dominik:[]
};

/* ---------- Zustand ---------- */
const KEY="wasgibts:v2";
let S={ratings:{},elo:{},duels:{}};   // ratings[pid][did] = 'gern'|'ok'|'nie'|'neu'
let tab="start", who=null, mem={}, note="", reviewList=false, bestWho="alle";
let draft=null; // Wochenplan-Entwurf: [{id,pin}|null x9], lebt bis zum Übernehmen/Neuladen

function fresh(){
  S.paused=S.paused||{};   // global pausierte Gerichte (Gerät fehlt o.ä.), id -> true
  S.dcnt=S.dcnt||{};       // Duelle pro Person und Gericht (Gerät-lokal, nicht im Code)
  S.history=S.history||[]; // Gericht-IDs der letzten übernommenen Wochenpläne
  PEOPLE.forEach(p=>{
    S.ratings[p.id]=S.ratings[p.id]||{};
    S.elo[p.id]=S.elo[p.id]||{};
    S.dcnt[p.id]=S.dcnt[p.id]||{};
    S.duels[p.id]=S.duels[p.id]||0;
    D.forEach(d=>{
      if(S.ratings[p.id][d.id]) return;
      if(SEED_NIE[p.id](d)) S.ratings[p.id][d.id]="nie";
      else if(SEED_GERN[p.id].includes(d.n)) S.ratings[p.id][d.id]="gern";
    });
  });
}
/* Persistenz: localStorage, mit In-Memory-Rückfallebene falls der Browser
   sie blockiert (Privatmodus, eingebettetes iframe ohne Storage Access). */
let canStore=(()=>{try{localStorage.setItem("__t","1");localStorage.removeItem("__t");return true;}catch(e){return false;}})();
function load(){
  const raw = canStore ? localStorage.getItem(KEY) : mem[KEY];
  if(raw){ try{ S=JSON.parse(raw); }catch(e){} }
  if(S.ratings&&S.ratings.eltern){ // Migration: bis v1.1 gab es "Eltern" als gemeinsame Person
    ["kathrin","dominik"].forEach(pid=>{
      if(!S.ratings[pid]||!Object.keys(S.ratings[pid]).length) S.ratings[pid]={...S.ratings.eltern};
      if(!S.elo[pid]) S.elo[pid]={...(S.elo.eltern||{})};
      if(S.duels[pid]===undefined) S.duels[pid]=S.duels.eltern||0;
    });
    delete S.ratings.eltern; delete S.elo.eltern; delete S.duels.eltern;
  }
  fresh();
  if(typeof S.seen==="number" && DALL.length>S.seen){
    const n=DALL.length-S.seen;
    note=n+(n===1?" neues Gericht":" neue Gerichte")+" in der Liste – sie tauchen bei der Sichtung automatisch auf.";
  }
  S.seen=DALL.length; save();
  importFromHash();
}
function save(){
  const v=JSON.stringify(S); mem[KEY]=v;
  if(canStore){ try{ localStorage.setItem(KEY,v); }catch(e){ canStore=false; } }
}

/* ---------- Übertragung: Zustand als kurzer Code ---------- */
const B64="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_";
const ST=[null,"gern","ok","nie","neu"];
/* Format v3: statt eines Listen-Hashs steht die Gerichtezahl im Code. Die Liste
   darf dadurch wachsen (nur ans Ende anfügen!): ein Code von einer älteren,
   kürzeren Liste bleibt lesbar, die neuen Gerichte sind einfach unbewertet. */
/* Personen-Code: eine Person. Familien-Code (Personen-Index 7): alle Personen in
   einem Code – damit wandert der Gesamtstand vom Tablet zurück auf alle Geräte. */
function bitsPerson(push,pid){
  push(Math.min(S.duels[pid]||0,63),6);
  DALL.forEach(d=>push(ST.indexOf(S.ratings[pid][d.id]||null),3));
  const top=[...D].sort((a,b)=>(S.elo[pid][b.id]||1000)-(S.elo[pid][a.id]||1000)).slice(0,8);
  for(let i=0;i<8;i++) push(top[i]?top[i].id:511,9);
}
function toB64(bits){
  while(bits.length%6) bits.push(0);
  let out="";
  for(let i=0;i<bits.length;i+=6){ let v=0; for(let j=0;j<6;j++) v=v*2+bits[i+j]; out+=B64[v]; }
  return out;
}
function encode(pid){
  const pi=PEOPLE.findIndex(p=>p.id===pid);
  const bits=[];
  const push=(v,n)=>{ for(let i=n-1;i>=0;i--) bits.push((v>>i)&1); };
  push(3,4); push(pi,3); push(DALL.length,9);
  bitsPerson(push,pid);
  return toB64(bits);
}
function encodeFamily(){
  const bits=[];
  const push=(v,n)=>{ for(let i=n-1;i>=0;i--) bits.push((v>>i)&1); };
  push(3,4); push(7,3); push(DALL.length,9); push(PEOPLE.length,3);
  PEOPLE.forEach(p=>bitsPerson(push,p.id));
  // Pausierte Gerichte hinten anhängen. Alte Decoder ignorieren die Extra-Bits,
  // alte Codes lesen hier nur Null-Padding und ergeben 0 pausierte Gerichte.
  const paused=Object.keys(S.paused||{}).filter(id=>S.paused[id]&&DALL[id]).slice(0,511);
  push(paused.length,9);
  paused.forEach(id=>push(+id,9));
  return toB64(bits);
}
function decode(code){
  code=code.trim().replace(/\s+/g,"");
  const bits=[];
  for(const c of code){ const v=B64.indexOf(c); if(v<0) throw new Error("Der Code enthält ungültige Zeichen."); for(let i=5;i>=0;i--) bits.push((v>>i)&1); }
  let k=0; const take=n=>{ let v=0; for(let i=0;i<n;i++) v=v*2+(bits[k++]||0); return v; };
  if(take(4)!==3) throw new Error("Der Code stammt aus einer anderen Version der App. Auf beiden Geräten die Seite neu laden, Code neu erzeugen.");
  const pi=take(3), n=take(9);
  if(n>DALL.length) throw new Error("Der Code stammt von einer neueren Gerichteliste. Dieses Gerät erst neu laden, dann einlesen.");
  const takePerson=()=>{
    const du=take(6), r={};
    for(let i=0;i<n;i++){ const v=take(3); if(ST[v]) r[i]=ST[v]; }
    const elo={}; for(let i=0;i<8;i++){ const id=take(9); if(DALL[id]&&!DALL[id].aus) elo[id]=1200-i*25; }
    return {ratings:r,elo,duels:du};
  };
  if(pi===7){
    const pc=take(3);
    if(pc!==PEOPLE.length) throw new Error("Der Familien-Code passt nicht zur Personenliste dieser Version.");
    const people=PEOPLE.map(p=>({pid:p.id,...takePerson()}));
    const paused={}, pn=take(9);
    for(let i=0;i<pn;i++){ const id=take(9); if(DALL[id]) paused[id]=true; }
    return {family:true,n,people,paused};
  }
  if(!PEOPLE[pi]) throw new Error("Unbekannte Person im Code.");
  return {family:false,n,pid:PEOPLE[pi].id,...takePerson()};
}
function applyCode(code){
  const p=decode(code);
  (p.family?p.people:[p]).forEach(q=>{
    const mine=S.ratings[q.pid]||{};
    // Nur Gerichte anfassen, die der Code kennt; danach ergänzte behalten ihren Stand.
    for(let i=0;i<p.n;i++){ if(q.ratings[i]) mine[i]=q.ratings[i]; else delete mine[i]; }
    S.ratings[q.pid]=mine; S.elo[q.pid]=q.elo; S.duels[q.pid]=q.duels;
  });
  if(p.family) S.paused=p.paused||{};
  fresh(); save();
  return p.family?"Familien-Code, alle Personen":PEOPLE.find(x=>x.id===p.pid).name;
}
function importFromHash(){
  const h=location.hash.replace(/^#c=/,"");
  if(!h||h===location.hash) return;
  try{ note="Eingelesen: "+applyCode(h); }
  catch(e){ note="Konnte nicht einlesen: "+e.message; }
  history.replaceState(null,"",location.pathname+location.search);
}

/* ---------- Hilfen ---------- */
function shuffled(pid){
  // stabile Reihenfolge pro Person
  let seed=[...pid].reduce((a,c)=>a+c.charCodeAt(0),7);
  const rnd=()=>{seed=(seed*1103515245+12345)%2147483648;return seed/2147483648;};
  return [...D].map(d=>[rnd(),d]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);
}
const rated=pid=>D.filter(d=>S.ratings[pid][d.id]).length;
const queue=pid=>shuffled(pid).filter(d=>!S.ratings[pid][d.id]);
const el=(h)=>{const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild;};
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;");
const BASE={nudeln:"Nudeln",spaetzle:"Spätzle",teig:"Teig",brot:"Brot",kartoffel:"Kartoffel",reis:"Reis",suppe:"Suppe",suess:"Süßspeise",sonst:"Ohne feste Basis"};

function analyse(){
  const kids=["felix","jakob","moritz"];
  return D.map(d=>{
    const r={},pts=[];
    PEOPLE.forEach(p=>{
      const v=S.ratings[p.id][d.id]||null; r[p.id]=v;
      if(v==="gern")pts.push(2); else if(v==="ok")pts.push(1); else if(v==="neu")pts.push(.5); else if(v==="nie")pts.push(-99);
    });
    const veto=PEOPLE.filter(p=>r[p.id]==="nie").map(p=>p.name);
    const scored=pts.filter(x=>x>-90);
    const sum=scored.reduce((a,b)=>a+b,0);
    const min=scored.length?Math.min(...scored):0;
    const elo=PEOPLE.reduce((a,p)=>a+((S.elo[p.id][d.id]||1000)-1000),0)/400;
    const neu=kids.some(k=>r[k]==="neu")&&!veto.length;
    return {d,r,veto,sum:sum+elo,min,neu,done:PEOPLE.filter(p=>r[p.id]).length};
  });
}

/* ---------- Ansichten ---------- */
function render(){
  const tabs=document.getElementById("tabs");
  const T=[["start","Wer ist dran"],["sichten","Sichtung"],["duell","Turnier"],["teilen","Übertragen"],["ergebnis","Ergebnis"],["plan","Wochenplan"]];
  tabs.innerHTML="";
  T.forEach(([k,l])=>{
    const b=el(`<button role="tab" aria-selected="${tab===k}">${l}</button>`);
    b.onclick=()=>{tab=k;reviewList=false;render();};
    tabs.appendChild(b);
  });
  const v=document.getElementById("view"); v.innerHTML="";
  if(note){const b=el(`<div class="notice">${esc(note)}</div>`);v.appendChild(b);note="";}
  ({start:vStart,sichten:vSichten,duell:vDuell,teilen:vTeilen,ergebnis:vErgebnis,plan:vPlan})[tab](v);
}

function vStart(v){
  v.appendChild(el(`<p class="muted">Jeder geht die ${D.length} Gerichte einmal durch und sagt bei jedem: gern, geht so, nie, oder kenn ich nicht. Was ihr schon sicher wisst, ist vorbelegt. Meinung geändert? Unter „Sichtung“ lässt sich jede Bewertung nachträglich umstellen.</p>`));
  const g=el(`<div class="people"></div>`);
  PEOPLE.forEach(p=>{
    const n=rated(p.id), pc=Math.round(n/D.length*100);
    const gern=D.filter(d=>S.ratings[p.id][d.id]==="gern").length;
    const rem=Math.max(0,Math.min(30,gern)-(S.duels[p.id]||0));
    const hint=n<D.length?"":rem>0?` · noch ~${rem} Duelle empfohlen`:" · Ranking stabil";
    const b=el(`<button class="person"><span class="nm">${p.name}</span><div class="bar"><i style="width:${pc}%"></i></div><span class="st">${n} von ${D.length} · ${S.duels[p.id]||0} Duelle${hint}</span></button>`);
    b.onclick=()=>{who=p.id;reviewList=false;tab=n<D.length?"sichten":"duell";render();};
    g.appendChild(b);
  });
  v.appendChild(g);
  const row=el(`<div class="row"></div>`);
  const rst=el(`<button class="btn ghost">Alles zurücksetzen</button>`);
  rst.onclick=()=>{if(confirm("Alle Bewertungen löschen?")){S={ratings:{},elo:{},duels:{}};fresh();save();render();}};
  row.appendChild(rst); v.appendChild(row);
}

function vSichten(v){
  if(!who){v.appendChild(el(`<div class="empty">Wähle oben unter „Wer ist dran“ aus, wer gerade sichtet.</div>`));return;}
  if(reviewList){vRevidieren(v);return;}
  const q=queue(who), p=PEOPLE.find(x=>x.id===who);
  if(!q.length){
    v.appendChild(el(`<div class="empty">${p.name} ist durch – alle ${D.length} bewertet. Weiter zum Turnier.</div>`));
    const b=el(`<div class="row"><button class="btn">Zum Turnier</button><button class="btn ghost">Bewertungen ändern</button></div>`);
    b.children[0].onclick=()=>{tab="duell";render();};
    b.children[1].onclick=()=>{reviewList=true;render();};
    v.appendChild(b); return;
  }
  const d=q[0], done=D.length-q.length;
  v.appendChild(el(`<div class="progress"><span>${p.name}</span><span>${done} von ${D.length}</span></div>`));
  v.appendChild(el(`<div class="bar"><i style="width:${done/D.length*100}%"></i></div>`));
  const chips=[BASE[d.b],d.e?"Aufwand "+"●".repeat(d.e):"wird geliefert"].concat(d.t.includes("bauteil")?["zum Selbstbauen"]:[]);
  v.appendChild(el(`<div class="card" style="margin-top:16px"><p class="dish">${esc(d.n)}</p>${d.w?`<p class="what"><b>Was ist das?</b> ${esc(d.w)}</p>`:""}<div class="chips">${chips.map(c=>`<span class="chip">${c}</span>`).join("")}</div></div>`));
  const a=el(`<div class="answers">
    <button class="a-gern"><span>★</span>Gern</button>
    <button><span>~</span>Geht so</button>
    <button class="a-nie"><span>✕</span>Nie</button>
    <button class="a-neu"><span>?</span>Kenn ich nicht</button></div>`);
  ["gern","ok","nie","neu"].forEach((val,i)=>{
    a.children[i].onclick=()=>{
      S.ratings[who][d.id]=val;
      if(val!=="gern"){ delete S.elo[who][d.id]; delete S.dcnt[who][d.id]; }
      save();render();
    };
  });
  v.appendChild(a);
  const back=el(`<div class="row"><button class="btn ghost">Letzte Antwort ändern</button><button class="btn ghost">Alle Bewertungen ansehen</button><button class="btn ghost">Pause, anderer ist dran</button></div>`);
  back.children[0].onclick=()=>{
    const order=shuffled(who), prev=order.slice(0,order.indexOf(d)).reverse().find(x=>S.ratings[who][x.id]);
    if(prev){delete S.ratings[who][prev.id];save();render();}
  };
  back.children[1].onclick=()=>{reviewList=true;render();};
  back.children[2].onclick=()=>{who=null;tab="start";render();};
  v.appendChild(back);
}

/* Alle Bewertungen einer Person ansehen und einzeln umstellen */
function vRevidieren(v){
  const p=PEOPLE.find(x=>x.id===who);
  v.appendChild(el(`<div class="progress"><span>${p.name}: Bewertungen ändern</span><span>${rated(who)} von ${D.length}</span></div>`));
  v.appendChild(el(`<p class="muted">Tippe bei einem Gericht auf ★ gern, ~ geht so, ✕ nie oder ? kenn ich nicht. Die Änderung gilt sofort. Stufst du einen Favoriten herunter, fliegt er aus dem Turnier-Ranking; neue Favoriten kommen bei den nächsten Duellen zuerst dran.</p>`));
  const back=el(`<div class="row"><button class="btn">Zurück zur Sichtung</button></div>`);
  back.firstChild.onclick=()=>{reviewList=false;render();};
  v.appendChild(back);
  const search=el(`<input class="searchbox" type="search" placeholder="Gericht suchen …">`);
  v.appendChild(search);
  const box=el(`<div></div>`); v.appendChild(box);
  const VALS=["gern","ok","nie","neu"], SYM=["★","~","✕","?"];
  const groups={};
  D.forEach(d=>{(groups[d.b]=groups[d.b]||[]).push(d);});
  Object.keys(groups).forEach(b=>{
    const h=el(`<h3>${BASE[b]}</h3>`); box.appendChild(h);
    groups[b].forEach(d=>{
      const cur=S.ratings[who][d.id];
      const row=el(`<div class="rev" data-n="${esc(d.n).toLowerCase()}"><span class="nm">${esc(d.n)}</span><span class="mini"></span></div>`);
      const mini=row.querySelector(".mini");
      VALS.forEach((val,i)=>{
        const btn=el(`<button aria-label="${val}" class="${cur===val?"on-"+val:""}">${SYM[i]}</button>`);
        btn.onclick=()=>{
          S.ratings[who][d.id]=val;
          // Heruntergestufte Favoriten fliegen aus dem Turnier-Ranking;
          // neu hochgestufte kommen im Turnier zuerst dran (Duellzähler 0)
          if(val!=="gern"){ delete S.elo[who][d.id]; delete S.dcnt[who][d.id]; }
          save();
          [...mini.children].forEach((c,j)=>c.className=VALS[j]===val?"on-"+val:"");
        };
        mini.appendChild(btn);
      });
      box.appendChild(row);
    });
  });
  search.oninput=()=>{
    const t=search.value.trim().toLowerCase();
    box.querySelectorAll(".rev").forEach(r=>{r.style.display=!t||r.dataset.n.includes(t)?"":"none";});
    box.querySelectorAll("h3").forEach(h=>{
      let el2=h.nextElementSibling, any=false;
      while(el2&&el2.classList.contains("rev")){ if(el2.style.display!=="none")any=true; el2=el2.nextElementSibling; }
      h.style.display=any?"":"none";
    });
  };
}

function vDuell(v){
  if(!who){v.appendChild(el(`<div class="empty">Wähle zuerst aus, wer dran ist.</div>`));return;}
  const p=PEOPLE.find(x=>x.id===who);
  const pool=D.filter(d=>S.ratings[who][d.id]==="gern");
  if(pool.length<4){v.appendChild(el(`<div class="empty">${p.name} hat noch zu wenige Lieblingsgerichte für ein Turnier. Erst weiter sichten.</div>`));return;}
  v.appendChild(el(`<p class="muted">Beide Gerichte mag ${p.name}. Welches lieber? Das sortiert die Favoriten untereinander – 15 bis 20 Duelle reichen.</p>`));
  v.appendChild(el(`<div class="progress"><span>${p.name}</span><span>${S.duels[who]||0} Duelle gespielt</span></div>`));
  const cnt=d=>S.dcnt[who][d.id]||0;
  const fresh0=pool.filter(d=>cnt(d)===0).length;
  if(fresh0) v.appendChild(el(`<p class="muted">${fresh0} Favorit${fresh0===1?" war":"en waren"} noch nie im Duell (neu bewertet oder revidiert) – die kommen zuerst dran.</p>`));
  // Nachzügler zuerst: einer der beiden Kandidaten kommt aus den am wenigsten geduellten
  const pick=()=>{
    const sorted=[...pool].sort((a,b)=>cnt(a)-cnt(b)||Math.random()-.5);
    const a=sorted[Math.floor(Math.random()*Math.min(3,sorted.length))];
    let b;do{b=pool[Math.floor(Math.random()*pool.length)];}while(b===a);
    return [a,b];
  };
  const [x,y]=pick();
  const g=el(`<div class="duel"><button>${esc(x.n)}</button><button>${esc(y.n)}</button></div>`);
  const win=(w,l)=>{
    const E=S.elo[who], rw=E[w.id]||1000, rl=E[l.id]||1000;
    const exp=1/(1+Math.pow(10,(rl-rw)/400));
    E[w.id]=rw+32*(1-exp); E[l.id]=rl-32*(1-exp);
    S.dcnt[who][w.id]=(S.dcnt[who][w.id]||0)+1;
    S.dcnt[who][l.id]=(S.dcnt[who][l.id]||0)+1;
    S.duels[who]=(S.duels[who]||0)+1; save(); render();
  };
  g.children[0].onclick=()=>win(x,y);
  g.children[1].onclick=()=>win(y,x);
  v.appendChild(g);
  const r=el(`<div class="row"><button class="btn ghost">Fertig, nächste Person</button><button class="btn">Ergebnis ansehen</button></div>`);
  r.children[0].onclick=()=>{who=null;tab="start";render();};
  r.children[1].onclick=()=>{tab="ergebnis";render();};
  v.appendChild(r);
  const rst=el(`<div class="row"><button class="btn ghost">Turnier von ${p.name} neu starten</button></div>`);
  rst.firstChild.onclick=()=>{
    if(confirm(`Alle Duell-Ergebnisse von ${p.name} löschen und neu anfangen?`)){
      S.elo[who]={};S.dcnt[who]={};S.duels[who]=0;save();render();
    }
  };
  v.appendChild(rst);
}

function vTeilen(v){
  v.appendChild(el(`<p class="muted">Es läuft nichts über einen Server – Stände wandern per QR-Code, Link oder abgetipptem Code direkt von Gerät zu Gerät.</p>`));

  v.appendChild(el(`<h3>So läuft es ab</h3>`));
  v.appendChild(el(`<ol class="steps">
    <li><b>Jeder für sich:</b> auf dem eigenen Gerät sichten und Duelle spielen.</li>
    <li><b>Abgeben:</b> jeder erzeugt unten seinen Code, das Tablet liest alle nacheinander ein. Die Reihenfolge ist egal – jeder Code ändert nur die eigene Person.</li>
    <li><b>Auswerten:</b> auf dem Tablet stehen jetzt Ergebnis, Bestenliste und Wochenplan für die ganze Familie.</li>
    <li><b>Zurückspielen:</b> das Tablet erzeugt den Familien-Code, jedes Gerät liest ihn ein – dann hat jeder den kompletten Familienstand. Achtung: Das überschreibt auf dem Gerät auch die eigene Person. Wer seit der Abgabe weiterbewertet hat, gibt erst wieder ab (Schritt 2) und liest dann zurück.</li>
  </ol>`));

  v.appendChild(el(`<h3>Meinen Stand abgeben</h3>`));
  const sel=el(`<div class="row"></div>`);
  PEOPLE.forEach(p=>{
    const b=el(`<button class="btn ghost">${p.name}</button>`);
    b.onclick=()=>showCode(encode(p.id));
    sel.appendChild(b);
  });
  v.appendChild(sel);

  v.appendChild(el(`<h3>Familienstand weitergeben</h3>`));
  v.appendChild(el(`<p class="muted">Für Schritt 4: den kompletten Stand aller Personen (z.&nbsp;B. vom Tablet) auf die anderen Geräte bringen.</p>`));
  const fam=el(`<div class="row"><button class="btn ghost">Familien-Code erzeugen</button></div>`);
  fam.firstChild.onclick=()=>showCode(encodeFamily());
  v.appendChild(fam);
  const out=el(`<div id="out"></div>`); v.appendChild(out);

  function showCode(code){
    const url=location.origin+location.pathname+"#c="+code;
    out.innerHTML="";
    out.appendChild(el(`<div class="card" style="padding:22px"><div id="qr" style="background:#fff;padding:12px;border-radius:3px;line-height:0"></div><p class="codetext">${code}</p></div>`));
    const r=el(`<div class="row"><button class="btn">Link kopieren</button><button class="btn ghost">Code kopieren</button></div>`);
    r.children[0].onclick=()=>navigator.clipboard.writeText(url).then(()=>{note="Link kopiert.";render();});
    r.children[1].onclick=()=>navigator.clipboard.writeText(code).then(()=>{note="Code kopiert.";render();});
    out.appendChild(r);
    if(window.QRCode){ new QRCode(document.getElementById("qr"),{text:url,width:230,height:230,correctLevel:QRCode.CorrectLevel.L}); }
    else{ document.getElementById("qr").outerHTML='<p class="muted" style="line-height:1.5">QR-Bibliothek nicht geladen – nimm den Link oder den Code darunter.</p>'; }
    out.scrollIntoView({behavior:"smooth",block:"nearest"});
  }

  v.appendChild(el(`<h3>Stand von jemandem einlesen</h3>`));
  const ta=el(`<textarea class="code" rows="3" placeholder="Code hier einfügen oder abtippen"></textarea>`);
  v.appendChild(ta);
  const r2=el(`<div class="row"><button class="btn">Einlesen</button><button class="btn ghost">Mit Kamera scannen</button></div>`);
  r2.children[0].onclick=()=>{
    try{ note="Eingelesen: "+applyCode(ta.value); }catch(e){ note=e.message; }
    render();
  };
  r2.children[1].onclick=()=>scan(v);
  v.appendChild(r2);
  v.appendChild(el(`<p class="muted" style="margin-top:14px">Wenn das Scannen im Browser nicht geht, öffne den QR-Code einfach mit der normalen Kamera-App – der enthaltene Link öffnet diese Seite und liest den Stand direkt ein.</p>`));

  const st=el(`<h3>Wer ist schon eingelesen</h3>`); v.appendChild(st);
  const g=el(`<div class="veto"></div>`);
  PEOPLE.forEach(p=>{const n=rated(p.id);g.appendChild(el(`<span style="background:${n===D.length?'rgba(227,167,47,.2)':'rgba(243,238,226,.08)'}">${p.name}: ${n} von ${D.length}</span>`));});
  v.appendChild(g);
}

async function scan(v){
  if(!("BarcodeDetector" in window)){ note="Dieser Browser kann keine QR-Codes scannen. Nimm die Kamera-App oder tippe den Code ab."; render(); return; }
  let stream;
  try{ stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}); }
  catch(e){ note="Kein Kamerazugriff. Nimm die Kamera-App oder tippe den Code ab."; render(); return; }
  const vid=el(`<video playsinline style="width:100%;border-radius:3px;margin-top:8px"></video>`);
  v.appendChild(vid); vid.srcObject=stream; await vid.play();
  const det=new BarcodeDetector({formats:["qr_code"]});
  const stop=()=>stream.getTracks().forEach(t=>t.stop());
  const tick=async()=>{
    if(!vid.isConnected){ stop(); return; }
    try{
      const found=await det.detect(vid);
      if(found.length){
        stop();
        const m=found[0].rawValue.match(/#c=(.+)$/);
        try{ note="Eingelesen: "+applyCode(m?m[1]:found[0].rawValue); }catch(e){ note=e.message; }
        render(); return;
      }
    }catch(e){}
    requestAnimationFrame(tick);
  };
  tick();
}

function vErgebnis(v){
  const A=analyse().filter(a=>a.done>0);
  if(!A.length){v.appendChild(el(`<div class="empty">Noch nichts bewertet. Fangt bei „Wer ist dran“ an.</div>`));return;}
  const ok=A.filter(a=>!a.veto.length);
  const byMin=[...ok].sort((a,b)=>b.min-a.min||b.sum-a.sum).slice(0,15);
  const byAll=[...ok].sort((a,b)=>b.sum-a.sum||b.min-a.min).slice(0,15);
  const vet=A.filter(a=>a.veto.length);
  const neu=ok.filter(a=>a.neu).sort((a,b)=>b.sum-a.sum).slice(0,12);

  const list=(arr,key)=>{
    const o=el(`<ol class="rank"></ol>`);
    arr.forEach(a=>{
      const faces=PEOPLE.map(p=>{
        const r=a.r[p.id];
        const c=r==="gern"?"f-gern":r==="ok"?"f-ok":r==="neu"?"f-neu":r==="nie"?"f-nie":"";
        return `<span class="face ${c}" title="${p.name}: ${r||"noch nichts"}">${p.name[0]}</span>`;
      }).join("");
      o.appendChild(el(`<li><div><div class="nm">${esc(a.d.n)}</div><div class="meta">${BASE[a.d.b]} · ${key==="min"?"schwächste Stimme "+a.min.toFixed(1):"Summe "+a.sum.toFixed(1)}</div></div><div class="faces">${faces}</div></li>`));
    });
    return o;
  };

  v.appendChild(el(`<h3>Fairster Kompromiss</h3>`));
  v.appendChild(el(`<p class="muted">Sortiert nach der schwächsten Stimme am Tisch. Diese Gerichte machen niemanden unglücklich – das ist etwas anderes als „die meisten Punkte“.</p>`));
  v.appendChild(list(byMin,"min"));

  v.appendChild(el(`<h3>Bestenliste</h3>`));
  v.appendChild(el(`<p class="muted">Die Top-Gerichte – für alle zusammen oder für eine Person allein. Bei einer Person zählt die Sichtung, die Turnier-Duelle sortieren die Favoriten untereinander.</p>`));
  const chips=el(`<div class="row" style="margin-bottom:12px"></div>`);
  [["alle","Alle zusammen"]].concat(PEOPLE.map(p=>[p.id,p.name])).forEach(([id,label])=>{
    const b=el(`<button class="btn ${bestWho===id?"":"ghost"}">${label}</button>`);
    b.onclick=()=>{bestWho=id;render();};
    chips.appendChild(b);
  });
  v.appendChild(chips);
  if(bestWho==="alle"){
    v.appendChild(list(byAll,"sum"));
  }else{
    const pn=PEOPLE.find(p=>p.id===bestWho).name;
    const mine=D.filter(d=>{const r=S.ratings[bestWho][d.id];return r&&r!=="nie";})
      .map(d=>{const r=S.ratings[bestWho][d.id];
        return {d,r,score:(r==="gern"?2:r==="ok"?1:.5)+((S.elo[bestWho][d.id]||1000)-1000)/400};})
      .sort((a,b)=>b.score-a.score).slice(0,15);
    if(!mine.length){
      v.appendChild(el(`<div class="empty">Für ${pn} ist noch nichts bewertet.</div>`));
    }else{
      const o=el(`<ol class="rank"></ol>`);
      mine.forEach(m=>{
        const c=m.r==="gern"?"f-gern":m.r==="ok"?"f-ok":"f-neu";
        const word=m.r==="gern"?"gern":m.r==="ok"?"geht so":"kennt es noch nicht";
        o.appendChild(el(`<li><div><div class="nm">${esc(m.d.n)}</div><div class="meta">${BASE[m.d.b]} · ${word}</div></div><div class="faces"><span class="face ${c}" title="${pn}">${pn[0]}</span></div></li>`));
      });
      v.appendChild(o);
    }
  }
  if(neu.length){
    v.appendChild(el(`<h3>Entdeckungspool</h3>`));
    v.appendChild(el(`<p class="muted">Kennt mindestens eins der Kinder nicht, und niemand hat Veto eingelegt. Genau hier liegt die Chance, aus der Nudel-Schleife rauszukommen.</p>`));
    v.appendChild(list(neu,"sum"));
  }
  if(vet.length){
    v.appendChild(el(`<h3>Raus wegen Veto (${vet.length})</h3>`));
    const w=el(`<div class="veto"></div>`);
    vet.forEach(a=>w.appendChild(el(`<span>${esc(a.d.n)} — ${a.veto.join(", ")}</span>`)));
    v.appendChild(w);
  }
}

    return s+": "+(d?d.n:"–");

  else navigator.clipboard.writeText(txt).then(()=>{note=okMsg;render();});
}
function vPlan(v){
  // Übernommener Plan: feste Ansicht mit Teilen + Einkaufsliste
  if(S.plan){
    v.appendChild(el(`<p class="muted">Dieser Plan ist übernommen und bleibt so stehen, bis ihr einen neuen macht.</p>`));
    const box=el(`<div class="plan"></div>`);
    S.plan.ids.forEach((id,i)=>{
      const d=id!=null?DALL[id]:null;
      box.appendChild(el(`<div class="slot"><div class="day">${SLOTS[i]}</div><div class="dish">${d?esc(d.n):"–"}</div><div class="tag">${d?BASE[d.b]+" · "+(d.e?"Aufwand "+"●".repeat(d.e):"geliefert"):""}</div></div>`));
    });
    v.appendChild(box);
    const r=el(`<div class="row"><button class="btn">Plan teilen</button><button class="btn ghost">Neuen Plan machen</button></div>`);
    r.children[0].onclick=()=>shareText(planText(S.plan.ids),"Plan kopiert – einfach in die Familien-Gruppe einfügen.");
    r.children[1].onclick=()=>{S.plan=null;save();draft=null;render();};
    v.appendChild(r);

    v.appendChild(el(`<h3>Einkaufsliste</h3>`));
    const items={},noz=[],liefer=[];
    S.plan.ids.forEach(id=>{
      const d=id!=null?DALL[id]:null; if(!d)return;
      if(d.t.includes("liefern")){liefer.push(d.n);return;}
      if(d.z)d.z.forEach(z=>items[z]=(items[z]||0)+1); else noz.push(d.n);
    });
    const lines=Object.keys(items).sort((a,b)=>a.localeCompare(b,"de")).map(z=>(items[z]>1?items[z]+"× ":"")+z);
    const ul=el(`<ul class="shop"></ul>`);
    lines.forEach(l=>ul.appendChild(el(`<li>${esc(l)}</li>`)));
    v.appendChild(ul);
    if(liefer.length) v.appendChild(el(`<p class="muted">Wird geliefert: ${liefer.map(esc).join(", ")}</p>`));
    if(noz.length) v.appendChild(el(`<p class="muted">Ohne Zutatenliste: ${noz.map(esc).join(", ")}</p>`));
    const r2=el(`<div class="row"><button class="btn ghost">Einkaufsliste teilen</button></div>`);
    r2.firstChild.onclick=()=>shareText("Einkauf für den Wochenplan:\n"+lines.map(l=>"- "+l).join("\n"),"Einkaufsliste kopiert.");
    v.appendChild(r2);
    return;
  }

  const A=analyse().filter(a=>!a.veto.length&&a.done>0&&!S.paused[a.d.id]);
  if(A.length<12){v.appendChild(el(`<div class="empty">Zu wenig bewertet für einen Wochenplan. Mindestens eine Person sollte durch sein.</div>`));return;}
  const byId={}; A.forEach(a=>byId[a.d.id]=a);
  const WE=[5,6,7,8];
  const CAP={nudeln:2,spaetzle:1,teig:1,suess:1,suppe:1,kartoffel:2,reis:2,brot:2,sonst:3};
  const klassiker=a=>/Pizza|Burger/.test(a.d.n)||a.d.t.includes("grillen");
  // Wiederholungs-Bremse: Gerichte der letzten übernommenen Pläne meiden
  // (Brotzeit und Wochenend-Klassiker dürfen sich wiederholen)
  const topPool=()=>{
    const sorted=[...A].sort((a,b)=>(b.min*2+b.sum)-(a.min*2+a.sum));
    let hist=S.history||[];
    let pool=[];
    for(let h=hist.length;h>=0;h--){
      const recent=new Set(hist.slice(0,h).flat());
      pool=sorted.filter(a=>!recent.has(a.d.id)||a.d.t.includes("brotzeit")||klassiker(a));
      if(pool.length>=20)break;
    }
    pool=pool.slice(0,44);
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    return pool;
  };
  const planIds=()=>draft.map(e=>e?e.id:null);
  const usedOf=skip=>{
    const used={};let lief=0;
    draft.forEach((e,j)=>{
      const a=e&&byId[e.id]; if(!a||j===skip)return;
      used[a.d.b]=(used[a.d.b]||0)+1; if(a.d.t.includes("liefern"))lief++;
    });
    return {used,lief};
  };
  const fitsIn=skip=>a=>{
    const {used,lief}=usedOf(skip);
    return (used[a.d.b]||0)<(CAP[a.d.b]||1)&&!(a.d.t.includes("liefern")&&lief>=1);
  };
  const inDraft=a=>draft.some(e=>e&&e.id===a.d.id);
  const build=keep=>{
    draft=keep?keep.map(e=>e&&byId[e.id]?e:null):new Array(SLOTS.length).fill(null);
    const pool=topPool();
    const free=pred=>{const f=fitsIn(-1);return pool.find(a=>!inDraft(a)&&f(a)&&(!pred||pred(a)));};
    if(S.brotwoche){
      const pat=Math.random()<.5?[0,1]:[1,2];
      for(const i of pat){ if(draft[i])continue; const a=free(z=>z.d.t.includes("brotzeit")); if(a)draft[i]={id:a.d.id,pin:false}; }
    }
    if(!draft.some(e=>e&&klassiker(byId[e.id]))){
      const k=free(klassiker);
      if(k){const s=WE.filter(i=>!draft[i]);if(s.length)draft[s[Math.floor(Math.random()*s.length)]]={id:k.d.id,pin:false};}
    }
    if(!draft.some(e=>e&&byId[e.id].neu)){
      const x=free(a=>a.neu);
      if(x){const s=WE.find(i=>!draft[i]);const t=s!==undefined?s:draft.indexOf(null);if(t>=0)draft[t]={id:x.d.id,pin:false};}
    }
    for(let i=0;i<5;i++){ if(draft[i])continue; const a=free(z=>z.d.e<=2)||free(); if(a)draft[i]={id:a.d.id,pin:false}; }
    for(const i of WE){ if(draft[i])continue; const a=free(); if(a)draft[i]={id:a.d.id,pin:false}; }
  };
  if(!draft||draft.length!==SLOTS.length) build();
  else draft=draft.map(e=>e&&byId[e.id]?e:null); // pausierte/vetote Gerichte fliegen raus
  const swap=i=>{
    const pool=topPool(), cur=draft[i]&&byId[draft[i].id], f=fitsIn(i);
    const cand=pred=>pool.find(a=>!inDraft(a)&&f(a)&&(!pred||pred(a)));
    let a=null;
    if(cur&&WE.includes(i)&&klassiker(cur)&&!draft.some((e,j)=>j!==i&&e&&klassiker(byId[e.id]))) a=cand(klassiker);
    else if(cur&&cur.neu&&!draft.some((e,j)=>j!==i&&e&&byId[e.id].neu)) a=cand(z=>z.neu);
    if(!a) a=i<5?(cand(z=>z.d.e<=2)||cand()):cand();
    if(a){draft[i]={id:a.d.id,pin:draft[i]?draft[i].pin:false};draw();}
    else{note="Kein passender Ersatz frei – erst neu würfeln oder etwas anderes tauschen.";render();}
  };
  const draw=()=>{
    box.innerHTML="";
    draft.forEach((e,i)=>{
      const a=e&&byId[e.id];
      const s=a
        ?el(`<div class="slot${a.neu?" exp":""}${e.pin?" pinned":""}"><div class="day">${SLOTS[i]}${a.neu?" · Experiment":""}</div><div class="dish">${esc(a.d.n)}</div><div class="tag">${BASE[a.d.b]} · ${a.d.e?"Aufwand "+"●".repeat(a.d.e):"geliefert"}</div><div class="slotrow"><button class="swap">↻ Tauschen</button><button class="swap pin">${e.pin?"📌 Gepinnt":"📌 Pinnen"}</button></div></div>`)
        :el(`<div class="slot"><div class="day">${SLOTS[i]}</div><div class="dish">–</div><div class="tag">kein Gericht frei</div><div class="slotrow"><button class="swap">↻ Tauschen</button></div></div>`);
      s.querySelector(".swap").onclick=()=>swap(i);
      const pb=s.querySelector(".pin");
      if(pb)pb.onclick=()=>{e.pin=!e.pin;draw();};
      box.appendChild(s);
    });
  };
  v.appendChild(el(`<p class="muted">Unter der Woche ein Essen pro Tag, eher einfach. Am Wochenende Mittag- und Abendessen – eines davon ist Pizza, Burger oder Grillen, ein Platz gehört dem Entdeckungspool. Gerichte der letzten Wochen werden gemieden. „↻ Tauschen“ ersetzt einen Platz, „📌 Pinnen“ schützt ihn beim Neu-Würfeln. Passt alles: „Plan übernehmen“.</p>`));
  const bz=el(`<label class="toggle"><input type="checkbox"${S.brotwoche?" checked":""}> <span><b>Brotzeit-Woche:</b> Brot ist da – zweimal Brotzeit, Mo/Di oder Di/Mi</span></label>`);
  bz.querySelector("input").onchange=e=>{S.brotwoche=e.target.checked;save();build(draft.map(x=>x&&x.pin?x:null));draw();};
  v.appendChild(bz);
  const box=el(`<div class="plan"></div>`); v.appendChild(box); draw();
  const r=el(`<div class="row"><button class="btn">Plan übernehmen</button><button class="btn ghost">Neu würfeln (Pins bleiben)</button></div>`);
  r.children[0].onclick=()=>{
    const ids=planIds();
    S.plan={ids};
    S.history=[ids.filter(x=>x!=null),...(S.history||[])].slice(0,2);
    save();draft=null;render();
  };
  r.children[1].onclick=()=>{build(draft.map(x=>x&&x.pin?x:null));draw();};
  v.appendChild(r);

  // Pausierte Gerichte: gerade nicht machbar, fliegen aus dem Plan
  v.appendChild(el(`<h3>Pausierte Gerichte</h3>`));
  v.appendChild(el(`<p class="muted">Für alles, was gerade nicht geht – Raclette ohne Gerät, Grillen ohne Grill. Pausierte Gerichte landen nicht im Wochenplan, Bewertungen bleiben erhalten. Die Liste wandert mit dem Familien-Code auf die anderen Geräte.</p>`));
  const pchips=el(`<div class="veto" style="margin-bottom:12px"></div>`);
  const pids=Object.keys(S.paused).filter(id=>S.paused[id]&&DALL[id]);
  if(!pids.length) pchips.appendChild(el(`<span>Gerade ist nichts pausiert.</span>`));
  pids.forEach(id=>{
    const c=el(`<span>${esc(DALL[id].n)}&nbsp;&nbsp;<b style="cursor:pointer;color:var(--mustard)">✕</b></span>`);
    c.querySelector("b").onclick=()=>{delete S.paused[id];save();render();};
    pchips.appendChild(c);
  });
  v.appendChild(pchips);
  const ps=el(`<input class="searchbox" type="search" placeholder="Gericht zum Pausieren suchen …">`);
  v.appendChild(ps);
  const pres=el(`<div></div>`); v.appendChild(pres);
  ps.oninput=()=>{
    pres.innerHTML="";
    const t=ps.value.trim().toLowerCase();
    if(t.length<2)return;
    D.filter(d=>d.n.toLowerCase().includes(t)&&!S.paused[d.id]).slice(0,8).forEach(d=>{
      const row=el(`<div class="rev"><span class="nm">${esc(d.n)}</span><button class="btn ghost" style="padding:8px 14px">Pausieren</button></div>`);
      row.querySelector("button").onclick=()=>{S.paused[d.id]=true;save();render();};
      pres.appendChild(row);
    });
  };
}

loadDishes().then(()=>{load();render();}).catch(()=>{
  document.getElementById("view").innerHTML='<div class="empty">Die Gerichteliste (dishes.json) konnte nicht geladen werden. Einmal mit Internetverbindung öffnen, danach geht es auch offline.</div>';
});
</script>
<script>if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});</script>
