<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>@herdom.bamberg — Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Top fixed: Header + Calendar ───────────────────────── -->
<div class="top-fixed">
  <header id="header">
    <div class="header-left">
      <h1>HERDOM<span class="accent">.BAMBERG</span></h1>
      <div class="stats" id="stats"></div>
    </div>
    <div class="header-right">
      <div class="search-box">
        <span class="search-icon">&#9906;</span>
        <input type="text" id="searchInput" placeholder="Suche... (Cmd+K)" spellcheck="false">
        <span class="search-count" id="searchCount"></span>
        <span class="search-clear" id="searchClear">&times;</span>
      </div>
    </div>
  </header>

  <div class="cal-nav">
    <button class="nav-btn" id="navPrev">&larr;</button>
    <button class="nav-btn" id="navNext">&rarr;</button>
    <button class="nav-btn mode-btn active" id="modePlan">PLAN</button>
    <button class="nav-btn mode-btn" id="modeMix">MIX</button>
    <span class="nav-sep">|</span>
    <button class="nav-btn" id="timelineBtn">TIMELINE</button>
    <span class="nav-label" id="navLabel"></span>
  </div>

  <div id="calendar"></div>
</div>

<!-- ── Bottom: 4-Column Backlog ───────────────────────────── -->
<div class="backlog-area" id="backlogArea"></div>

<!-- ── Timeline Modal ──────────────────────────────────────── -->
<div class="timeline-modal" id="timelineModal">
  <div class="timeline-header">
    <span class="timeline-title">TIMELINE</span>
    <span class="timeline-range" id="timelineRange"></span>
    <button class="timeline-close" id="timelineClose">&times;</button>
  </div>
  <div class="timeline-body" id="timelineBody"></div>
</div>

<!-- ── Floating Detail Panel (no overlay, no backdrop) ────── -->
<div class="detail-panel" id="detailPanel">
  <button class="panel-close" id="panelClose">&times;</button>
  <div id="panelContent"></div>
</div>

<script src="app.js"></script>
</body>
</html>
