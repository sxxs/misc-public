<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>@herdom.bamberg — Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header id="header">
  <div class="header-left">
    <h1>HERDOM<span class="accent">.BAMBERG</span></h1>
    <div class="stats" id="stats"></div>
  </div>
  <div class="header-right">
    <div class="search-box">
      <span class="search-icon">&#9906;</span>
      <input type="text" id="searchInput" placeholder="Suche..." spellcheck="false">
      <span class="search-count" id="searchCount"></span>
    </div>
  </div>
</header>

<!-- ── Calendar Navigation ─────────────────────────────────── -->
<div class="cal-nav" id="calNav">
  <button class="nav-btn" id="navPrev">&larr; FRUEHER</button>
  <span class="nav-label" id="navLabel"></span>
  <button class="nav-btn" id="navNext">SPAETER &rarr;</button>
</div>

<!-- ── Calendar Grid ───────────────────────────────────────── -->
<div id="calendar"></div>

<!-- ── Backlog ─────────────────────────────────────────────── -->
<div id="backlog"></div>

<!-- ── Legend ───────────────────────────────────────────────── -->
<div class="legend" id="legend"></div>

<!-- ── Detail Panel ────────────────────────────────────────── -->
<div class="panel-overlay" id="panelOverlay">
  <div class="panel" id="panel">
    <button class="close-btn" id="closeBtn">&times;</button>
    <div id="panelContent"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
