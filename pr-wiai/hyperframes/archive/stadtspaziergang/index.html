<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=720, height=1280" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0; width: 720px; height: 1280px;
        overflow: hidden; background: #000; position: relative;
      }

      /* Blurred, upscaled bg-layer to fill areas outside the fg video content */
      .bg-video {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%) scale(1.6);
        width: 100%; height: 100%;
        object-fit: cover;
        filter: blur(60px) brightness(0.7) saturate(1.35);
        z-index: 0;
        pointer-events: none;
      }

      #v1, #v2 {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        filter: brightness(0.62) blur(2px);
      }
      #v1 { z-index: 1; }
      #v2 { z-index: 2; opacity: 0; }
      #v2-bg { opacity: 0; }

      /* Pixel canvases: same filter as videos, sit above them */
      #pix-v1, #pix-v2 {
        position: absolute; top: 0; left: 0;
        width: 720px; height: 1280px;
        filter: brightness(0.62) blur(2px);
        pointer-events: none;
        image-rendering: pixelated;
      }
      #pix-v1 { z-index: 3; }
      #pix-v2 { z-index: 4; }

      #root { position: absolute; inset: 0; z-index: 10; }

      .caption {
        position: absolute;
        bottom: 460px;
        left: 0; right: 0;
        padding: 0 68px;
        text-align: center;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 52px;
        font-weight: 700;
        color: #fff;
        line-height: 1.3;
        letter-spacing: -0.01em;
        text-shadow: 0 2px 24px rgba(0,0,0,0.95), 0 1px 5px rgba(0,0,0,0.9);
      }

      #s3 {
        position: absolute;
        bottom: 390px;
        left: 0; right: 0;
        padding: 0 68px;
        text-align: center;
        font-family: 'Space Grotesk', sans-serif;
      }
      #s3 .punchline {
        font-size: 62px; font-weight: 700;
        color: #fff; line-height: 1.2; letter-spacing: -0.02em;
        text-shadow: 0 2px 24px rgba(0,0,0,0.95), 0 0 60px rgba(250,204,21,0.12);
      }
      #s3 .accent-line {
        width: 80px; height: 2px;
        background: #FACC15; margin: 20px auto 14px; opacity: 0.75;
      }
      #s3 .handle {
        font-size: 28px; font-weight: 700;
        color: #FACC15; letter-spacing: 0.02em;
        text-shadow: 0 0 24px rgba(250,204,21,0.5);
      }
      #s3 .institution {
        font-size: 17px; font-weight: 500;
        color: rgba(255,255,255,0.75);
        margin-top: 6px; letter-spacing: 0.07em; text-transform: uppercase;
      }
      .w { opacity: 0; }

      /* Black pill background for branding legibility */
      #branding-inner {
        display: inline-block;
        background: rgba(0,0,0,0.62);
        border-radius: 6px;
        padding: 14px 28px 16px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-width="720" data-height="1280">

      <div class="clip" data-start="0" data-duration="15" data-track-index="0"
           style="position:absolute;inset:0;background:rgba(0,0,0,0.12);pointer-events:none;"></div>

      <div class="clip" data-start="0" data-duration="15" data-track-index="1"
           style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 52%,transparent 40%,rgba(0,0,0,0.4) 100%);pointer-events:none;"></div>

      <div id="cap1" class="clip caption" data-start="0.27" data-duration="5.28" data-track-index="2"
           style="opacity:0;">
        <span class="w">Du</span> <span class="w">lernst</span> <span class="w">in</span> <span class="w">der</span> <span class="w">Schule</span><br>
        <span class="w">wie</span> <span class="w">der</span> <span class="w">Dreißigjährige</span><br>
        <span class="w">Krieg</span> <span class="w">verlief.</span>
      </div>

      <div id="cap2" class="clip caption" data-start="5.63" data-duration="5.57" data-track-index="2"
           style="opacity:0;">
        <span class="w">Du</span> <span class="w">lernst</span> <span class="w">nicht,</span><br>
        <span class="w">wie</span> <span class="w">das</span> <span class="w">Internet</span> <span class="w">funktioniert,</span><br>
        <span class="w">das</span> <span class="w">du</span> <span class="w">6</span> <span class="w">Stunden</span> <span class="w">am</span> <span class="w">Tag</span> <span class="w">nutzt.</span>
      </div>

      <div id="s3" class="clip" data-start="11.2" data-duration="3.8" data-track-index="2"
           style="opacity:0;">
        <div class="punchline">Merkste selber, oder?</div>
        <div style="text-align:center; margin-top:18px;">
          <div id="branding-inner" style="opacity:0;">
            <div class="handle">@echt.bamberg</div>
            <div class="institution">WIAI · Uni Bamberg</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Pixel canvases: stage-level, no Hyperframes timing management needed -->
    <canvas id="pix-v1" width="720" height="1280"></canvas>
    <canvas id="pix-v2" width="720" height="1280"></canvas>

    <!-- Blurred background layers fill the frame outside the fg video area -->
    <video id="v1-bg" class="bg-video" src="bg-v1.mp4" data-start="0"    data-duration="5.99" data-track-index="6" muted></video>
    <video id="v2-bg" class="bg-video" src="bg-v2.mp4" data-start="5.41" data-duration="9.59" data-track-index="7" muted></video>

    <video id="v1" src="bg-v1.mp4"  data-start="0"    data-duration="6"    data-track-index="3" muted></video>
    <video id="v2" src="bg-v2.mp4"  data-start="5.4"  data-duration="9.6"  data-track-index="4" muted></video>

    <audio id="vo"    src="voiceover.wav" data-start="0.27" data-duration="12" data-track-index="5"></audio>
    <audio id="music" src="music.mp3"     data-start="0"    data-duration="15" data-track-index="8"></audio>

    <script>
      const v1El  = document.getElementById('v1');
      const v2El  = document.getElementById('v2');
      const c1    = document.getElementById('pix-v1');
      const c2    = document.getElementById('pix-v2');
      const ctx1  = c1.getContext('2d');
      const ctx2  = c2.getContext('2d');

      // Offscreen buffers for the two-pass pixelation trick
      const off1 = document.createElement('canvas');
      const off2 = document.createElement('canvas');
      off1.width = off2.width = 720;
      off1.height = off2.height = 1280;
      const offCtx1 = off1.getContext('2d');
      const offCtx2 = off2.getContext('2d');

      // Draw video onto canvas at 'size' block-pixel resolution
      function drawPix(ctx, offCtx, offCanvas, videoEl, size) {
        ctx.clearRect(0, 0, 720, 1280);
        if (size <= 1) return;
        const s = Math.round(size);
        const w = Math.max(1, Math.ceil(720  / s));
        const h = Math.max(1, Math.ceil(1280 / s));
        offCtx.drawImage(videoEl, 0, 0, w, h);   // shrink video → blocks
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(offCanvas, 0, 0, w, h, 0, 0, 720, 1280); // scale up → pixelated
      }

      const px1 = { size: 48 };
      const px2 = { size: 48 };

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ── Pixelate-in: v1 assembles from blocks at start ───────────
      tl.to(px1, {
        size: 1, duration: 1.5, ease: "power2.out",
        onUpdate: () => drawPix(ctx1, offCtx1, off1, v1El, px1.size)
      }, 0);

      // ── Pixelate-out v1 + cut + pixelate-in v2 ───────────────────
      // Cut timed to coincide with start of cap2 ("Du lernst nicht...")
      tl.to(px1, {
        size: 48, duration: 0.55, ease: "power2.in",
        onUpdate: () => drawPix(ctx1, offCtx1, off1, v1El, px1.size),
        onComplete: () => ctx1.clearRect(0, 0, 720, 1280)
      }, 5.0);

      // Hard cut at peak pixelation (fg + bg in sync)
      tl.to("#v1",    { opacity: 0, duration: 0.05 }, 5.55);
      tl.to("#v2",    { opacity: 1, duration: 0.05 }, 5.55);
      tl.to("#v1-bg", { opacity: 0, duration: 0.05 }, 5.55);
      tl.to("#v2-bg", { opacity: 1, duration: 0.05 }, 5.55);

      tl.to(px2, {
        size: 1, duration: 0.9, ease: "power2.out",
        onUpdate: () => drawPix(ctx2, offCtx2, off2, v2El, px2.size)
      }, 5.55);

      // ── Ken Burns: subtle slow zoom on v2 ────────────────────────
      tl.fromTo("#v2", { scale: 1.0 }, { scale: 1.06, duration: 9.45, ease: "none" }, 5.55);

      // ── Caption 1: slide up, words pop in on TTS beats ───────────
      // Audio offset = 0.27; word timings are whisper audio-t + 0.27
      tl.fromTo("#cap1",
        { opacity: 1, y: 20 },
        { opacity: 1, y: 0, duration: 0.3, ease: "power3.out" }, 0.27);
      const cap1Times = [0.27, 0.85, 1.19, 1.27, 1.35, 1.63, 1.79, 1.91, 2.61, 2.95];
      document.querySelectorAll('#cap1 .w').forEach((el, i) => {
        tl.to(el, { opacity: 1, duration: 0.08, ease: "none" }, cap1Times[i]);
      });
      tl.to("#cap1", { opacity: 0, duration: 0.3, ease: "power2.in" }, 5.25);
      tl.set("#cap1", { opacity: 0 }, 5.55);

      // ── Caption 2: slide up, words pop in on TTS beats ───────────
      tl.fromTo("#cap2",
        { opacity: 1, y: 20 },
        { opacity: 1, y: 0, duration: 0.3, ease: "power3.out" }, 5.63);
      const cap2Times = [5.63, 6.23, 6.59, 6.89, 6.99, 7.11, 7.45, 8.27, 8.37, 8.51, 8.75, 9.05, 9.25, 9.49];
      document.querySelectorAll('#cap2 .w').forEach((el, i) => {
        tl.to(el, { opacity: 1, duration: 0.08, ease: "none" }, cap2Times[i]);
      });
      tl.to("#cap2", { opacity: 0, duration: 0.3, ease: "power2.in" }, 10.9);
      tl.set("#cap2", { opacity: 0 }, 11.2);

      // ── S3: scale + fade in, staggered branding ──────────────────
      tl.fromTo("#s3",
        { opacity: 0, scale: 0.93, y: 12 },
        { opacity: 1, scale: 1.0,  y: 0, duration: 0.55, ease: "power3.out" }, 11.2);
      tl.to("#branding-inner", { opacity: 1, duration: 0.45, ease: "power2.out" }, 11.65);

      // S3 fades cleanly at end
      tl.to("#s3", { opacity: 0, duration: 0.5, ease: "power1.in" }, 14.3);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
