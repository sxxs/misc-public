<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>89 · DLA-Dendrit — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header><a class="back" href="./">← Übersicht</a><h1>89 · DLA-Dendrit</h1></header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Diffusionslimitierte Aggregation: Teilchen wandern zufällig und haften beim Kontakt — ein Fraktal entsteht, das Frost, Blitz und Koralle in einem ist.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "dla-dendrit",
        params: [
            { key: "particles", label: "Partikel", min: 500, max: 5000, step: 250, value: 2000 },
            { key: "seed", label: "Keimform", value: "center", options: [
                { value: "center", label: "Mittelpunkt" },
                { value: "line",   label: "Bodenlinie" },
                { value: "ring",   label: "Ring" }
            ]},
            { key: "stickiness", label: "Haftung", min: 0.3, max: 1.0, step: 0.05, value: 1.0 },
            { key: "scale",      label: "Skalierung", min: 0.5, max: 2.0, step: 0.1, value: 1.0 }
        ],
        generate(api) {
            const { rnd, values } = api;
            const CX = 500, CY = 500;
            const STEP = 2;
            const STICK_DIST = 2.5;
            const CELL = 4;
            const TARGET = values.particles | 0;
            const SC = values.scale;
            const stickiness = values.stickiness;

            // spatial grid
            const grid = new Map();
            function gridKey(x, y) {
                return (Math.round(x / CELL) | 0) + "," + (Math.round(y / CELL) | 0);
            }
            function gridKeysAround(x, y) {
                const gx = Math.round(x / CELL) | 0;
                const gy = Math.round(y / CELL) | 0;
                const keys = [];
                for (let ox = -2; ox <= 2; ox++)
                    for (let oy = -2; oy <= 2; oy++)
                        keys.push((gx + ox) + "," + (gy + oy));
                return keys;
            }

            // stuck particles: {x, y, parentIdx, depth}
            const stuck = [];
            function addStuck(x, y, parentIdx) {
                const depth = parentIdx < 0 ? 0 : stuck[parentIdx].depth + 1;
                const idx = stuck.length;
                stuck.push({ x, y, parentIdx, depth });
                const k = gridKey(x, y);
                if (!grid.has(k)) grid.set(k, []);
                grid.get(k).push(idx);
                return idx;
            }

            // seed
            if (values.seed === "center") {
                addStuck(CX, CY, -1);
            } else if (values.seed === "line") {
                for (let sx = 60; sx <= 940; sx += 6) addStuck(sx, 920, -1);
            } else { // ring
                const R_RING = 320 * SC;
                const N_RING = 80;
                for (let i = 0; i < N_RING; i++) {
                    const a = (i / N_RING) * Math.PI * 2;
                    addStuck(CX + R_RING * Math.cos(a), CY + R_RING * Math.sin(a), -1);
                }
            }

            // find closest stuck neighbor; returns parentIdx or -1
            function findNeighbor(px, py) {
                for (const k of gridKeysAround(px, py)) {
                    const list = grid.get(k);
                    if (!list) continue;
                    for (const idx of list) {
                        const s = stuck[idx];
                        const dx = px - s.x, dy = py - s.y;
                        if (dx * dx + dy * dy <= STICK_DIST * STICK_DIST) return idx;
                    }
                }
                return -1;
            }

            // bounding radius of stuck cluster
            let maxR = 0;
            function updateMaxR(x, y) {
                const r = Math.hypot(x - CX, y - CY);
                if (r > maxR) maxR = r;
            }
            for (const s of stuck) updateMaxR(s.x, s.y);

            // spawn position on a circle
            function spawnPos() {
                if (values.seed === "line") {
                    // spawn from top area
                    const a = rnd() * Math.PI * 2;
                    const R = Math.min(maxR + 30, 430);
                    return [CX + R * Math.cos(a), CY - 200 + R * Math.sin(a) * 0.4];
                }
                const a = rnd() * Math.PI * 2;
                const R = Math.min(maxR * SC + 30, 450);
                return [CX + R * Math.cos(a), CY + R * Math.sin(a)];
            }

            const KILL_R = 480;
            let count = stuck.length;
            const BATCH = 30; // particles per frame attempt

            function frame() {
                if (api.cancelled()) return;
                let added = 0;
                for (let b = 0; b < BATCH && count < TARGET; b++) {
                    // walk one particle until stuck or killed
                    let [px, py] = spawnPos();
                    let steps = 0;
                    const maxSteps = 2000;
                    while (steps < maxSteps) {
                        steps++;
                        const angle = rnd() * Math.PI * 2;
                        px += STEP * Math.cos(angle);
                        py += STEP * Math.sin(angle);

                        // kill if too far
                        if (Math.hypot(px - CX, py - CY) > KILL_R) break;

                        // check for neighbor
                        const parentIdx = findNeighbor(px, py);
                        if (parentIdx >= 0) {
                            if (stickiness >= 1.0 || rnd() < stickiness) {
                                addStuck(px, py, parentIdx);
                                updateMaxR(px, py);
                                count++;
                                added++;
                            }
                            break;
                        }
                    }
                }

                // build lines from parent links
                if (api.cancelled()) return;
                const maxDepth = stuck.reduce((m, s) => Math.max(m, s.depth), 1) || 1;
                const lines = [];
                for (let i = 1; i < stuck.length; i++) {
                    const s = stuck[i];
                    if (s.parentIdx < 0) continue;
                    const p = stuck[s.parentIdx];
                    const t = s.depth / maxDepth;
                    const w = 1.5 * (1 - t) + 0.4 * t;
                    lines.push({ pts: [[p.x, p.y], [s.x, s.y]], w });
                }

                if (count < TARGET) {
                    api.draw(lines);
                    api.status("DLA: " + count + " / " + TARGET + " Teilchen");
                    requestAnimationFrame(frame);
                } else {
                    api.done(lines);
                }
            }

            requestAnimationFrame(frame);
        }
    });
    </script>
</body>
</html>
