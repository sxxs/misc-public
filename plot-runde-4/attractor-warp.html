<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attractor-Warpfeld — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>61 · Attractor-Warpfeld</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Nicht der Strange Attractor selbst wird gezeichnet, sondern sein <b>Vektorfeld</b> verzerrt ein feines Gitter — der Attraktor-Geist erscheint als Turbulenz, nicht als Punktwolke.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "attractor-warp",
        params: [
            { key: "type", label: "Typ", value: "dejong", options: [
                { value: "dejong", label: "De Jong" },
                { value: "clifford", label: "Clifford" }
            ]},
            { key: "a", label: "a", min: -2.5, max: 2.5, step: 0.01, value: 1.4 },
            { key: "b", label: "b", min: -2.5, max: 2.5, step: 0.01, value: -2.3 },
            { key: "c", label: "c", min: -2.5, max: 2.5, step: 0.01, value: 2.4 },
            { key: "d", label: "d", min: -2.5, max: 2.5, step: 0.01, value: -2.1 },
            { key: "grid", label: "Gitterdichte", min: 20, max: 60, step: 2, value: 36 },
            { key: "warp", label: "Warpstärke", min: 0.1, max: 3.0, step: 0.1, value: 1.2 },
            { key: "style", label: "Gitterstil", value: "grid", options: [
                { value: "grid", label: "Rechteck-Gitter" },
                { value: "radial", label: "Radial" },
                { value: "flow", label: "Strömungslinien" }
            ]}
        ],
        onRegen(rnd, params, values) {
            const dejong = values.type === "dejong";
            for (let attempt = 0; attempt < 50; attempt++) {
                const a = Math.round((rnd() * 5 - 2.5) * 100) / 100;
                const b = Math.round((rnd() * 5 - 2.5) * 100) / 100;
                const c = Math.round((rnd() * 5 - 2.5) * 100) / 100;
                const d = Math.round((rnd() * 5 - 2.5) * 100) / 100;
                let x = 0.1, y = 0.1;
                let minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
                const cells = new Set();
                for (let i = 0; i < 1200; i++) {
                    const nx = dejong ? Math.sin(a * y) - Math.cos(b * x)
                                      : Math.sin(a * y) + c * Math.cos(a * x);
                    const ny = dejong ? Math.sin(c * x) - Math.cos(d * y)
                                      : Math.sin(b * x) + d * Math.cos(b * y);
                    x = nx; y = ny;
                    if (i >= 100) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                        cells.add(Math.round(x * 12) + ":" + Math.round(y * 12));
                    }
                }
                if (Math.max(maxX - minX, maxY - minY) > 1.2 && cells.size > 250) {
                    for (const p of params) {
                        if (p.key === "a") p._set(a);
                        if (p.key === "b") p._set(b);
                        if (p.key === "c") p._set(c);
                        if (p.key === "d") p._set(d);
                    }
                    return;
                }
            }
        },
        generate(api) {
            const { values } = api;
            const lines = [];
            const M = 40, S = 920;
            const { a, b, c, d } = values;
            const dejong = values.type === "dejong";

            // Precompute vector field on VN x VN grid
            // Attractor space: [-2.5, 2.5]^2
            const VN = 80;
            const vxField = new Float32Array(VN * VN);
            const vyField = new Float32Array(VN * VN);

            for (let gy = 0; gy < VN; gy++) {
                for (let gx = 0; gx < VN; gx++) {
                    const u = -2.5 + gx / VN * 5;
                    const v = -2.5 + gy / VN * 5;
                    let nx, ny;
                    if (dejong) {
                        nx = Math.sin(a * v) - Math.cos(b * u);
                        ny = Math.sin(c * u) - Math.cos(d * v);
                    } else {
                        nx = Math.sin(a * v) + c * Math.cos(a * u);
                        ny = Math.sin(b * u) + d * Math.cos(b * v);
                    }
                    vxField[gy * VN + gx] = nx - u;
                    vyField[gy * VN + gx] = ny - v;
                }
            }

            // Bilinear interpolation of warp vector at page coords
            function warpAt(px, py) {
                const ax = (px - M) / S * (VN - 1);
                const ay = (py - M) / S * (VN - 1);
                const ix = Math.max(0, Math.min(VN - 2, Math.floor(ax)));
                const iy = Math.max(0, Math.min(VN - 2, Math.floor(ay)));
                const tx = ax - ix, ty = ay - iy;
                const vx = vxField[iy * VN + ix] * (1 - tx) * (1 - ty)
                         + vxField[iy * VN + ix + 1] * tx * (1 - ty)
                         + vxField[(iy + 1) * VN + ix] * (1 - tx) * ty
                         + vxField[(iy + 1) * VN + ix + 1] * tx * ty;
                const vy = vyField[iy * VN + ix] * (1 - tx) * (1 - ty)
                         + vyField[iy * VN + ix + 1] * tx * (1 - ty)
                         + vyField[(iy + 1) * VN + ix] * (1 - tx) * ty
                         + vyField[(iy + 1) * VN + ix + 1] * tx * ty;
                return [vx, vy];
            }

            if (values.style === "grid") {
                const rows = values.grid;
                const cols = values.grid * 2;
                const wampAmp = values.warp * (S / rows) * 0.3;

                // horizontal warped lines
                for (let r = 0; r <= rows; r++) {
                    const baseY = M + r / rows * S;
                    const pts = [];
                    for (let cx = 0; cx <= cols; cx++) {
                        const px = M + cx / cols * S;
                        const [vx, vy] = warpAt(px, baseY);
                        pts.push([px + vx * wampAmp * 0.3, baseY + vy * wampAmp]);
                    }
                    lines.push({ pts, w: 0.7 });
                }
                // vertical warped lines
                for (let col = 0; col <= cols; col++) {
                    const baseX = M + col / cols * S;
                    const pts = [];
                    for (let r = 0; r <= rows; r++) {
                        const py = M + r / rows * S;
                        const [vx, vy] = warpAt(baseX, py);
                        pts.push([baseX + vx * wampAmp, py + vy * wampAmp * 0.3]);
                    }
                    lines.push({ pts, w: 0.7 });
                }

            } else if (values.style === "radial") {
                // concentric rings, each point offset radially by warp
                const rings = values.grid;
                const spokePts = 72;
                const warpScale = values.warp * (S / rings) * 0.25;
                for (let ri = 1; ri <= rings; ri++) {
                    const baseR = ri / rings * (S / 2 - 10);
                    const pts = [];
                    for (let si = 0; si <= spokePts; si++) {
                        const angle = si / spokePts * Math.PI * 2;
                        const px = 500 + Math.cos(angle) * baseR;
                        const py = 500 + Math.sin(angle) * baseR;
                        // clamp to page
                        const cpx = Math.max(M, Math.min(M + S, px));
                        const cpy = Math.max(M, Math.min(M + S, py));
                        const [vx, vy] = warpAt(cpx, cpy);
                        // radial component of warp
                        const wr = (vx * Math.cos(angle) + vy * Math.sin(angle)) * warpScale;
                        const nr = baseR + wr;
                        pts.push([500 + Math.cos(angle) * nr, 500 + Math.sin(angle) * nr]);
                    }
                    lines.push({ pts, w: 0.7 });
                }
                // spokes
                const numSpokes = Math.round(values.grid * 1.5);
                for (let si = 0; si < numSpokes; si++) {
                    const angle = si / numSpokes * Math.PI * 2;
                    const pts = [];
                    for (let ri = 0; ri <= rings; ri++) {
                        const baseR = ri / rings * (S / 2 - 10);
                        const px = 500 + Math.cos(angle) * baseR;
                        const py = 500 + Math.sin(angle) * baseR;
                        const cpx = Math.max(M, Math.min(M + S, px));
                        const cpy = Math.max(M, Math.min(M + S, py));
                        const [vx, vy] = warpAt(cpx, cpy);
                        // tangential component of warp for spoke displacement
                        const wt = (-vx * Math.sin(angle) + vy * Math.cos(angle)) * values.warp * 0.1;
                        const warpedAngle = angle + wt;
                        pts.push([500 + Math.cos(warpedAngle) * baseR, 500 + Math.sin(warpedAngle) * baseR]);
                    }
                    lines.push({ pts, w: 0.7 });
                }

            } else {
                // flow lines: integrate streamlines from grid seed points
                const seedGrid = 20;
                const stepSize = S / 200;
                const numSteps = 60;
                const warpScale = values.warp * 0.15;

                for (let sy = 0; sy < seedGrid; sy++) {
                    for (let sx = 0; sx < seedGrid; sx++) {
                        let px = M + (sx + 0.5) / seedGrid * S;
                        let py = M + (sy + 0.5) / seedGrid * S;
                        const pts = [[px, py]];
                        for (let step = 0; step < numSteps; step++) {
                            if (px < M || px > M + S || py < M || py > M + S) break;
                            const [vx, vy] = warpAt(px, py);
                            const len = Math.sqrt(vx * vx + vy * vy) + 1e-9;
                            px += (vx / len) * stepSize * warpScale * values.warp;
                            py += (vy / len) * stepSize * warpScale * values.warp;
                            pts.push([px, py]);
                        }
                        if (pts.length >= 3) lines.push({ pts, w: 0.6 });
                    }
                }
            }

            // frame
            lines.push({ pts: [[M, M], [M + S, M], [M + S, M + S], [M, M + S]], closed: true, w: 1.2 });

            const typeName = dejong ? "De Jong" : "Clifford";
            api.status(typeName + " · a=" + a + " b=" + b + " c=" + c + " d=" + d);
            api.done(lines);
        }
    });
    </script>
</body>
</html>
