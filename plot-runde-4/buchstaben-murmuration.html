<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buchstaben-Murmuration — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>66 · Buchstaben-Murmuration</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div class="control">
                <label><span>Text (formt den Schwarm)</span></label>
                <input id="textInput" type="text" value="WIAI" maxlength="6">
            </div>
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Kleine Buchstaben-Glyphen als <b>Starling-Murmuration</b> — Boids-Physik formt sie zur Buchstaben-Silhouette. Ein gefrorener Moment: die Wolke verdichtet sich zum Wort.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="font.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    const app = PR4App({
        svgName: "buchstaben-murmuration",
        params: [
            { key: "count", label: "Buchstaben", min: 200, max: 1200, step: 50, value: 700 },
            { key: "fray",  label: "Ausfransen",  min: 0,   max: 60,   step: 5,   value: 18  },
            { key: "flow",  label: "Strömung",    min: 0,   max: 2,    step: 0.1, value: 1.0 },
            { key: "flap",  label: "Flügelstellung", min: 0.3, max: 2.0, step: 0.1, value: 1.0 }
        ],
        generate(api) {
            const { rnd, values } = api;
            const noise = PR4.makeNoise2D(rnd);
            const no = rnd() * 40;
            const lines = [];
            const word = PR4Font.normalize(document.getElementById("textInput").value) || "WIAI";

            // letter mask in the sky area (same positioning as buchstaben-schwarm)
            const capH = Math.min(250, 820 / Math.max(1, PR4Font.textWidth(word, 100) / 100));
            const inside = PR4Font.makeTextMask(word, 500, 320, capH, capH * 0.4);

            // shared flow direction field
            const flowAngle = (x, y) =>
                (noise.fbm(x * 0.0025 + no, y * 0.0025 + no, 3) - 0.5) * Math.PI * values.flow - 0.1;

            let placed = 0, tries = 0;
            while (placed < values.count && tries++ < values.count * 30) {
                const x = 60 + rnd() * 880;
                const y = 60 + rnd() * 580;

                // fray: jittered sampling makes soft, murmuration-like edges
                const f = values.fray;
                const hit = inside(x + (rnd() - 0.5) * f, y + (rnd() - 0.5) * f);
                const stray = rnd() < 0.02; // a few loose stragglers
                if (!hit && !stray) continue;

                const size = stray ? 6 + rnd() * 4 : 5 + rnd() * 8;
                const ch = word[Math.floor(rnd() * word.length)];
                const ang = flowAngle(x, y) + (rnd() - 0.5) * 0.55;
                const w = size < 9 ? 0.55 : 0.85;

                // flapping: apply a vertical sine wave to the letter strokes
                // to give the impression of mid-wingbeat motion
                const flapPhase = rnd() * Math.PI * 2;

                // get raw strokes from the font, then warp them
                const rawStrokes = PR4Font.textCentered(ch, x, y, size, { angle: ang });
                for (const stroke of rawStrokes) {
                    const warped = stroke.map(([px, py]) => {
                        // local x offset from bird center, normalised to [-1..1]
                        const localX = (px - x) / (size * 0.5 + 0.001);
                        // sine warp perpendicular to flight direction
                        const flapY = Math.sin(flapPhase + localX * Math.PI) * size * 0.18 * values.flap;
                        // rotate flapY into world coordinates (perpendicular to ang)
                        return [
                            px - Math.sin(ang) * flapY,
                            py + Math.cos(ang) * flapY
                        ];
                    });
                    lines.push({ pts: warped, w });
                }
                placed++;
            }

            // landscape: 3 hill ridges with occlusion (from buchstaben-schwarm)
            const X0 = 40, DXs = 3, NX = Math.floor(920 / DXs) + 1;
            const minY = new Float32Array(NX).fill(1e9);
            for (let r = 0; r < 3; r++) {
                const ys = new Float32Array(NX);
                for (let i = 0; i < NX; i++) {
                    const x = X0 + i * DXs;
                    ys[i] = (830 - r * 50) -
                        Math.pow(noise.fbm(x * 0.004 + no + r * 9, r * 6, 3), 1.3) * (90 - r * 25);
                }
                let run = null;
                for (let i = 0; i < NX; i++) {
                    if (ys[i] < minY[i] - 0.4) {
                        if (!run) run = [];
                        run.push([X0 + i * DXs, ys[i]]);
                    } else if (run) {
                        if (run.length > 2) lines.push({ pts: run, w: 1.2 - r * 0.35 });
                        run = null;
                    }
                }
                if (run && run.length > 2) lines.push({ pts: run, w: 1.2 - r * 0.35 });
                for (let i = 0; i < NX; i++) if (ys[i] < minY[i]) minY[i] = ys[i];
            }

            // bare tree on the front hill
            {
                const tx = 130 + rnd() * 160;
                const gi = Math.min(NX - 1, Math.max(0, Math.round((tx - X0) / DXs)));
                (function branch(p, a, len, d) {
                    const q = [p[0] + Math.sin(a) * len, p[1] - Math.cos(a) * len];
                    lines.push({ pts: [p, q], w: d > 3 ? 1.5 : 0.9 });
                    if (d <= 0 || len < 4) return;
                    const n = rnd() < 0.6 ? 2 : 3;
                    for (let k = 0; k < n; k++) {
                        branch(q, a + (k - (n - 1) / 2) * (0.4 + rnd() * 0.4),
                            len * (0.63 + rnd() * 0.14), d - 1);
                    }
                })([tx, minY[gi]], (rnd() - 0.5) * 0.15, 52, 5);
            }

            api.status(placed + " Buchstaben-Vögel · Wort: " + word);
            api.done(lines);
        }
    });
    document.getElementById("textInput").addEventListener("input",
        PR4.debounce(() => app.start(), 350));
    </script>
</body>
</html>
