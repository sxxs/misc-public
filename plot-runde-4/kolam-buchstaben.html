<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolam aus Buchstaben — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>69 · Kolam aus Buchstaben</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div class="control">
                <label><span>Wort (wird zu Kolam-Punkten)</span></label>
                <input id="textInput" type="text" value="WIAI" maxlength="6">
            </div>
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Das Wort wird <b>pixelisiert</b> — die gesetzten Pixel werden Kolam-Punkte. Eine Linie schlingt sich um sie herum: dein Name als südindische Schwellenkunst.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="font.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    const app = PR4App({
        svgName: "kolam-buchstaben",
        params: [
            { key: "resolution", label: "Auflösung", min: 8, max: 20, step: 1, value: 12 },
            { key: "dots", label: "Punkte zeigen", value: "an", options: [
                { value: "an",  label: "Ja"   },
                { value: "aus", label: "Nein" }
            ]},
            { key: "symmetry", label: "Symmetrie", value: "none", options: [
                { value: "none",     label: "Frei"           },
                { value: "mirror_x", label: "X-Gespiegelt"   },
                { value: "rot180",   label: "180° Rotiert"   }
            ]},
            { key: "style", label: "Bögen", value: "round", options: [
                { value: "round", label: "Abgerundet" },
                { value: "sharp", label: "Eckig"      }
            ]}
        ],
        generate(api) {
            const { rnd, values } = api;
            const lines = [];

            const word = (PR4Font.normalize(document.getElementById("textInput").value) || "WIAI").slice(0, 6);
            const res = values.resolution;

            // rasterize the letter to a pixel grid
            const capH = Math.min(650, 820 / Math.max(1, PR4Font.textWidth(word, 100) / 100));
            const PM = 40, PS = 920;
            const inside = PR4Font.makeTextMask(word, 500, 500, capH, capH * 0.3);

            const pixelGrid = [];
            for (let j = 0; j < res; j++) {
                pixelGrid.push([]);
                for (let i = 0; i < res; i++) {
                    const px = PM + (i + 0.5) / res * PS;
                    const py = PM + (j + 0.5) / res * PS;
                    pixelGrid[j].push(inside(px, py));
                }
            }

            // apply symmetry
            if (values.symmetry === "mirror_x") {
                for (let j = 0; j < res; j++) {
                    for (let i = 0; i < res; i++) {
                        if (pixelGrid[j][res - 1 - i]) pixelGrid[j][i] = true;
                        if (pixelGrid[j][i]) pixelGrid[j][res - 1 - i] = true;
                    }
                }
            } else if (values.symmetry === "rot180") {
                for (let j = 0; j < res; j++) {
                    for (let i = 0; i < res; i++) {
                        if (pixelGrid[res - 1 - j][res - 1 - i]) pixelGrid[j][i] = true;
                    }
                }
                // second pass for symmetry
                for (let j = 0; j < res; j++) {
                    for (let i = 0; i < res; i++) {
                        if (pixelGrid[j][i]) pixelGrid[res - 1 - j][res - 1 - i] = true;
                    }
                }
            }

            // Kolam lattice: arcs wrap around active dots
            // Lattice points (i,j) for i=0..res, j=0..res are the between-dot positions
            // A lattice point is active if any of its 4 neighboring dot cells is active
            function isActiveLattice(li, lj) {
                for (const [di, dj] of [[-1, -1], [-1, 0], [0, -1], [0, 0]]) {
                    const di2 = li + di, dj2 = lj + dj;
                    if (di2 >= 0 && di2 < res && dj2 >= 0 && dj2 < res && pixelGrid[dj2][di2]) return true;
                }
                return false;
            }

            // random bits for Truchet orientation — seeded per lattice point
            const bits = new Map();
            const getBit = (i, j) => {
                const k = i + ":" + j;
                if (!bits.has(k)) bits.set(k, rnd() < 0.5 ? 1 : 0);
                return bits.get(k);
            };

            // cell size and offset: dots span from dotO to dotO + res*cell
            const cell = 840 / res;
            const dotO = 80;
            const r = cell / 2;

            const arcSteps = values.style === "round" ? 8 : 2;

            for (let j = 0; j <= res; j++) {
                for (let i = 0; i <= res; i++) {
                    if (!isActiveLattice(i, j)) continue;
                    const cx = dotO + i * cell;
                    const cy = dotO + j * cell;
                    const flip = getBit(i, j) === 1;
                    // two opposite quarter-circles create smooth weave around dots
                    const quarters = flip
                        ? [[Math.PI, 1.5 * Math.PI], [0, 0.5 * Math.PI]]
                        : [[0.5 * Math.PI, Math.PI], [1.5 * Math.PI, 2 * Math.PI]];
                    for (const [a0, a1] of quarters) {
                        const pts = [];
                        for (let s = 0; s <= arcSteps; s++) {
                            const a = a0 + (a1 - a0) * s / arcSteps;
                            const x = cx + r * Math.cos(a);
                            const y = cy + r * Math.sin(a);
                            // clip to dot area
                            if (x < dotO - 1 || x > dotO + res * cell + 1 ||
                                y < dotO - 1 || y > dotO + res * cell + 1) continue;
                            pts.push([x, y]);
                        }
                        if (pts.length > 1) lines.push({ pts, w: 1.2 });
                    }
                }
            }

            // draw active dot pixels as small circles
            let dotCount = 0;
            if (values.dots === "an") {
                for (let j = 0; j < res; j++) {
                    for (let i = 0; i < res; i++) {
                        if (!pixelGrid[j][i]) continue;
                        const x = dotO + (i + 0.5) * cell;
                        const y = dotO + (j + 0.5) * cell;
                        const c = [];
                        for (let s = 0; s <= 8; s++) {
                            const a = s / 8 * Math.PI * 2;
                            c.push([x + 2.5 * Math.cos(a), y + 2.5 * Math.sin(a)]);
                        }
                        lines.push({ pts: c, closed: true, w: 0.7 });
                        dotCount++;
                    }
                }
            }

            // thin outer frame
            lines.push({ pts: [[40, 40], [960, 40], [960, 960], [40, 960]], closed: true, w: 0.8 });

            api.status(dotCount + " Punkte \xb7 " + res + "x" + res + " Raster \xb7 " + word);
            api.done(lines);
        }
    });
    document.getElementById("textInput").addEventListener("input",
        PR4.debounce(() => app.start(), 350));
    </script>
</body>
</html>
