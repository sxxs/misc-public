<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ballonfahrt — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>31 · Ballonfahrt</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Heißluftballons über einer Hügellandschaft: Jede Hülle
            bekommt Meridian-Bahnen wie ein Globus, Bänder und einen Korb an
            Seilen. Ferne Ballons sind klein und dünn gezeichnet, dazu Wolken-
            Striche und gestaffelte Hügel.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "ballonfahrt",
        params: [
            { key: "count", label: "Ballons", min: 2, max: 9, step: 1, value: 5 },
            { key: "gores", label: "Bahnen", min: 3, max: 9, step: 1, value: 6 },
            { key: "clouds", label: "Wolken", min: 0, max: 10, step: 1, value: 5 }
        ],
        generate(api) {
            const { rnd, values } = api;
            const noise = PR4.makeNoise2D(rnd);
            const no = rnd() * 50;
            const lines = [];

            // balloon envelope half-width profile, u: 0 = top, 1 = neck
            function profile(u) {
                if (u < 0.62) {
                    const a = u / 0.62 * Math.PI * 0.58;          // round crown
                    return Math.sin(a + Math.PI * 0.08) / Math.sin(Math.PI * 0.58 + Math.PI * 0.08);
                }
                const v = (u - 0.62) / 0.38;                      // taper to the neck
                return 1 - v * 0.78 + Math.sin(v * Math.PI) * 0.02;
            }

            function balloon(cx, cy, R, w) {
                const H = R * 2.15;                                // envelope height
                const top = cy - H / 2;
                const px = (u, f) => cx + profile(u) * R * f;
                const py = (u) => top + u * H;
                // outline
                const left = [], right = [];
                for (let s = 0; s <= 30; s++) {
                    const u = s / 30;
                    left.push([px(u, -1), py(u)]);
                    right.push([px(u, 1), py(u)]);
                }
                lines.push({ pts: left, w: w * 1.25 });
                lines.push({ pts: right, w: w * 1.25 });
                lines.push({ pts: [[px(0, -1), py(0)], [px(0, 1), py(0)]], w: w * 1.25 });
                // gores (meridians)
                const g = values.gores;
                for (let k = 1; k < g; k++) {
                    const f = Math.sin((k / g - 0.5) * Math.PI);
                    const mer = [];
                    for (let s = 0; s <= 30; s++) {
                        const u = s / 30;
                        mer.push([px(u, f), py(u)]);
                    }
                    lines.push({ pts: mer, w });
                }
                // horizontal bands
                for (const u of [0.3, 0.52]) {
                    const band = [];
                    for (let s = 0; s <= 20; s++) {
                        const f = -1 + (s / 20) * 2;
                        band.push([px(u, f), py(u) + Math.cos(f * Math.PI / 2) * R * 0.05]);
                    }
                    lines.push({ pts: band, w });
                }
                // neck, ropes, basket
                const nl = [px(1, -1), py(1)], nr = [px(1, 1), py(1)];
                const bw = R * 0.34, bh = R * 0.26;
                const by = py(1) + R * 0.3;
                const bl = [cx - bw / 2, by], br = [cx + bw / 2, by];
                lines.push({ pts: [nl, bl], w });
                lines.push({ pts: [nr, br], w });
                lines.push({ pts: [bl, br, [br[0], by + bh], [bl[0], by + bh]], closed: true, w: w * 1.25 });
                for (let i = 1; i < 4; i++) {
                    lines.push({ pts: [[bl[0] + bw * i / 4, by], [bl[0] + bw * i / 4, by + bh]], w: w * 0.8 });
                }
                lines.push({ pts: [[bl[0], by + bh * 0.5], [br[0], by + bh * 0.5]], w: w * 0.8 });
                return R;
            }

            // place balloons: big in front (low), small behind (high)
            const placed = [];
            let tries = 0;
            while (placed.length < values.count && tries++ < 400) {
                const depth = rnd();                              // 0 = front, 1 = far
                const R = 100 - depth * 75;
                const x = 110 + rnd() * 780;
                const y = 120 + depth * 200 + rnd() * 300;
                if (y + R * 2.6 > 850 - depth * 80) continue;
                if (!placed.every(b => Math.hypot(b.x - x, b.y - y) > (b.R + R) * 1.45)) continue;
                placed.push({ x, y, R, depth });
            }
            placed.sort((a, b) => b.depth - a.depth);
            for (const b of placed) {
                balloon(b.x, b.y, b.R, 0.55 + (1 - b.depth) * 0.7);
            }

            // clouds: stacked short dashes
            for (let c = 0; c < values.clouds; c++) {
                const cx = 90 + rnd() * 800, cy = 90 + rnd() * 380;
                const cw = 50 + rnd() * 90;
                if (placed.some(b => Math.hypot(b.x - cx, b.y - cy) < b.R * 2.2)) continue;
                for (let row = 0; row < 3; row++) {
                    const rw = cw * (1 - row * 0.28);
                    lines.push({ pts: [[cx - rw / 2 + row * 8, cy + row * 7],
                                       [cx + rw / 2 + row * 4, cy + row * 7]], w: 0.7 });
                }
            }

            // hills with occlusion
            const X0 = 40, DXs = 3, NX = Math.floor(920 / DXs) + 1;
            const minY = new Float32Array(NX).fill(1e9);
            for (let r = 0; r < 4; r++) {
                const t = r / 3;
                const ys = new Float32Array(NX);
                for (let i = 0; i < NX; i++) {
                    const x = X0 + i * DXs;
                    ys[i] = (920 - t * 160) -
                        Math.pow(noise.fbm(x * (0.003 + t * 0.002) + no + r * 13, r * 5, 3), 1.3) * (90 - t * 40);
                }
                let run = null;
                for (let i = 0; i < NX; i++) {
                    if (ys[i] < minY[i] - 0.4 && ys[i] < 962) {
                        if (!run) run = [];
                        run.push([X0 + i * DXs, ys[i]]);
                    } else if (run) {
                        if (run.length > 2) lines.push({ pts: run, w: 1.3 - t * 0.7 });
                        run = null;
                    }
                }
                if (run && run.length > 2) lines.push({ pts: run, w: 1.3 - t * 0.7 });
                for (let i = 0; i < NX; i++) if (ys[i] < minY[i]) minY[i] = ys[i];
            }
            api.status(placed.length + " Ballons");
            api.done(lines);
        }
    });
    </script>
</body>
</html>
