<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Op-Art Blaze — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>47 · Op-Art Blaze</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Nach Bridget Rileys „Blaze“: Konzentrische
            <b>Zickzack-Ringe</b>, deren Phase sich von Ring zu Ring dreht —
            das Auge sieht eine rotierende Spirale, die nicht existiert.
            Exakte Wiederholung, maximale Wirkung; optional aus der Mitte
            verschoben.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "blaze",
        svgOpts: { width: 0.9 },
        drawOpts: { width: 1.1 },
        params: [
            { key: "rings", label: "Ringe", min: 8, max: 26, step: 1, value: 15 },
            { key: "teeth", label: "Zacken", min: 30, max: 140, step: 2, value: 72 },
            { key: "phase", label: "Phasendrehung", min: 0.1, max: 1.2, step: 0.05, value: 0.45 },
            { key: "offc", label: "Zentrum-Versatz", min: 0, max: 180, step: 10, value: 60 }
        ],
        generate(api) {
            const { rnd, values } = api;
            const lines = [];
            const oa = rnd() * Math.PI * 2;
            const CX = 500 + Math.cos(oa) * values.offc;
            const CY = 500 + Math.sin(oa) * values.offc;
            const K = values.rings;
            const T = values.teeth;
            const R0 = 52, R1 = 452;

            let phase = 0;
            for (let k = 0; k < K; k++) {
                // perceptual spacing: rings get closer toward the rim
                const f0 = Math.pow(k / K, 0.8), f1 = Math.pow((k + 0.62) / K, 0.8);
                const rIn = R0 + (R1 - R0) * f0;
                const rOut = R0 + (R1 - R0) * f1;
                phase += values.phase / Math.sqrt(k + 1);
                const pts = [];
                for (let i = 0; i <= T * 2; i++) {
                    const a = (i / (T * 2)) * Math.PI * 2 + phase;
                    const r = (i % 2 === 0) ? rIn : rOut;
                    pts.push([CX + r * Math.cos(a), CY + r * Math.sin(a)]);
                }
                // clip to the page circle around the true centre
                let run = null;
                for (const p of pts) {
                    if (Math.hypot(p[0] - 500, p[1] - 500) <= 458) {
                        if (!run) run = [];
                        run.push(p);
                    } else if (run) {
                        if (run.length > 1) lines.push(run);
                        run = null;
                    }
                }
                if (run && run.length > 1) lines.push(run);
            }
            // frame circle
            const frame = [];
            for (let i = 0; i <= 180; i++) {
                const a = i / 180 * Math.PI * 2;
                frame.push([500 + 458 * Math.cos(a), 500 + 458 * Math.sin(a)]);
            }
            lines.push({ pts: frame, closed: true, w: 1.4 });
            api.status(K + " Zickzack-Ringe × " + T + " Zacken");
            api.done(lines);
        }
    });
    </script>
</body>
</html>
