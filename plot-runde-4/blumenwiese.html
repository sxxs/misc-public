<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blumenwiese — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>33 · Blumenwiese</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Wildblumenwiese im Wind: Margeriten, Glockenblumen,
            Pusteblumen und Knospen auf gebogenen Stängeln — alle neigen sich
            derselben Böe entgegen, ein paar Samen fliegen davon. Hinten klein
            und dünn, vorne groß und kräftig (botanische Plotter-Klassik).</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "blumenwiese",
        params: [
            { key: "flowers", label: "Blumen", min: 12, max: 60, step: 2, value: 32 },
            { key: "wind", label: "Wind", min: 0, max: 2, step: 0.1, value: 1 },
            { key: "seeds", label: "Fliegende Samen", min: 0, max: 20, step: 1, value: 8 }
        ],
        generate(api) {
            const { rnd, values } = api;
            const noise = PR4.makeNoise2D(rnd);
            const no = rnd() * 30;
            const lines = [];
            const WIND = values.wind * (rnd() < 0.5 ? 1 : -1) * 0.9;

            // bent stem: returns top point and tangent angle
            function stem(x0, y0, h, w, bend) {
                const pts = [];
                for (let s = 0; s <= 16; s++) {
                    const u = s / 16;
                    pts.push([x0 + bend * h * u * u, y0 - u * h]);
                }
                lines.push({ pts, w });
                const tip = pts[16];
                const tang = Math.atan2(pts[16][1] - pts[14][1], pts[16][0] - pts[14][0]);
                return { tip, tang };
            }
            function leaf(x, y, ang, len, w) {
                const a = [], b = [];
                for (let s = 0; s <= 10; s++) {
                    const u = s / 10;
                    const wid = Math.sin(u * Math.PI) * len * 0.13;
                    const px = x + Math.cos(ang) * u * len, py = y + Math.sin(ang) * u * len;
                    a.push([px - Math.sin(ang) * wid, py + Math.cos(ang) * wid]);
                    b.push([px + Math.sin(ang) * wid, py - Math.cos(ang) * wid]);
                }
                lines.push({ pts: a.concat(b.reverse()), closed: true, w });
            }

            // flower heads, all drawn around tip with up-vector along stem tangent
            function daisy(tip, tang, R, w) {
                const up = tang;        // petals around the tip
                const petals = 9 + Math.floor(rnd() * 4);
                for (let p = 0; p < petals; p++) {
                    const a = up + (p / petals) * Math.PI * 2;
                    const po = [];
                    for (let s = 0; s <= 10; s++) {
                        const u = s / 10;
                        const r = Math.sin(u * Math.PI) * R * 0.32;
                        const d = R * 0.35 + u * R * 0.65;
                        po.push([tip[0] + Math.cos(a) * d - Math.sin(a) * r,
                                 tip[1] + Math.sin(a) * d + Math.cos(a) * r]);
                    }
                    lines.push({ pts: po, closed: true, w });
                }
                const c = [];
                for (let i = 0; i <= 16; i++) {
                    const a = i / 16 * Math.PI * 2;
                    c.push([tip[0] + R * 0.3 * Math.cos(a), tip[1] + R * 0.3 * Math.sin(a)]);
                }
                lines.push({ pts: c, closed: true, w });
            }
            function dandelion(tip, tang, R, w) {
                const rays = 18 + Math.floor(rnd() * 8);
                for (let p = 0; p < rays; p++) {
                    const a = (p / rays) * Math.PI * 2 + rnd() * 0.1;
                    const ex = tip[0] + Math.cos(a) * R, ey = tip[1] + Math.sin(a) * R;
                    lines.push({ pts: [[tip[0], tip[1]], [ex, ey]], w: w * 0.7 });
                    // tiny pappus fork at the end
                    for (const da of [-0.35, 0.35]) {
                        lines.push({ pts: [[ex, ey],
                            [ex + Math.cos(a + da) * R * 0.18, ey + Math.sin(a + da) * R * 0.18]], w: w * 0.6 });
                    }
                }
                const c = [];
                for (let i = 0; i <= 12; i++) {
                    const a = i / 12 * Math.PI * 2;
                    c.push([tip[0] + R * 0.12 * Math.cos(a), tip[1] + R * 0.12 * Math.sin(a)]);
                }
                lines.push({ pts: c, closed: true, w });
            }
            function bellflower(tip, tang, R, w) {
                // hanging bell: cup opening downward from a hooked tip
                const a0 = tang + Math.PI / 2;
                const bell = [];
                for (let s = 0; s <= 16; s++) {
                    const u = -1 + (s / 16) * 2;
                    bell.push([tip[0] + u * R * 0.55 + Math.sin(a0) * 0,
                               tip[1] + Math.abs(u) * R * 0.2 + R * 0.0]);
                }
                // cup body
                const L = [], Rr = [];
                for (let s = 0; s <= 10; s++) {
                    const u = s / 10;
                    const wdt = R * (0.28 + u * 0.34);
                    L.push([tip[0] - wdt, tip[1] + u * R * 0.85]);
                    Rr.push([tip[0] + wdt, tip[1] + u * R * 0.85]);
                }
                lines.push({ pts: L, w });
                lines.push({ pts: Rr, w });
                // scalloped opening
                const open = [];
                for (let s = 0; s <= 18; s++) {
                    const u = s / 18;
                    open.push([tip[0] - R * 0.62 + u * R * 1.24,
                               tip[1] + R * 0.85 + Math.abs(Math.sin(u * Math.PI * 3)) * R * 0.13]);
                }
                lines.push({ pts: open, w });
            }
            function bud(tip, tang, R, w) {
                const o = [];
                for (let s = 0; s <= 20; s++) {
                    const u = s / 20;
                    const a = Math.PI * (1 + u);
                    const rr = R * 0.45 * (0.6 + 0.4 * Math.sin(u * Math.PI));
                    o.push([tip[0] + Math.cos(a) * rr, tip[1] - R * 0.3 + Math.sin(a) * rr * 1.5]);
                }
                lines.push({ pts: o, closed: true, w });
                lines.push({ pts: [[tip[0], tip[1] - R * 0.1], [tip[0], tip[1] - R * 0.55]], w: w * 0.8 });
            }

            // meadow rows: back to front
            const rows = [
                { y: 600, s: 0.45, w: 0.55, share: 0.4 },
                { y: 740, s: 0.7, w: 0.9, share: 0.33 },
                { y: 900, s: 1.1, w: 1.3, share: 0.27 }
            ];
            // ground lines
            for (const row of rows) {
                const pts = [];
                for (let x = 40; x <= 960; x += 7) {
                    pts.push([x, row.y + 8 + (noise.fbm(x * 0.008 + row.y, 2, 2) - 0.5) * 10]);
                }
                lines.push({ pts, w: row.w * 0.7 });
            }
            let total = 0;
            for (const row of rows) {
                const count = Math.max(2, Math.round(values.flowers * row.share));
                const slot = 880 / count;
                for (let k = 0; k < count; k++) {
                    const x = 60 + k * slot + rnd() * slot * 0.7;
                    const y = row.y + (rnd() - 0.5) * 24 * row.s;
                    const h = (90 + rnd() * 130) * row.s;
                    const bend = WIND * (0.25 + rnd() * 0.3) +
                        (noise.fbm(x * 0.004 + no, row.y, 2) - 0.5) * 0.4;
                    const { tip, tang } = stem(x, y, h, row.w, bend);
                    // grass blades beside the stem
                    for (let g = 0; g < 2; g++) {
                        const gx = x + (rnd() - 0.5) * slot * 0.5;
                        const gh = h * (0.25 + rnd() * 0.25);
                        const blade = [];
                        for (let s = 0; s <= 8; s++) {
                            const u = s / 8;
                            blade.push([gx + bend * gh * u * u * 1.4, y - u * gh]);
                        }
                        lines.push({ pts: blade, w: row.w * 0.6 });
                    }
                    if (rnd() < 0.7) {
                        leaf(x + bend * h * 0.18, y - h * 0.4,
                             (bend > 0 ? 0.5 : Math.PI - 0.5) - Math.PI / 2 + bend,
                             22 * row.s + rnd() * 14, row.w * 0.8);
                    }
                    const R = (16 + rnd() * 14) * row.s;
                    const kind = rnd();
                    if (kind < 0.34) daisy(tip, tang, R, row.w);
                    else if (kind < 0.58) dandelion(tip, tang, R * 1.15, row.w);
                    else if (kind < 0.8) bellflower(tip, tang, R, row.w);
                    else bud(tip, tang, R, row.w);
                    total++;
                }
            }
            // flying dandelion seeds downwind
            for (let s = 0; s < values.seeds; s++) {
                const x = 200 + rnd() * 700, y = 150 + rnd() * 450;
                const drift = WIND >= 0 ? 1 : -1;
                const a = -0.6 * drift + (rnd() - 0.5) * 0.6;
                const len = 10 + rnd() * 8;
                const ex = x + Math.cos(a) * len * drift, ey = y + Math.sin(a) * len;
                lines.push({ pts: [[x, y], [ex, ey]], w: 0.5 });
                for (const da of [-0.4, 0.4]) {
                    lines.push({ pts: [[ex, ey], [ex + Math.cos(a + da) * 6 * drift,
                                                  ey + Math.sin(a + da) * 6]], w: 0.5 });
                }
            }
            // sun
            const sx = 790 + rnd() * 90, sy = 130 + rnd() * 60;
            for (const r of [55, 47]) {
                const c = [];
                for (let i = 0; i <= 40; i++) {
                    const a = i / 40 * Math.PI * 2;
                    c.push([sx + r * Math.cos(a), sy + r * Math.sin(a)]);
                }
                lines.push({ pts: c, closed: true, w: 0.9 });
            }
            api.status(total + " Blumen");
            api.done(lines);
        }
    });
    </script>
</body>
</html>
