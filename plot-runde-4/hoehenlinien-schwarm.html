<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Höhenlinien-Schwarm — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>68 · Höhenlinien-Schwarm</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div class="control">
                <label><span>Wort / Symbol</span></label>
                <input id="textInput" type="text" value="WIAI" maxlength="8">
            </div>
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Dein Wort als <b>topografische Insel</b> — ein Vogelschwarm umfliegt den Buchstaben-Berg entlang der Isokonturen als Flugrouten.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="font.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    const app = PR4App({
        svgName: "hoehenlinien-schwarm",
        params: [
            { key: "lines_count", label: "Höhenlinien",  min: 6,   max: 24,  step: 1,   value: 14  },
            { key: "smooth",      label: "Weichheit",    min: 3,   max: 14,  step: 1,   value: 6   },
            { key: "birds",       label: "Vögel",        min: 100, max: 800, step: 50,  value: 400 },
            { key: "wind",        label: "Strömung",     min: 0,   max: 1.5, step: 0.1, value: 0.6 }
        ],
        generate(api) {
            const { rnd, values } = api;
            const noise = PR4.makeNoise2D(rnd);
            const no = rnd() * 40;
            const lines = [];

            const word = PR4Font.normalize(document.getElementById("textInput").value).slice(0, 8) || "WIAI";

            // --- PART 1: height field from text mask ---
            const capH = Math.min(420, 820 / Math.max(1, PR4Font.textWidth(word, 100) / 100));
            const inside = PR4Font.makeTextMask(word, 500, 500, capH, Math.max(14, capH * 0.22));

            const G = 200;
            const PM = 40, PS = 920;
            const mapToPage = (g) => PM + g * (PS / (G - 1));

            let f = new Float32Array(G * G);
            for (let y = 0; y < G; y++) {
                for (let x = 0; x < G; x++) {
                    f[y * G + x] = inside(mapToPage(x), mapToPage(y)) ? 1 : 0;
                }
            }

            // separable box blur
            function blur(src, rad) {
                const tmp = new Float32Array(G * G);
                const out = new Float32Array(G * G);
                for (let y = 0; y < G; y++) {
                    for (let x = 0; x < G; x++) {
                        let s = 0, n = 0;
                        for (let k = -rad; k <= rad; k++) {
                            const xx = x + k;
                            if (xx >= 0 && xx < G) { s += src[y * G + xx]; n++; }
                        }
                        tmp[y * G + x] = s / n;
                    }
                }
                for (let y = 0; y < G; y++) {
                    for (let x = 0; x < G; x++) {
                        let s = 0, n = 0;
                        for (let k = -rad; k <= rad; k++) {
                            const yy = y + k;
                            if (yy >= 0 && yy < G) { s += tmp[yy * G + x]; n++; }
                        }
                        out[y * G + x] = s / n;
                    }
                }
                return out;
            }
            for (let p = 0; p < values.smooth; p++) f = blur(f, 2);

            let lo = 1, hi = 0;
            for (let i = 0; i < f.length; i++) { lo = Math.min(lo, f[i]); hi = Math.max(hi, f[i]); }

            // --- PART 2: draw thin contour lines ---
            const K = values.lines_count;
            const allContours = []; // store all contour polylines for bird placement
            for (let k = 0; k < K; k++) {
                const t = lo + (hi - lo) * Math.pow((k + 0.5) / K, 0.7);
                const cs = PR4.contourLines((x, y) => f[y * G + x], G, G, t, mapToPage, mapToPage);
                for (const c of cs) {
                    lines.push({ pts: c, w: 0.5 });
                    if (c.length >= 2) allContours.push(c);
                }
            }

            // --- PART 3: place birds along contour lines ---
            // Build arc-length info per contour for uniform sampling
            function contourArcLen(c) {
                const seg = [0];
                for (let i = 1; i < c.length; i++) {
                    const dx = c[i][0] - c[i-1][0], dy = c[i][1] - c[i-1][1];
                    seg.push(seg[i-1] + Math.sqrt(dx*dx + dy*dy));
                }
                return seg;
            }

            function sampleContour(c, arcSegs, t) {
                const total = arcSegs[arcSegs.length - 1];
                const target = t * total;
                // binary search for segment
                let lo2 = 0, hi2 = arcSegs.length - 2;
                while (lo2 < hi2) {
                    const mid = (lo2 + hi2) >> 1;
                    if (arcSegs[mid + 1] < target) lo2 = mid + 1;
                    else hi2 = mid;
                }
                const segT = (arcSegs[lo2 + 1] > arcSegs[lo2])
                    ? (target - arcSegs[lo2]) / (arcSegs[lo2 + 1] - arcSegs[lo2])
                    : 0;
                const p0 = c[lo2], p1 = c[lo2 + 1] || p0;
                return [p0[0] + (p1[0] - p0[0]) * segT, p0[1] + (p1[1] - p0[1]) * segT,
                        p1[0] - p0[0], p1[1] - p0[1]]; // [x, y, dx, dy]
            }

            // precompute arc lengths
            const contourArc = allContours.map(c => contourArcLen(c));

            // bird wing glyph
            function drawBird(bx, by, ang, size, flap, w) {
                for (const sgn of [-1, 1]) {
                    const wing = [];
                    for (let s = 0; s <= 4; s++) {
                        const uu = s / 4;
                        const wx = uu * size * sgn;
                        const wy = -Math.sin(uu * Math.PI * 0.5) * size * 0.55 * flap;
                        wing.push([
                            bx + wx * Math.cos(ang) - wy * Math.sin(ang),
                            by + wx * Math.sin(ang) + wy * Math.cos(ang)
                        ]);
                    }
                    lines.push({ pts: wing, w });
                }
            }

            let birdCount = 0;
            if (allContours.length > 0) {
                for (let b = 0; b < values.birds; b++) {
                    // pick a random contour, weighted by length
                    const ci = Math.floor(rnd() * allContours.length);
                    const c = allContours[ci];
                    const arcs = contourArc[ci];
                    if (arcs[arcs.length - 1] < 1) continue;

                    const t = rnd();
                    const [bx0, by0, tdx, tdy] = sampleContour(c, arcs, t);

                    // tangent angle of contour
                    const tLen = Math.sqrt(tdx * tdx + tdy * tdy);
                    let tangAng = tLen > 0.001 ? Math.atan2(tdy, tdx) : 0;

                    // small perpendicular jitter
                    const perp = tangAng + Math.PI * 0.5;
                    const jitter = (rnd() - 0.5) * 12;
                    const bx = bx0 + Math.cos(perp) * jitter;
                    const by = by0 + Math.sin(perp) * jitter;

                    // add noise-based wind influence to angle
                    const windNoise = (noise.fbm(bx * 0.003 + no, by * 0.003 + no, 2) - 0.5)
                        * Math.PI * values.wind;
                    const ang = tangAng + windNoise + (rnd() - 0.5) * 0.3;

                    // size varies: smaller near the dense center (higher altitude = farther = smaller)
                    const heightHere = f[
                        Math.max(0, Math.min(G - 1, Math.round((by - PM) / PS * (G - 1)))) * G +
                        Math.max(0, Math.min(G - 1, Math.round((bx - PM) / PS * (G - 1))))
                    ];
                    const size = 3 + rnd() * 5 * (1 - heightHere * 0.6);
                    const flap = 0.5 + rnd() * 1.3;
                    const w = size < 5 ? 0.5 : 0.85;

                    if (bx < 45 || bx > 955 || by < 45 || by > 955) continue;
                    drawBird(bx, by, ang, size, flap, w);
                    birdCount++;
                }
            }

            // faint title strip at bottom
            for (const s of PR4Font.textCentered(word, 500, 975, 16)) lines.push({ pts: s, w: 0.6 });

            api.status(birdCount + ' Voegel | ' + K + ' Hoehenlinien | ' + word);
            api.done(lines);
        }
    });
    document.getElementById("textInput").addEventListener("input",
        PR4.debounce(() => app.start(), 350));
    </script>
</body>
</html>
