<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>97 · Kármán-Wirbel — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header><a class="back" href="./">← Übersicht</a><h1>97 · Kármán-Wirbel</h1></header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Kármán'sche Wirbelstraße: alternierende Punktwirbel bilden das klassische Muster, das hinter Zylindern in Strömungen entsteht. Stromlinien zeichnen die unsichtbare Physik sichtbar.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "karman-wirbel",
        params: [
            { key: "vortexN",     label: "Wirbel-Anzahl",       min: 2,    max: 8,     step: 1,    value: 4 },
            { key: "dOverA",      label: "Abstandsverhältnis",   min: 0.3,  max: 1.2,   step: 0.05, value: 0.65 },
            { key: "nLines",      label: "Stromlinien",          min: 10,   max: 50,    step: 5,    value: 25 },
            { key: "circulation", label: "Zirkulation",          min: 3000, max: 30000, step: 1000, value: 12000 },
            { key: "strom",       label: "Grundströmung", value: "aus", options: [
                { value: "aus", label: "Aus" },
                { value: "an",  label: "An"  }
            ]}
        ],
        generate(api) {
            const { rnd, values } = api;
            const lines = [];

            const N = values.vortexN | 0;
            const GAMMA = values.circulation;
            const TAU = 2 * Math.PI;

            // Spacing between vortex columns
            const a = 900 / N;
            // Row separation: d = a * dOverA
            const d = a * values.dOverA;

            // Build vortex list: [x, y, gamma]
            // Row 1 (y = 500 - d/2): +Gamma, at x = 50 + k*a
            // Row 2 (y = 500 + d/2): -Gamma, at x = 50 + a/2 + k*a
            const vortices = [];
            const y1 = 500 - d / 2;
            const y2 = 500 + d / 2;
            for (let k = 0; k < N; k++) {
                vortices.push([50 + k * a, y1,  +GAMMA]);
                vortices.push([50 + a * 0.5 + k * a, y2, -GAMMA]);
            }

            // Background flow velocity (if enabled)
            // U0 derived so that a reasonable flow speed is added
            const U0 = (values.strom === "an") ? GAMMA / (a * 2) : 0;

            // ------------------------------------------------------------------
            // Velocity field: sum of all vortex contributions + background flow
            // ------------------------------------------------------------------
            function velocity(x, y) {
                let u = U0, v = 0;
                for (const [vx, vy, gamma] of vortices) {
                    const dx = x - vx;
                    const dy = y - vy;
                    const r2 = dx * dx + dy * dy;
                    if (r2 < 100) continue; // skip singularity
                    const inv = gamma / (TAU * r2);
                    u += -dy * inv;
                    v +=  dx * inv;
                }
                return [u, v];
            }

            // ------------------------------------------------------------------
            // RK4 streamline integration with constant arc-length step
            // ------------------------------------------------------------------
            function integrateStreamline(x0, y0, maxSteps, stepLen) {
                const pts = [[x0, y0]];
                let x = x0, y = y0;

                for (let s = 0; s < maxSteps; s++) {
                    // Compute RK4 with normalized step (constant arc length)
                    const [u1, v1] = velocity(x, y);
                    const sp1 = Math.sqrt(u1 * u1 + v1 * v1);
                    if (sp1 < 0.5) break;
                    const dt1 = stepLen / sp1;

                    const x2 = x + u1 * dt1 / 2;
                    const y2 = y + v1 * dt1 / 2;
                    const [u2, v2] = velocity(x2, y2);
                    const sp2 = Math.sqrt(u2 * u2 + v2 * v2);
                    if (sp2 < 0.5) break;
                    const dt2 = stepLen / sp2;

                    const x3 = x + u2 * dt2 / 2;
                    const y3 = y + v2 * dt2 / 2;
                    const [u3, v3] = velocity(x3, y3);
                    const sp3 = Math.sqrt(u3 * u3 + v3 * v3);
                    if (sp3 < 0.5) break;
                    const dt3 = stepLen / sp3;

                    const x4 = x + u3 * dt3;
                    const y4 = y + v3 * dt3;
                    const [u4, v4] = velocity(x4, y4);
                    const sp4 = Math.sqrt(u4 * u4 + v4 * v4);
                    if (sp4 < 0.5) break;
                    const dt4 = stepLen / sp4;

                    // Average dt weighted by RK4
                    const dtAvg = (dt1 + 2 * dt2 + 2 * dt3 + dt4) / 6;
                    const nx = x + dtAvg * (u1 + 2 * u2 + 2 * u3 + u4) / 6;
                    const ny = y + dtAvg * (v1 + 2 * v2 + 2 * v3 + v4) / 6;

                    // Stop if outside canvas
                    if (nx < 20 || nx > 980 || ny < 20 || ny > 980) break;

                    // Stop if very close to a vortex center (singularity trap)
                    let nearVortex = false;
                    for (const [vx, vy] of vortices) {
                        if ((nx - vx) * (nx - vx) + (ny - vy) * (ny - vy) < 64) {
                            nearVortex = true;
                            break;
                        }
                    }
                    if (nearVortex) break;

                    x = nx; y = ny;
                    pts.push([x, y]);

                    // Also stop if we're clearly looping (too far from canvas center)
                    if (s > 100 && Math.abs(x - x0) < 2 && Math.abs(y - y0) < 2) break;
                }
                return pts;
            }

            // ------------------------------------------------------------------
            // Seed points: evenly spaced vertically at x = 55
            // Plus a second column for richer patterns
            // ------------------------------------------------------------------
            const nLines = values.nLines;
            const STEP_LEN = 4;
            const MAX_STEPS = 2500;

            const seeds = [];
            // Primary column at left edge
            for (let i = 0; i < nLines; i++) {
                const y = 80 + (i / (nLines - 1)) * 840;
                seeds.push([45, y]);
            }
            // Secondary column slightly inside
            const nLines2 = Math.floor(nLines * 0.4);
            for (let i = 0; i < nLines2; i++) {
                const y = 100 + (i / Math.max(1, nLines2 - 1)) * 800;
                seeds.push([500, y]);
            }

            let streamCount = 0;
            for (const [sx, sy] of seeds) {
                const pts = integrateStreamline(sx, sy, MAX_STEPS, STEP_LEN);
                if (pts.length >= 3) {
                    // Clip to canvas [40, 960]
                    const clipped = pts.filter(
                        ([px, py]) => px >= 40 && px <= 960 && py >= 40 && py <= 960
                    );
                    if (clipped.length >= 3) {
                        lines.push({ pts: clipped, w: 0.7 });
                        streamCount++;
                    }
                }
            }

            // ------------------------------------------------------------------
            // Draw vortex symbols
            // ------------------------------------------------------------------
            const VR = 6;  // vortex circle radius
            const TICK = 4;

            for (const [vx, vy, gamma] of vortices) {
                // Circle
                const circlePts = [];
                for (let i = 0; i <= 48; i++) {
                    const a = (i / 48) * TAU;
                    circlePts.push([vx + VR * Math.cos(a), vy + VR * Math.sin(a)]);
                }
                lines.push({ pts: circlePts, w: 1.0, closed: true });

                if (gamma > 0) {
                    // Plus (+)
                    lines.push({ pts: [[vx - TICK, vy], [vx + TICK, vy]], w: 1.0 });
                    lines.push({ pts: [[vx, vy - TICK], [vx, vy + TICK]], w: 1.0 });
                } else {
                    // Minus (−)
                    lines.push({ pts: [[vx - TICK, vy], [vx + TICK, vy]], w: 1.0 });
                }
            }

            // Thin frame
            lines.push({ pts: [[40, 40], [960, 40], [960, 960], [40, 960]], closed: true, w: 1.0 });

            api.status(streamCount + " Stromlinien · " + vortices.length + " Wirbel");
            api.done(lines);
        }
    });
    </script>
</body>
</html>
