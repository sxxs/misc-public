<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>74 · Unmögliche Treppe — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header><a class="back" href="./">← Übersicht</a><h1>74 · Unmögliche Treppe</h1></header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Die <b>Penrose-Treppe</b> in isometrischer Projektion: Eine Treppe steigt Stufe für Stufe aufwärts — und kommt am Ausgangspunkt an, ohne jemals oben angekommen zu sein. Geometrisch unmöglich, visuell überzeugend.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "escher-treppe",
        params: [
            { key: "arms",  label: "Arme",            min: 3,  max: 4,  step: 1,  value: 4 },
            { key: "steps", label: "Stufen pro Arm",  min: 4,  max: 12, step: 1,  value: 6 },
            { key: "width", label: "Treppenbreite",   min: 20, max: 60, step: 5,  value: 35 },
            { key: "hatch", label: "Schraffur",       value: "an", options: [
                { value: "an",  label: "An" },
                { value: "aus", label: "Aus" }
            ]}
        ],
        generate(api) {
            const { rnd, values } = api;
            const lines = [];

            const N    = values.steps;  // steps per arm
            const W    = values.width;  // tread depth in world units
            const H    = W * 0.5;      // riser height per step
            const ARMS = values.arms;
            const CX   = 500, CY = 500;

            // Isometric basis vectors (unit length in world space)
            // e1 = +i axis (rightward in iso), e2 = +j axis (leftward-forward in iso)
            const e1x = 0.866, e1y = 0.5;
            const e2x = -0.866, e2y = 0.5;

            // Project world (i, j, h) to screen (x, y)
            // Scale by 1 (world units are screen pixels)
            function iso(i, j, h) {
                return [
                    CX + i * e1x + j * e2x,
                    CY + i * e1y + j * e2y - h
                ];
            }

            // Arm length in world units
            const S = N * W;
            const halfS = S / 2;

            // 4-arm (square) layout
            // Corners in world (i, j) space: square of side S centered at origin
            const corners_ij = [
                [-halfS, -halfS],
                [+halfS, -halfS],
                [+halfS, +halfS],
                [-halfS, +halfS]
            ];

            // Arm directions (in world i,j):
            // arm 0: +i, arm 1: +j, arm 2: -i, arm 3: -j
            const armDirs = [
                { di: 1, dj: 0 },
                { di: 0, dj: 1 },
                { di: -1, dj: 0 },
                { di: 0, dj: -1 }
            ];

            // 3-arm (triangle) layout override
            if (ARMS === 3) {
                // Equilateral triangle in iso world space
                // Side length stays the same (S), arranged symmetrically
                const R = S * 0.65;
                // Three corners at 120° intervals in world (i,j) space
                // We tilt so the triangle sits nicely in iso view
                corners_ij[0] = [0, -R];
                corners_ij[1] = [R * 0.866, R * 0.5];
                corners_ij[2] = [-R * 0.866, R * 0.5];
                // Arm directions become the vectors between consecutive corners
                // (computed per-arm in the drawing loop)
            }

            // Accumulated base heights at each corner (ascending around the loop)
            // After ARMS arms, we'd be at ARMS*N*H — the impossibility is that
            // we pretend this equals 0 by just drawing each arm independently.
            const cornerH = [];
            for (let arm = 0; arm < 4; arm++) {
                cornerH[arm] = arm * N * H;
            }

            // Half-width perpendicular to the arm (the stair width on each side)
            const halfWidth = W * 0.5;

            function addLine(pts, w) {
                if (pts.length > 1) lines.push({ pts, w });
            }

            for (let arm = 0; arm < ARMS; arm++) {
                const [i0, j0] = corners_ij[arm];
                const [i1, j1] = corners_ij[(arm + 1) % (ARMS === 3 ? 3 : 4)];

                // Direction vector along this arm (normalized world units)
                let diLen = Math.hypot(i1 - i0, j1 - j0);
                if (diLen < 1e-9) diLen = 1;
                const diN = (i1 - i0) / diLen;
                const djN = (j1 - j0) / diLen;

                // Perpendicular direction (90° CCW rotation in ij space)
                const perpI = -djN;
                const perpJ =  diN;

                const h0 = cornerH[arm];

                for (let step = 0; step < N; step++) {
                    // Position along arm at the start and end of this step tread
                    const t0 = step / N;
                    const t1 = (step + 1) / N;

                    const fi0 = i0 + (i1 - i0) * t0;
                    const fj0 = j0 + (j1 - j0) * t0;
                    const fi1 = i0 + (i1 - i0) * t1;
                    const fj1 = j0 + (j1 - j0) * t1;

                    // Height at step top
                    const zh  = h0 + step * H;
                    const zh1 = zh + H;

                    // 4 corners of the tread (top face of step, at zh1):
                    // tA, tB: inner edge (step back), tC, tD: outer edge (step front)
                    // Stair progresses from fi0 to fi1 along the arm
                    // Perpendicular extends ±halfWidth from center
                    const tA = iso(fi0 + perpI * halfWidth, fj0 + perpJ * halfWidth, zh1);
                    const tB = iso(fi1 + perpI * halfWidth, fj1 + perpJ * halfWidth, zh1);
                    const tC = iso(fi1 - perpI * halfWidth, fj1 - perpJ * halfWidth, zh1);
                    const tD = iso(fi0 - perpI * halfWidth, fj0 - perpJ * halfWidth, zh1);

                    // Bottom corners of the riser (front face) at height zh:
                    const rB = iso(fi1 + perpI * halfWidth, fj1 + perpJ * halfWidth, zh);
                    const rC = iso(fi1 - perpI * halfWidth, fj1 - perpJ * halfWidth, zh);

                    // Draw tread outline (closed parallelogram):
                    addLine([tA, tB, tC, tD, tA], 1.0);

                    // Draw riser (front face of step) outline:
                    addLine([tB, rB, rC, tC, tB], 0.8);

                    if (values.hatch === "an") {
                        // Hatch the tread: lines parallel to AD edge (across the step width)
                        const treadHatch = 4;
                        for (let hs = 1; hs < treadHatch; hs++) {
                            const ft = hs / treadHatch;
                            // Interpolate from AB edge toward DC edge
                            const hA = [
                                tA[0] * (1 - ft) + tD[0] * ft,
                                tA[1] * (1 - ft) + tD[1] * ft
                            ];
                            const hB = [
                                tB[0] * (1 - ft) + tC[0] * ft,
                                tB[1] * (1 - ft) + tC[1] * ft
                            ];
                            addLine([hA, hB], 0.4);
                        }

                        // Hatch the riser: denser horizontal lines
                        const riserHatch = 5;
                        for (let hs = 1; hs < riserHatch; hs++) {
                            const ft = hs / riserHatch;
                            const hA = [
                                tB[0] * (1 - ft) + rB[0] * ft,
                                tB[1] * (1 - ft) + rB[1] * ft
                            ];
                            const hB = [
                                tC[0] * (1 - ft) + rC[0] * ft,
                                tC[1] * (1 - ft) + rC[1] * ft
                            ];
                            addLine([hA, hB], 0.5);
                        }
                    }
                }

                // Draw the outer side wall of the arm (the long face going down)
                // This connects the top of the first step to the bottom of the arm
                // For the "impossible" feel, we draw the side wall as a solid face
                {
                    const fi0a = i0;
                    const fj0a = j0;
                    const fi1a = i1;
                    const fj1a = j1;
                    const hStart = h0;
                    const hEnd   = h0 + N * H;

                    // Outer side (negative perp side): runs along the arm at -halfWidth offset
                    const outerTop0 = iso(fi0a - perpI * halfWidth, fj0a - perpJ * halfWidth, hStart);
                    const outerTop1 = iso(fi1a - perpI * halfWidth, fj1a - perpJ * halfWidth, hEnd);
                    // Bottom of the outer wall at the ground level of arm start
                    const outerBot0 = iso(fi0a - perpI * halfWidth, fj0a - perpJ * halfWidth, 0);
                    const outerBot1 = iso(fi1a - perpI * halfWidth, fj1a - perpJ * halfWidth, 0);

                    // Slanted outer wall:
                    addLine([outerTop0, outerTop1], 0.6);
                    addLine([outerBot0, outerBot1], 0.6);
                    addLine([outerTop0, outerBot0], 0.6);
                    addLine([outerTop1, outerBot1], 0.6);

                    // Hatch the outer wall diagonally
                    if (values.hatch === "an") {
                        const wallHatch = 6;
                        for (let hs = 1; hs < wallHatch; hs++) {
                            const ft = hs / wallHatch;
                            const hT = [
                                outerTop0[0] * (1 - ft) + outerTop1[0] * ft,
                                outerTop0[1] * (1 - ft) + outerTop1[1] * ft
                            ];
                            const hBt = [
                                outerBot0[0] * (1 - ft) + outerBot1[0] * ft,
                                outerBot0[1] * (1 - ft) + outerBot1[1] * ft
                            ];
                            addLine([hT, hBt], 0.35);
                        }
                    }
                }
            }

            api.status(ARMS + " Arme · " + N + " Stufen · " + lines.length + " Pfade");
            api.done(lines);
        }
    });
    </script>
</body>
</html>
