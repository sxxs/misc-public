<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSM-Stadtkarte — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>34 · Echte Stadtkarte (OSM)</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div class="control">
                <label><span>Ort (echte OpenStreetMap-Daten)</span></label>
                <input id="placeInput" type="text" value="Bamberg" maxlength="40"
                       style="text-transform:none">
            </div>
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🌍 Laden</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Plottet das <b>echte Straßennetz</b> eines Orts:
            Geocoding über Nominatim, Straßen/Wasser/Parks über die
            Overpass-API. Hauptstraßen dick, Gassen dünn, Flüsse als
            Doppellinie, Parks schraffiert. Ohne Internet erscheint eine
            Demo-Karte.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="font.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    let cache = { key: null, data: null };

    const app = PR4App({
        svgName: "osm-karte",
        params: [
            { key: "radius", label: "Radius (m)", min: 400, max: 2000, step: 100, value: 900 },
            { key: "detail", label: "Detailgrad", value: "mid", options: [
                { value: "big", label: "Nur große Straßen" },
                { value: "mid", label: "Mit Wohnstraßen" },
                { value: "all", label: "Alles inkl. Wege" }
            ]}
        ],
        generate(api) {
            const { values } = api;
            const place = document.getElementById("placeInput").value.trim() || "Bamberg";
            const key = place + "|" + values.radius;

            const CLASS = {
                motorway: 2.4, trunk: 2.4, primary: 2.0, secondary: 1.6, tertiary: 1.2,
                residential: 0.8, unclassified: 0.8, living_street: 0.7, pedestrian: 0.7,
                service: 0.5, footway: 0.4, path: 0.4, cycleway: 0.4, track: 0.4
            };
            const MIN_W = values.detail === "big" ? 1.2 : values.detail === "mid" ? 0.7 : 0;

            function render(data) {
                const lines = [];
                const { lat0, lon0, ways } = data;
                const R = values.radius;
                const kx = 440 / (R / 111320 / Math.cos(lat0 * Math.PI / 180));
                const ky = 440 / (R / 111320);
                const px = (lat, lon) => [500 + (lon - lon0) * kx, 500 - (lat - lat0) * ky];
                const inside = (p) => Math.hypot(p[0] - 500, p[1] - 500) <= 445;

                function clipPush(pts, opts) {
                    let run = null;
                    for (const p of pts) {
                        if (inside(p)) {
                            if (!run) run = [];
                            run.push(p);
                        } else if (run) {
                            if (run.length > 1) lines.push(Object.assign({ pts: run }, opts));
                            run = null;
                        }
                    }
                    if (run && run.length > 1) lines.push(Object.assign({ pts: run }, opts));
                }

                for (const way of ways) {
                    const pts = way.geometry.map(g => px(g.lat, g.lon));
                    if (way.kind === "water") {
                        clipPush(pts, { w: 1.6 });
                        // second bank line, slightly offset
                        clipPush(pts.map(p => [p[0] + 3, p[1] + 3]), { w: 0.8 });
                    } else if (way.kind === "park") {
                        clipPush(pts.concat([pts[0]]), { w: 0.7 });
                        // hatch inside park bbox (cheap point-in-polygon)
                        let x0 = 1e9, x1 = -1e9, y0 = 1e9, y1 = -1e9;
                        for (const p of pts) {
                            x0 = Math.min(x0, p[0]); x1 = Math.max(x1, p[0]);
                            y0 = Math.min(y0, p[1]); y1 = Math.max(y1, p[1]);
                        }
                        const inPoly = (x, y) => {
                            let c = false;
                            for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
                                if ((pts[i][1] > y) !== (pts[j][1] > y) &&
                                    x < (pts[j][0] - pts[i][0]) * (y - pts[i][1]) /
                                        (pts[j][1] - pts[i][1]) + pts[i][0]) c = !c;
                            }
                            return c;
                        };
                        for (let c = x0 + y0; c < x1 + y1; c += 9) {
                            let run = null;
                            for (let x = Math.max(x0, c - y1); x <= Math.min(x1, c - y0); x += 3) {
                                const y = c - x;
                                if (inPoly(x, y) && inside([x, y])) {
                                    if (!run) run = [x, y];
                                } else if (run) {
                                    lines.push({ pts: [run, [x, y]], w: 0.45 });
                                    run = null;
                                }
                            }
                        }
                    } else {
                        const w = CLASS[way.kind] || 0.6;
                        if (w < MIN_W) continue;
                        clipPush(pts, { w });
                    }
                }
                // circular frame + title
                const frame = [];
                for (let i = 0; i <= 180; i++) {
                    const a = i / 180 * Math.PI * 2;
                    frame.push([500 + 445 * Math.cos(a), 500 + 445 * Math.sin(a)]);
                }
                lines.push({ pts: frame, closed: true, w: 1.6 });
                if (typeof PR4Font !== "undefined") {
                    for (const s of PR4Font.textCentered(data.label || place, 500, 972, 22)) {
                        lines.push({ pts: s, w: 1.0 });
                    }
                }
                return lines;
            }

            function demoData() {
                // offline fallback: synthetic city so the page always works
                const rnd = api.rnd;
                const ways = [];
                for (let a = 0; a < 7; a++) {
                    const ang = a / 7 * Math.PI * 2;
                    const g = [];
                    for (let r = 0; r < 0.009; r += 0.0003) {
                        g.push({ lat: 50 + Math.sin(ang) * r + (rnd() - 0.5) * 0.0006,
                                 lon: 10 + Math.cos(ang) * r * 1.55 + (rnd() - 0.5) * 0.001 });
                    }
                    ways.push({ kind: "primary", geometry: g });
                }
                for (let i = 0; i < 60; i++) {
                    const sx = 50 - 0.008 + rnd() * 0.016, sy = 10 - 0.012 + rnd() * 0.024;
                    const horiz = rnd() < 0.5;
                    const len = 0.002 + rnd() * 0.004;
                    const g = [];
                    for (let t = 0; t < len; t += 0.0004) {
                        g.push({ lat: sx + (horiz ? 0 : t) + (rnd() - 0.5) * 0.0002,
                                 lon: sy + (horiz ? t * 1.55 : 0) + (rnd() - 0.5) * 0.0003 });
                    }
                    ways.push({ kind: "residential", geometry: g });
                }
                const g = [];
                for (let t = -0.012; t < 0.012; t += 0.0005) {
                    g.push({ lat: 50 + Math.sin(t * 300) * 0.002, lon: 10 + t * 1.55 });
                }
                ways.push({ kind: "water", geometry: g });
                return { lat0: 50, lon0: 10, ways, label: "DEMO " + place };
            }

            function fetchT(url, opts, ms) {
                const ctl = new AbortController();
                const timer = setTimeout(() => ctl.abort(), ms);
                return fetch(url, Object.assign({ signal: ctl.signal }, opts || {}))
                    .finally(() => clearTimeout(timer));
            }
            async function load() {
                if (cache.key === key) return cache.data;
                api.status("Suche „" + place + "“ …");
                const geo = await fetchT("https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" +
                    encodeURIComponent(place), null, 10000).then(r => r.json());
                if (!geo.length) throw new Error("Ort nicht gefunden");
                const lat0 = parseFloat(geo[0].lat), lon0 = parseFloat(geo[0].lon);
                const dLat = values.radius / 111320;
                const dLon = dLat / Math.cos(lat0 * Math.PI / 180);
                const bbox = (lat0 - dLat) + "," + (lon0 - dLon) + "," + (lat0 + dLat) + "," + (lon0 + dLon);
                api.status("Lade OSM-Daten …");
                const query = "[out:json][timeout:25];(" +
                    "way[highway](" + bbox + ");" +
                    "way[waterway=river](" + bbox + ");way[waterway=canal](" + bbox + ");" +
                    "way[leisure=park](" + bbox + ");way[landuse=grass](" + bbox + ");" +
                    ");out geom;";
                const osm = await fetchT("https://overpass-api.de/api/interpreter", {
                    method: "POST", body: "data=" + encodeURIComponent(query)
                }, 30000).then(r => r.json());
                const ways = [];
                for (const el of osm.elements || []) {
                    if (!el.geometry || el.geometry.length < 2) continue;
                    let kind;
                    if (el.tags && el.tags.highway) kind = el.tags.highway;
                    else if (el.tags && el.tags.waterway) kind = "water";
                    else kind = "park";
                    ways.push({ kind, geometry: el.geometry });
                }
                if (!ways.length) throw new Error("Keine Daten im Umkreis");
                const data = { lat0, lon0, ways, label: geo[0].name || place };
                cache = { key, data };
                return data;
            }

            load().then(data => {
                api.done(render(data));
            }).catch(err => {
                const lines = render(demoData());
                api.done(lines);
                api.status("⚠ " + err.message + " — Demo-Daten gezeigt. (" +
                    "Live-Daten brauchen Internet)");
            });
        }
    });
    document.getElementById("placeInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("regen").click();
    });
    </script>
</body>
</html>
