<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wald — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>17 · Wald</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Komposition aus Generatoren: Jeder Baum wächst per
            <b>Raumkolonisierung</b> (Variante 2) in seine eigene Kronenform.
            Drei Tiefenebenen — hinten klein und fein, vorne groß — plus wellige
            Bodenlinien und Mond ergeben eine Waldszene.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "wald",
        params: [
            { key: "trees", label: "Bäume", min: 4, max: 14, step: 1, value: 10 },
            { key: "detail", label: "Kronendichte", min: 120, max: 400, step: 20, value: 280 },
            { key: "ground", label: "Bodenlinien", min: 0, max: 6, step: 1, value: 3 }
        ],
        generate(api) {
            const { rnd, values } = api;
            const noise = PR4.makeNoise2D(rnd);
            const lines = [];

            // one space-colonization tree; returns its polylines
            function makeTree(x, baseY, s) {
                const ch = (210 + rnd() * 90) * s;       // crown center above base
                const crx = (100 + rnd() * 60) * s;
                const cry = (85 + rnd() * 50) * s;
                const cx = x + (rnd() - 0.5) * 20 * s;
                const cy = baseY - ch;
                let attractors = [];
                const nA = Math.round(values.detail * (0.55 + 0.85 * s));
                while (attractors.length < nA) {
                    const a = rnd() * Math.PI * 2;
                    const r = Math.sqrt(rnd());
                    attractors.push([cx + r * crx * Math.cos(a), cy + r * cry * Math.sin(a)]);
                }
                const seg = 7 * s, infl = 60 * s, kill = Math.max(10 * s, 5.5);
                const nodes = [{ p: [x, baseY], parent: -1 }];
                let guard = 0;
                const inRange = (p) => attractors.some(a =>
                    (a[0] - p[0]) ** 2 + (a[1] - p[1]) ** 2 < infl * infl);
                while (!inRange(nodes[nodes.length - 1].p) && guard++ < 60) {
                    const last = nodes[nodes.length - 1];
                    nodes.push({ p: [last.p[0] + (rnd() - 0.5) * 2 * s, last.p[1] - seg],
                                 parent: nodes.length - 1 });
                }
                for (let iter = 0; iter < 160 && attractors.length; iter++) {
                    const pull = new Map();
                    for (const a of attractors) {
                        let best = -1, bestD2 = infl * infl;
                        for (let i = 0; i < nodes.length; i++) {
                            const p = nodes[i].p;
                            const d2 = (a[0] - p[0]) ** 2 + (a[1] - p[1]) ** 2;
                            if (d2 < bestD2) { bestD2 = d2; best = i; }
                        }
                        if (best >= 0) {
                            let acc = pull.get(best);
                            if (!acc) { acc = [0, 0, 0]; pull.set(best, acc); }
                            const p = nodes[best].p;
                            const d = Math.sqrt(bestD2) || 1;
                            acc[0] += (a[0] - p[0]) / d;
                            acc[1] += (a[1] - p[1]) / d;
                            acc[2]++;
                        }
                    }
                    if (pull.size === 0) break;
                    const fresh = [];
                    for (const [i, acc] of pull) {
                        let dx = acc[0] / acc[2] + (rnd() - 0.5) * 0.3;
                        let dy = acc[1] / acc[2] + (rnd() - 0.5) * 0.3;
                        const m = Math.hypot(dx, dy);
                        if (m < 1e-6) continue;
                        const p = nodes[i].p;
                        fresh.push({ p: [p[0] + dx / m * seg, p[1] + dy / m * seg], parent: i });
                    }
                    if (fresh.length === 0) break;
                    for (const f of fresh) nodes.push(f);
                    attractors = attractors.filter(a => !fresh.some(f =>
                        (a[0] - f.p[0]) ** 2 + (a[1] - f.p[1]) ** 2 < kill * kill));
                }
                // chain branches into polylines
                const children = nodes.map(() => []);
                for (let i = 1; i < nodes.length; i++) children[nodes[i].parent].push(i);
                const out = [];
                const stack = [[0, [nodes[0].p]]];
                while (stack.length) {
                    const [i, path] = stack.pop();
                    const kids = children[i];
                    if (kids.length === 0) {
                        if (path.length > 1) out.push(path);
                    } else {
                        for (let k = 1; k < kids.length; k++) {
                            stack.push([kids[k], [nodes[i].p, nodes[kids[k]].p]]);
                        }
                        path.push(nodes[kids[0]].p);
                        stack.push([kids[0], path]);
                    }
                }
                // foreground trees get a doubled trunk for visual weight
                if (s >= 0.85) {
                    let i = 0;
                    const trunk = [nodes[0].p];
                    while (children[i].length === 1) {
                        i = children[i][0];
                        trunk.push(nodes[i].p);
                    }
                    if (trunk.length > 1) {
                        for (const off of [-2.2, 2.2]) {
                            out.push(trunk.map(p => [p[0] + off, p[1]]));
                        }
                    }
                }
                return out;
            }

            // depth rows: [scale, baseline, share of trees]
            const rows = [
                { s: 0.32, y: 615, share: 0.45 },
                { s: 0.6, y: 720, share: 0.33 },
                { s: 1.05, y: 862, share: 0.22 }
            ];
            const jobs = [];
            for (let r = 0; r < rows.length; r++) {
                const row = rows[r];
                const count = Math.max(1, Math.round(values.trees * row.share));
                // evenly spread slots with jitter, randomly offset per row
                const xs = [];
                const slot = 860 / count;
                const shift = rnd() * slot * 0.5;
                const margin = 60 + 150 * row.s;   // keep crowns on the page
                for (let k = 0; k < count; k++) {
                    const x = 70 + shift + k * slot + (rnd() - 0.5) * slot * 0.45;
                    xs.push(Math.max(margin, Math.min(1000 - margin, x)));
                }
                for (const x of xs) jobs.push({ x, y: row.y + (rnd() - 0.5) * 18 * row.s, s: row.s });
            }

            // moon: three concentric circles in the sky
            const mx = 140 + rnd() * 250, my = 120 + rnd() * 60;
            for (const r of [52, 44, 36]) {
                const c = [];
                for (let i = 0; i <= 36; i++) {
                    const a = i / 36 * Math.PI * 2;
                    c.push([mx + r * Math.cos(a), my + r * Math.sin(a)]);
                }
                lines.push({ pts: c, closed: true });
            }

            // wavy ground lines per row + foreground
            const groundYs = [];
            for (const row of rows) groundYs.push(row.y + 6 * row.s);
            for (let g = 0; g < values.ground; g++) groundYs.push(870 + g * 26);
            for (const gy of groundYs) {
                const pts = [];
                for (let x = 40; x <= 960; x += 6) {
                    pts.push([x, gy + (noise.fbm(x * 0.008, gy * 0.05, 3) - 0.5) * 14]);
                }
                lines.push(pts);
            }

            // grow trees one per frame so the forest appears progressively
            let j = 0;
            function frame() {
                if (api.cancelled()) return;
                if (j < jobs.length) {
                    const job = jobs[j++];
                    for (const l of makeTree(job.x, job.y, job.s)) lines.push(l);
                    api.status("Baum " + j + " / " + jobs.length + " wächst…");
                    api.draw(lines);
                    requestAnimationFrame(frame);
                } else {
                    api.done(lines);
                }
            }
            requestAnimationFrame(frame);
        }
    });
    </script>
</body>
</html>
