<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wald — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>17 · Wald</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Dichter Wald mit <b>atmosphärischer Tiefe</b>: Fünf
            Ebenen vom Vordergrund bis zum Nebel. Ferne Bäume sind kleine, simple
            Strichbäume mit <b>dünner Linie</b> (unscharf/blass), je näher, desto
            detailreicher — vorne volle Raumkolonisierungs-Kronen mit kräftigem
            Doppelstamm.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "wald",
        params: [
            { key: "trees", label: "Bäume", min: 20, max: 120, step: 5, value: 75 },
            { key: "detail", label: "Kronendichte (vorne)", min: 150, max: 450, step: 25, value: 300 },
            { key: "hills", label: "Hügeligkeit", min: 0, max: 40, step: 2, value: 18 }
        ],
        generate(api) {
            const { rnd, values } = api;
            const noise = PR4.makeNoise2D(rnd);
            const no = rnd() * 40;
            const lines = [];

            // ---- simple fractal stick tree for distant rows ----
            function stickTree(x, y, s, depth, w) {
                const out = [];
                function branch(p, ang, len, d) {
                    const q = [p[0] + Math.sin(ang) * len, p[1] - Math.cos(ang) * len];
                    out.push({ pts: [p, q], w });
                    if (d <= 0 || len < 3) return;
                    const n = rnd() < 0.7 ? 2 : 3;
                    for (let k = 0; k < n; k++) {
                        const spread = 0.35 + rnd() * 0.5;
                        const na = ang + (k - (n - 1) / 2) * spread + (rnd() - 0.5) * 0.2;
                        branch(q, na, len * (0.6 + rnd() * 0.16), d - 1);
                    }
                }
                branch([x, y], (rnd() - 0.5) * 0.12, 34 * s, depth);
                return out;
            }

            // ---- full space-colonization tree for the foreground ----
            function scTree(x, baseY, s, w) {
                const ch = (210 + rnd() * 90) * s;
                const crx = (100 + rnd() * 60) * s;
                const cry = (85 + rnd() * 50) * s;
                const cx = x + (rnd() - 0.5) * 20 * s, cy = baseY - ch;
                let attractors = [];
                const nA = Math.round(values.detail * (0.55 + 0.85 * s));
                while (attractors.length < nA) {
                    const a = rnd() * Math.PI * 2, r = Math.sqrt(rnd());
                    attractors.push([cx + r * crx * Math.cos(a), cy + r * cry * Math.sin(a)]);
                }
                const seg = 7 * s, infl = 60 * s, kill = Math.max(10 * s, 5.5);
                const nodes = [{ p: [x, baseY], parent: -1 }];
                let guard = 0;
                const inRange = (p) => attractors.some(a =>
                    (a[0] - p[0]) ** 2 + (a[1] - p[1]) ** 2 < infl * infl);
                while (!inRange(nodes[nodes.length - 1].p) && guard++ < 60) {
                    const last = nodes[nodes.length - 1];
                    nodes.push({ p: [last.p[0] + (rnd() - 0.5) * 2 * s, last.p[1] - seg],
                                 parent: nodes.length - 1 });
                }
                for (let iter = 0; iter < 160 && attractors.length; iter++) {
                    const pull = new Map();
                    for (const a of attractors) {
                        let best = -1, bestD2 = infl * infl;
                        for (let i = 0; i < nodes.length; i++) {
                            const p = nodes[i].p;
                            const d2 = (a[0] - p[0]) ** 2 + (a[1] - p[1]) ** 2;
                            if (d2 < bestD2) { bestD2 = d2; best = i; }
                        }
                        if (best >= 0) {
                            let acc = pull.get(best);
                            if (!acc) { acc = [0, 0, 0]; pull.set(best, acc); }
                            const p = nodes[best].p;
                            const d = Math.sqrt(bestD2) || 1;
                            acc[0] += (a[0] - p[0]) / d;
                            acc[1] += (a[1] - p[1]) / d;
                            acc[2]++;
                        }
                    }
                    if (pull.size === 0) break;
                    const fresh = [];
                    for (const [i, acc] of pull) {
                        const dx = acc[0] / acc[2] + (rnd() - 0.5) * 0.3;
                        const dy = acc[1] / acc[2] + (rnd() - 0.5) * 0.3;
                        const m = Math.hypot(dx, dy);
                        if (m < 1e-6) continue;
                        const p = nodes[i].p;
                        fresh.push({ p: [p[0] + dx / m * seg, p[1] + dy / m * seg], parent: i });
                    }
                    if (fresh.length === 0) break;
                    for (const f of fresh) nodes.push(f);
                    attractors = attractors.filter(a => !fresh.some(f =>
                        (a[0] - f.p[0]) ** 2 + (a[1] - f.p[1]) ** 2 < kill * kill));
                }
                const children = nodes.map(() => []);
                for (let i = 1; i < nodes.length; i++) children[nodes[i].parent].push(i);
                const out = [];
                const stack = [[0, [nodes[0].p]]];
                while (stack.length) {
                    const [i, path] = stack.pop();
                    const kids = children[i];
                    if (kids.length === 0) {
                        if (path.length > 1) out.push({ pts: path, w });
                    } else {
                        for (let k = 1; k < kids.length; k++) {
                            stack.push([kids[k], [nodes[i].p, nodes[kids[k]].p]]);
                        }
                        path.push(nodes[kids[0]].p);
                        stack.push([kids[0], path]);
                    }
                }
                // doubled trunk for weight
                let i = 0;
                const trunk = [nodes[0].p];
                while (children[i].length === 1) { i = children[i][0]; trunk.push(nodes[i].p); }
                if (trunk.length > 1) {
                    for (const offx of [-2.4, 2.4]) {
                        out.push({ pts: trunk.map(p => [p[0] + offx, p[1]]), w });
                    }
                }
                return out;
            }

            // ---- five depth bands, far to near ----
            const bands = [
                { s: 0.16, y: 545, share: 0.32, w: 0.45, type: "stick", depth: 3 },
                { s: 0.26, y: 610, share: 0.26, w: 0.6, type: "stick", depth: 3 },
                { s: 0.42, y: 685, share: 0.19, w: 0.8, type: "stick", depth: 4 },
                { s: 0.66, y: 775, share: 0.14, w: 1.05, type: "sc" },
                { s: 1.05, y: 880, share: 0.09, w: 1.4, type: "sc" }
            ];
            const hillY = (x, band) =>
                band.y + (noise.fbm(x * 0.002 + no + band.y, band.y * 0.01, 3) - 0.5) *
                2 * values.hills * (0.4 + band.s);

            const jobs = [];
            for (const band of bands) {
                const count = Math.max(2, Math.round(values.trees * band.share));
                const slot = 880 / count;
                const shift = rnd() * slot * 0.5;
                const margin = 50 + 150 * band.s;
                for (let k = 0; k < count; k++) {
                    let x = 60 + shift + k * slot + (rnd() - 0.5) * slot * 0.6;
                    x = Math.max(margin, Math.min(1000 - margin, x));
                    jobs.push({ band, x, y: hillY(x, band) });
                }
            }

            // moon
            const mx = 140 + rnd() * 280, my = 110 + rnd() * 60;
            for (const r of [50, 42]) {
                const c = [];
                for (let i = 0; i <= 36; i++) {
                    const a = i / 36 * Math.PI * 2;
                    c.push([mx + r * Math.cos(a), my + r * Math.sin(a)]);
                }
                lines.push({ pts: c, closed: true, w: 0.8 });
            }

            // ground lines only at the horizon and in front (no "fences" between rows)
            for (const band of [bands[0], bands[4]]) {
                const pts = [];
                for (let x = 40; x <= 960; x += 6) pts.push([x, hillY(x, band) + 4 * band.s]);
                lines.push({ pts, w: band.w * 0.8 });
            }
            // foreground extra ground lines + grass
            for (let g = 1; g <= 2; g++) {
                const pts = [];
                for (let x = 40; x <= 960; x += 6) {
                    pts.push([x, 905 + g * 24 + (noise.fbm(x * 0.01 + g * 9, 7, 3) - 0.5) * 10]);
                }
                lines.push({ pts, w: 1.2 });
            }

            // grow trees: distant bands instantly, foreground one per frame
            const farJobs = jobs.filter(j => j.band.type === "stick");
            const nearJobs = jobs.filter(j => j.band.type === "sc");
            for (const j of farJobs) {
                for (const l of stickTree(j.x, j.y, j.band.s, j.band.depth, j.band.w)) lines.push(l);
            }
            let ji = 0;
            function frame() {
                if (api.cancelled()) return;
                if (ji < nearJobs.length) {
                    const j = nearJobs[ji++];
                    for (const l of scTree(j.x, j.y, j.band.s, j.band.w)) lines.push(l);
                    api.status("Vordergrund-Baum " + ji + " / " + nearJobs.length);
                    api.draw(lines);
                    requestAnimationFrame(frame);
                } else {
                    api.status(jobs.length + " Bäume in 5 Ebenen");
                    api.done(lines);
                }
            }
            api.draw(lines);
            requestAnimationFrame(frame);
        }
    });
    </script>
</body>
</html>
