<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>114 · Symbol-Dithering — Plot Runde 4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,600,1,0&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
    :root{ --bg:#101216; --panel:#171a21; --line:#262b35; --fg:#e8e6e0;
        --dim:#8b93a1; --accent:#ff5a3c; --accent2:#39d0d8; }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{background:var(--bg);color:var(--fg);
        font-family:"IBM Plex Mono",ui-monospace,monospace;
        display:flex;flex-direction:column;min-height:100%}
    .topbar{display:flex;align-items:baseline;gap:1.2rem;padding:1rem 1.5rem;
        border-bottom:1px solid var(--line)}
    .topbar a{color:var(--dim);text-decoration:none;font-size:.8rem}
    .topbar a:hover{color:var(--fg)}
    .topbar h1{margin:0;font-size:1.1rem;font-weight:600;letter-spacing:.02em}
    .topbar h1 .no{color:var(--accent)}
    .topbar .tag{margin-left:auto;font-size:.75rem;color:var(--dim)}

    .stage{flex:1;display:flex;gap:1.4rem;padding:1.4rem 1.5rem;min-height:0;flex-wrap:wrap}
    .view{flex:1 1 460px;min-width:300px;display:flex;flex-direction:column;gap:.7rem}
    .frame{flex:1;display:flex;align-items:center;justify-content:center;
        background:
            linear-gradient(45deg,#0c0e12 25%,transparent 25%) -8px 0/16px 16px,
            linear-gradient(-45deg,#0c0e12 25%,transparent 25%) -8px 0/16px 16px,
            linear-gradient(45deg,transparent 75%,#0c0e12 75%) -8px 0/16px 16px,
            linear-gradient(-45deg,transparent 75%,#0c0e12 75%) -8px 0/16px 16px,
            #14171d;
        border:1px solid var(--line);border-radius:4px;overflow:hidden;padding:14px}
    canvas{max-width:100%;max-height:72vh;image-rendering:auto;
        box-shadow:0 12px 40px -20px #000;border-radius:2px}
    .ramp{font-family:"Material Symbols Outlined";font-size:22px;letter-spacing:4px;
        color:var(--dim);text-align:center;min-height:28px;
        font-variation-settings:'FILL' 1,'wght' 600}
    .ramp .lbl{font-family:"IBM Plex Mono";font-size:.7rem;letter-spacing:0;margin:0 .5rem;
        color:#5b626f;vertical-align:middle}

    .panel{flex:0 0 290px;display:flex;flex-direction:column;gap:1.15rem}
    .drop{border:1.5px dashed var(--line);border-radius:5px;padding:1.1rem;text-align:center;
        cursor:pointer;transition:.15s;color:var(--dim);font-size:.82rem;line-height:1.5}
    .drop:hover,.drop.hot{border-color:var(--accent);color:var(--fg);background:#ff5a3c10}
    .drop b{color:var(--accent);font-weight:600}
    .field{display:flex;flex-direction:column;gap:.35rem}
    .field label{display:flex;justify-content:space-between;font-size:.76rem;color:var(--dim);
        text-transform:uppercase;letter-spacing:.08em}
    .field label b{color:var(--fg);font-weight:600}
    input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--line)}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;
        background:var(--accent);cursor:pointer;border-radius:1px}
    input[type=range]::-moz-range-thumb{width:13px;height:13px;background:var(--accent);
        cursor:pointer;border:0;border-radius:1px}
    .seg{display:flex;gap:0;border:1px solid var(--line);border-radius:3px;overflow:hidden}
    .seg button{flex:1;border:0;background:transparent;color:var(--dim);padding:.45rem .2rem;
        font:inherit;font-size:.76rem;cursor:pointer}
    .seg button.on{background:var(--accent);color:#0c0e12;font-weight:600}
    .toggle{display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:var(--dim);cursor:pointer}
    .toggle input{accent-color:var(--accent)}
    .actions{display:flex;gap:.55rem;margin-top:auto}
    .actions button{flex:1;border:1px solid var(--line);background:var(--panel);color:var(--fg);
        padding:.6rem;border-radius:3px;font:inherit;font-size:.8rem;cursor:pointer}
    .actions button:hover{border-color:var(--accent);color:var(--accent)}
    .status{font-size:.72rem;color:var(--dim);min-height:1em}
    input[type=file]{display:none}
</style>
</head>
<body>
    <div class="topbar">
        <a href="./">← Übersicht</a>
        <h1><span class="no">114</span> Symbol-Dithering</h1>
        <span class="tag">dein Bild, aus Icons gebaut · alles lokal im Browser</span>
    </div>

    <div class="stage">
        <div class="view">
            <div class="frame"><canvas id="c"></canvas></div>
            <div class="ramp" id="ramp"></div>
        </div>

        <div class="panel">
            <label class="drop" id="drop">
                <input type="file" id="file" accept="image/*">
                <b>Bild wählen</b> oder hierher ziehen<br>
                <span style="font-size:.72rem">JPG/PNG — verlässt deinen Rechner nicht</span>
            </label>

            <div class="field">
                <label>Auflösung <b id="vRes">—</b></label>
                <input type="range" id="res" min="24" max="130" step="2" value="64">
            </div>
            <div class="field">
                <label>Kontrast <b id="vCon">—</b></label>
                <input type="range" id="con" min="0" max="1" step="0.02" value="0.4">
            </div>
            <div class="field">
                <label>Helligkeit <b id="vBri">—</b></label>
                <input type="range" id="bri" min="-0.5" max="0.5" step="0.02" value="0">
            </div>
            <div class="field">
                <label>Filter</label>
                <div class="seg" id="filterMode">
                    <button data-f="foto" class="on">Foto</button>
                    <button data-f="auto">Auto</button>
                    <button data-f="kanten">Kanten</button>
                    <button data-f="kanten_ton">Kanten+Ton</button>
                </div>
            </div>

            <div class="field">
                <label>Farbe</label>
                <div class="seg" id="colorMode">
                    <button data-c="tinte" class="on">Tinte</button>
                    <button data-c="bild">Bildfarbe</button>
                    <button data-c="neon">Neon</button>
                </div>
            </div>
            <label class="toggle"><input type="checkbox" id="neg"> Negativ (dunkler Grund)</label>

            <div class="field">
                <label>Symbol-Satz</label>
                <div class="seg" id="setMode">
                    <button data-s="gemischt" class="on">Gemischt</button>
                    <button data-s="geo">Geometrie</button>
                    <button data-s="raster">Raster</button>
                </div>
            </div>

            <div class="actions">
                <button id="dlPng">⬇ PNG</button>
                <button id="dlSvg">⬇ SVG</button>
            </div>
            <p class="status" id="status">Lade Font…</p>
        </div>
    </div>

<script>
"use strict";
const FONT = '"Material Symbols Outlined"';

/* candidate glyphs — coverage is MEASURED at runtime, so order here doesn't matter.
 * Three families; the dither picks from the active one, sorted light→dark. */
const SETS = {
    gemischt: [0xe15b,0xe5d3,0xe145,0xe3ea,0xe3a5,0xe176,0xeb9e,0xe5d2,0xf09a,0xe87e,
               0xea0b,0xe91d,0xef55,0xe86b,0xeb39,0xe3fa,0xef4a,0xeb36],
    geo:      [0xe15b,0xe145,0xe5cd,0xe86b,0xeb50,0xeb39,0xef4a,0xe3fa,0xeb36],
    raster:   [0xe5d3,0xe3ea,0xe3a5,0xeba8,0xe176,0xeb9e,0xe3c7,0xe5d2,0xe5c3,0xe9b0],
};
const $ = (id)=>document.getElementById(id);
const canvas = $("c"), ctx = canvas.getContext("2d");
const ui = { res:$("res"), con:$("con"), bri:$("bri"), neg:$("neg") };
const state = { img:null, imgW:1, imgH:1, color:"tinte", set:"gemischt", filter:"foto", ramp:[], rampCache:{} };

/* ── measure ink coverage of each glyph → sorted ramp (light→dark) ── */
function buildRamp(setKey){
    if (state.rampCache[setKey]) return state.rampCache[setKey];
    const S=64, off=document.createElement("canvas"); off.width=off.height=S;
    const o=off.getContext("2d",{willReadFrequently:true});
    o.textAlign="center"; o.textBaseline="middle";
    o.font='600 '+Math.round(S*0.82)+'px '+FONT;
    if ("fontVariationSettings" in o) o.fontVariationSettings="'FILL' 1,'wght' 600";
    const scored = SETS[setKey].map(cp=>{
        o.clearRect(0,0,S,S);
        o.fillStyle="#000"; o.fillText(String.fromCodePoint(cp), S/2, S/2+2);
        const d=o.getImageData(0,0,S,S).data; let ink=0;
        for(let i=3;i<d.length;i+=4) if(d[i]>40) ink++;
        return { cp, ch:String.fromCodePoint(cp), cov: ink/(S*S) };
    }).sort((a,b)=>a.cov-b.cov);
    state.rampCache[setKey]=scored; return scored;
}

/* downsample the source into cols×rows average pixels */
function sampleGrid(cols, rows){
    const t=document.createElement("canvas"); t.width=cols; t.height=rows;
    const g=t.getContext("2d",{willReadFrequently:true});
    g.imageSmoothingEnabled=true; g.drawImage(state.img,0,0,cols,rows);
    return g.getImageData(0,0,cols,rows).data;
}

const OUTW = 1100;

/* Sobel edge magnitude over a cols×rows luminance grid (clamped 0..1) */
function sobel(L, w, h){
    const out=new Float32Array(w*h);
    const gx=[-1,0,1,-2,0,2,-1,0,1], gy=[-1,-2,-1,0,0,0,1,2,1];
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        let sx=0,sy=0,kk=0;
        for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
            const xx=x+dx<0?0:x+dx>=w?w-1:x+dx, yy=y+dy<0?0:y+dy>=h?h-1:y+dy;
            const v=L[yy*w+xx]; sx+=v*gx[kk]; sy+=v*gy[kk]; kk++;
        }
        const m=Math.hypot(sx,sy); out[y*w+x]=m>1?1:m;
    }
    return out;
}

/* preprocessing: sample → luminance(+brightness) → filter → density 0..1
 * (1 = darkest glyph). Returns {data:RGBA, dens:Float32}. Shared by render + SVG. */
function computeCells(cols, rows){
    const data=sampleGrid(cols,rows), n=cols*rows;
    const bri=+ui.bri.value, k=1+(+ui.con.value)*3.2, filt=state.filter;
    const L=new Float32Array(n);
    for(let i=0;i<n;i++){ const p=i*4;
        let l=(0.299*data[p]+0.587*data[p+1]+0.114*data[p+2])/255+bri;
        L[i]=l<0?0:l>1?1:l; }
    const dens=new Float32Array(n);
    if(filt==="kanten"||filt==="kanten_ton"){
        const E=sobel(L,cols,rows), gain=1.2+(+ui.con.value)*5;
        for(let i=0;i<n;i++){ let e=E[i]*gain; e=e>1?1:e;
            if(filt==="kanten_ton"){ let t=(1-L[i]-0.5)*k*0.6+0.5; t=t<0?0:t>1?1:t; e=Math.max(e,t*0.72); }
            dens[i]=e; }
    } else {
        let lo=0,hi=1;
        if(filt==="auto"){ lo=1;hi=0; for(let i=0;i<n;i++){ if(L[i]<lo)lo=L[i]; if(L[i]>hi)hi=L[i]; }
            if(hi-lo<0.03){lo=0;hi=1;} }
        for(let i=0;i<n;i++){ let b=L[i]; if(filt==="auto")b=(b-lo)/(hi-lo);
            b=(b-0.5)*k+0.5; b=b<0?0:b>1?1:b; dens[i]=1-b; }
    }
    if(ui.neg.checked) for(let i=0;i<n;i++) dens[i]=1-dens[i];
    return {data,dens};
}

function render(){
    if (!state.img){ return; }
    const ramp = state.ramp = buildRamp(state.set);
    const cols = +ui.res.value;
    const aspect = state.imgW/state.imgH;
    const rows = Math.max(1, Math.round(cols/aspect));
    const cell = OUTW/cols, OUTH = Math.round(cell*rows);
    canvas.width=OUTW; canvas.height=OUTH;

    const mode = state.color, dark = ui.neg.checked || mode==="neon";
    ctx.fillStyle = dark ? "#0c0e12" : "#f3efe6";
    ctx.fillRect(0,0,OUTW,OUTH);
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font='600 '+(cell*0.96).toFixed(1)+'px '+FONT;
    if ("fontVariationSettings" in ctx) ctx.fontVariationSettings="'FILL' 1,'wght' 600";

    const {data,dens}=computeCells(cols,rows);
    const inkCol = dark ? "#f3efe6" : "#1a1814";
    const neon = ["#ff5a3c","#39d0d8","#ffd23c","#c04cff","#3cff8a"];
    let drawn=0;
    for (let j=0;j<rows;j++){
        for (let i=0;i<cols;i++){
            const o=j*cols+i, p=o*4;
            const idx=Math.min(ramp.length-1, Math.round(dens[o]*(ramp.length-1)));
            if (idx<=0 && !dark) continue;               // blank lightest cells on light bg
            let col;
            if (mode==="bild") col=`rgb(${data[p]},${data[p+1]},${data[p+2]})`;
            else if (mode==="neon") col=neon[(i*2+j*3+idx)%neon.length];
            else col=inkCol;
            ctx.fillStyle=col;
            ctx.fillText(ramp[idx].ch, i*cell+cell/2, j*cell+cell/2+cell*0.04);
            drawn++;
        }
    }
    drawRampLegend(ramp);
    const fl={foto:"Foto",auto:"Auto-Kontrast",kanten:"Kanten",kanten_ton:"Kanten+Ton"}[state.filter];
    $("status").textContent = cols+"×"+rows+" · "+drawn+" Symbole · "+fl;
}

function drawRampLegend(ramp){
    const el=$("ramp");
    el.innerHTML='<span class="lbl">hell</span>'+
        ramp.map(r=>r.ch).join(" ")+'<span class="lbl">dunkel</span>';
}

/* ── demo image: a shaded sphere on a gradient, so the ramp is visible at once ── */
function demoImage(){
    const W=560,H=420,cv=document.createElement("canvas"); cv.width=W;cv.height=H;
    const g=cv.getContext("2d");
    // near-flat background → edge mode shows a clean rim instead of noise
    const bg=g.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,"#eceef1"); bg.addColorStop(1,"#dfe3e9");
    g.fillStyle=bg; g.fillRect(0,0,W,H);
    const grd=g.createRadialGradient(W*0.42,H*0.38,10, W*0.5,H*0.5,180);
    grd.addColorStop(0,"#ffffff"); grd.addColorStop(0.5,"#9aa3b0");
    grd.addColorStop(1,"#15181e");
    g.fillStyle=grd; g.beginPath(); g.arc(W*0.5,H*0.5,175,0,7); g.fill();
    // cast shadow
    const sh=g.createRadialGradient(W*0.5,H*0.9,10,W*0.5,H*0.9,150);
    sh.addColorStop(0,"#0a0c10"); sh.addColorStop(1,"rgba(10,12,16,0)");
    g.fillStyle=sh; g.beginPath(); g.ellipse(W*0.52,H*0.9,150,28,0,0,7); g.fill();
    return cv;
}
function setImage(src,w,h){ state.img=src; state.imgW=w; state.imgH=h; render(); }

/* ── file upload (local only) ── */
function loadFile(f){
    if(!f || !f.type.startsWith("image/")) return;
    const url=URL.createObjectURL(f), im=new Image();
    im.onload=()=>{ setImage(im,im.naturalWidth,im.naturalHeight); URL.revokeObjectURL(url); };
    im.src=url;
}
$("file").addEventListener("change",e=>loadFile(e.target.files[0]));
const drop=$("drop");
["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("hot");}));
["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("hot");}));
drop.addEventListener("drop",e=>loadFile(e.dataTransfer.files[0]));

/* ── controls ── */
function syncLabels(){
    $("vRes").textContent=ui.res.value+" breit";
    $("vCon").textContent=Math.round(ui.con.value*100)+"%";
    $("vBri").textContent=(ui.bri.value>0?"+":"")+Math.round(ui.bri.value*100)+"%";
}
let raf=0; function rerender(){ cancelAnimationFrame(raf); raf=requestAnimationFrame(render); }
["res","con","bri"].forEach(k=>ui[k].addEventListener("input",()=>{syncLabels();rerender();}));
ui.neg.addEventListener("change",render);
$("filterMode").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
    [...e.currentTarget.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");
    state.filter=b.dataset.f; render();});
$("colorMode").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
    [...e.currentTarget.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");
    state.color=b.dataset.c; render();});
$("setMode").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
    [...e.currentTarget.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");
    state.set=b.dataset.s; render();});

/* ── export ── */
$("dlPng").addEventListener("click",()=>{
    canvas.toBlob(bl=>{const a=document.createElement("a");
        a.href=URL.createObjectURL(bl); a.download="symbol-dither.png"; a.click();
        setTimeout(()=>URL.revokeObjectURL(a.href),2000);});
});
$("dlSvg").addEventListener("click",exportSvg);
function exportSvg(){
    if(!state.img) return;
    const ramp=state.ramp, cols=+ui.res.value, aspect=state.imgW/state.imgH;
    const rows=Math.max(1,Math.round(cols/aspect)), cell=OUTW/cols, OUTH=Math.round(cell*rows);
    const neg=ui.neg.checked, mode=state.color, dark=neg||mode==="neon";
    const inkCol=dark?"#f3efe6":"#1a1814", neon=["#ff5a3c","#39d0d8","#ffd23c","#c04cff","#3cff8a"];
    const {data,dens}=computeCells(cols,rows);
    let body="";
    for(let j=0;j<rows;j++)for(let i=0;i<cols;i++){
        const o=j*cols+i,p=o*4;
        const idx=Math.min(ramp.length-1,Math.round(dens[o]*(ramp.length-1)));
        if(idx<=0&&!dark) continue;
        const col=mode==="bild"?`rgb(${data[p]},${data[p+1]},${data[p+2]})`:mode==="neon"?neon[(i*2+j*3+idx)%neon.length]:inkCol;
        body+=`<text x="${(i*cell+cell/2).toFixed(1)}" y="${(j*cell+cell/2+cell*0.34).toFixed(1)}" fill="${col}">${escapeXml(ramp[idx].ch)}</text>`;
    }
    const bg=dark?"#0c0e12":"#f3efe6";
    const svg=`<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${OUTW}" height="${OUTH}" viewBox="0 0 ${OUTW} ${OUTH}">
<style>@import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@1');
text{font-family:'Material Symbols Outlined';font-size:${(cell*0.96).toFixed(1)}px;text-anchor:middle}</style>
<rect width="100%" height="100%" fill="${bg}"/>
<!-- Symbole als Text. Zum Plotten in Inkscape: Pfad > Objekt in Pfad umwandeln. -->
${body}
</svg>`;
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([svg],{type:"image/svg+xml"}));
    a.download="symbol-dither.svg"; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}
function escapeXml(s){return s.replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));}

/* ── boot ── */
syncLabels();
(async()=>{
    try{ await document.fonts.load('600 40px '+FONT, "★"); await document.fonts.ready; }catch(_){}
    setImage(demoImage(),560,420);
    $("status").textContent="Beispielbild — lade dein eigenes hoch.";
})();
</script>
</body>
</html>
