<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>77 · Perspektiv-Labyrinth — Plot Runde 4</title><link rel="stylesheet" href="shared.css"></head>
<body><header><a class="back" href="./">← Übersicht</a><h1>77 · Perspektiv-Labyrinth</h1></header>
<main><section class="paper"><canvas id="canvas"></canvas></section>
<section class="panel"><div id="controls"></div>
<div class="buttons"><button id="regen" class="primary">🎲 Neu</button><button id="download">⬇ SVG</button></div>
<p id="status" class="status"></p>
<p class="hint">Das kreisförmige Labyrinth auf einen <b>Fluchtpunkt-Fußboden</b> projiziert — Wände ragen in die Tiefe, Gänge fluchten in den Horizont. Das Labyrinth liegt vor dir, du stehst am Eingang.</p>
</section></main>
<script src="shared.js"></script><script src="app.js"></script>
<script>
"use strict";
PR4App({
    svgName: "perspektiv-labyrinth",
    params: [
        { key: "rings",    label: "Ringe",      min: 5, max: 16, step: 1,    value: 10 },
        { key: "sectors",  label: "Sektoren",   min: 4, max: 12, step: 1,    value: 6  },
        { key: "horizon",  label: "Horizont",   min: 100, max: 400, step: 10, value: 220 },
        { key: "wallH",    label: "Wandhöhe",   min: 10, max: 80, step: 5,   value: 30 },
        { key: "viewDist", label: "Sichtweite", min: 0.3, max: 1.0, step: 0.05, value: 0.7 }
    ],
    generate(api) {
        const { rnd, values } = api;
        const lines = [];
        const rings = values.rings;
        const r0 = 70, rOut = 430;
        const ringW = (rOut - r0) / rings;
        const radius = (i) => r0 + i * ringW;

        // cells per ring: double when arcs get too wide
        const counts = [values.sectors];
        for (let i = 1; i < rings; i++) {
            const arc = 2 * Math.PI * radius(i) / counts[i - 1];
            counts.push(counts[i - 1] * (arc > ringW * 1.7 ? 2 : 1));
        }

        const passages = new Set();
        const pkey = (a, b) => {
            const k1 = a[0]+"."+a[1], k2 = b[0]+"."+b[1];
            return k1 < k2 ? k1+"|"+k2 : k2+"|"+k1;
        };

        function neighbors(i, j) {
            const out = [], c = counts[i];
            out.push([i, (j+1)%c]);
            out.push([i, (j-1+c)%c]);
            if (i > 0) { const ratio = counts[i]/counts[i-1]; out.push([i-1, Math.floor(j/ratio)]); }
            if (i < rings-1) {
                const ratio = counts[i+1]/counts[i];
                if (ratio===1) out.push([i+1,j]);
                else { out.push([i+1,2*j]); out.push([i+1,2*j+1]); }
            }
            return out;
        }

        const visited = counts.map(c => new Uint8Array(c));
        const stack = [[0, Math.floor(rnd()*counts[0])]];
        visited[0][stack[0][1]] = 1;
        while (stack.length) {
            const cur = stack[stack.length-1];
            const unvis = neighbors(cur[0],cur[1]).filter(nb=>!visited[nb[0]][nb[1]]);
            if (unvis.length===0) { stack.pop(); continue; }
            const nb = unvis[Math.floor(rnd()*unvis.length)];
            passages.add(pkey(cur, nb));
            visited[nb[0]][nb[1]] = 1;
            stack.push(nb);
        }

        // One-point perspective transformation
        const H = values.horizon;
        const EYE_Y = 960;
        const EYE_X = 500;
        const S = 920;

        function perspProject(mx, my) {
            const worldX = mx - 500;
            const worldZ = my - 500;
            // depth: 0 = near (viewer feet), 1 = far (horizon)
            const depth = (worldZ + rOut) / (2 * rOut);
            const screenY = EYE_Y - (EYE_Y - H) * depth;
            const scale = 1 - depth * (1 - values.viewDist);
            const screenX = EYE_X + worldX * scale * (S / (2 * rOut));
            return [screenX, screenY];
        }

        function perspProject3D(mx, my, height) {
            const [sx, sy] = perspProject(mx, my);
            const depth = (my - 500 + rOut) / (2 * rOut);
            const scale = 1 - depth * (1 - values.viewDist);
            const sy3d = sy - height * scale * 0.3;
            return [sx, sy3d];
        }

        // Collect wall segments in maze coordinates
        const wallSegs = [];
        const CX = 500, CY = 500;

        function arcPts(r, a0, a1) {
            const steps = Math.max(4, Math.ceil(r * Math.abs(a1-a0) / 7));
            const pts = [];
            for (let s=0;s<=steps;s++) {
                const a = a0 + (a1-a0)*s/steps;
                pts.push([CX + r*Math.cos(a), CY + r*Math.sin(a)]);
            }
            return pts;
        }
        function radialPts(angle, rIn, rOutr) {
            return [[CX + rIn*Math.cos(angle), CY + rIn*Math.sin(angle)],
                    [CX + rOutr*Math.cos(angle), CY + rOutr*Math.sin(angle)]];
        }

        // Radial walls
        for (let i=0;i<rings;i++) {
            const c=counts[i];
            for (let j=0;j<c;j++) {
                if (!passages.has(pkey([i,j],[i,(j+1)%c]))) {
                    wallSegs.push(radialPts(2*Math.PI*(j+1)/c, radius(i), radius(i+1)));
                }
            }
        }
        // Arc walls
        for (let i=0;i<rings-1;i++) {
            const ratio=counts[i+1]/counts[i], cOut=counts[i+1];
            for (let k=0;k<cOut;k++) {
                const j=Math.floor(k/ratio);
                if (!passages.has(pkey([i,j],[i+1,k]))) {
                    wallSegs.push(arcPts(radius(i+1), 2*Math.PI*k/cOut, 2*Math.PI*(k+1)/cOut));
                }
            }
        }
        // Outer boundary
        for (let j=0;j<counts[rings-1];j++) {
            wallSegs.push(arcPts(rOut, 2*Math.PI*j/counts[rings-1], 2*Math.PI*(j+1)/counts[rings-1]));
        }
        // Inner boundary
        for (let j=0;j<counts[0];j++) {
            wallSegs.push(arcPts(r0, 2*Math.PI*j/counts[0], 2*Math.PI*(j+1)/counts[0]));
        }

        // Draw floor lines (projected maze paths in perspective, flat)
        for (const seg of wallSegs) {
            const projPts = seg.map(p => perspProject(p[0], p[1]));
            const visible = projPts.filter(p => p[1] > H && p[1] < 980);
            if (visible.length > 1) lines.push({pts: projPts, w: 0.7});
        }

        // Draw 3D walls (top of wall at height wallH)
        for (const seg of wallSegs) {
            const botPts = seg.map(p => perspProject(p[0], p[1]));
            const topPts = seg.map(p => perspProject3D(p[0], p[1], values.wallH));

            // Top edge of wall
            const visTop = topPts.filter(p => p[1] > H - 30 && p[1] < 980);
            if (visTop.length > 1) lines.push({pts: topPts, w: 0.9});

            // Connect top and bottom at start and end
            if (seg.length > 0) {
                const first = 0, last = seg.length - 1;
                const b0 = perspProject(seg[first][0], seg[first][1]);
                const t0 = perspProject3D(seg[first][0], seg[first][1], values.wallH);
                const bl = perspProject(seg[last][0], seg[last][1]);
                const tl = perspProject3D(seg[last][0], seg[last][1], values.wallH);
                if (b0[1] > H && b0[1] < 980) lines.push({pts: [b0, t0], w: 0.7});
                if (bl[1] > H && bl[1] < 980) lines.push({pts: [bl, tl], w: 0.7});
            }
        }

        // Draw horizon line
        lines.push({pts: [[40, H], [960, H]], w: 0.5});

        api.status("Fertig — " + rings + " Ringe, " + values.sectors + " Sektoren.");
        api.done(lines);
    }
});
</script>
</body></html>
