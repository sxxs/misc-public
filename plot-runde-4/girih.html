<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>80 · Girih-Kacheln — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>80 · Girih-Kacheln</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Die fünf klassischen islamischen <b>Girih-Kacheln</b> mit Strapwork-Bändern — die Linien verbinden sich nahtlos an jeder Kante. Wie ein Mosaik aus einer Moschee, algorithmisch generiert.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "girih",
        params: [
            { key: "gen", label: "Tiefe", min: 0, max: 3, step: 1, value: 2 },
            { key: "strapWidth", label: "Bandbreite", min: 0.05, max: 0.3, step: 0.01, value: 0.15 },
            { key: "style", label: "Darstellung", value: "strap", options: [
                { value: "strap", label: "Nur Strapwork" },
                { value: "tiles", label: "Nur Kacheln" },
                { value: "both", label: "Beides" }
            ]},
            { key: "clip", label: "Beschnitt", value: "circle", options: [
                { value: "circle", label: "Kreisförmig" },
                { value: "square", label: "Quadrat" }
            ]}
        ],
        generate(api) {
            const { values } = api;
            const lines = [];
            const CX = 500, CY = 500, SC = 460;
            const CLIP_R = 450;
            const PHI = (1 + Math.sqrt(5)) / 2;

            // Generate Penrose P3 tiling via Robinson triangle subdivision
            let tris = [];
            for (let k = 0; k < 10; k++) {
                const a1 = (2 * k - 1) * Math.PI / 10;
                const a2 = (2 * k + 1) * Math.PI / 10;
                tris.push({
                    type: k % 2 === 0 ? 'T' : 't',
                    A: [CX, CY],
                    B: [CX + SC * Math.cos(a1), CY + SC * Math.sin(a1)],
                    C: [CX + SC * Math.cos(a2), CY + SC * Math.sin(a2)]
                });
            }

            const totalGen = values.gen + 3;
            for (let g = 0; g < totalGen; g++) {
                const next = [];
                for (const { type, A, B, C } of tris) {
                    if (type === 'T') {
                        // Fat triangle: acute angle at B
                        const P = [A[0] + (B[0] - A[0]) / PHI, A[1] + (B[1] - A[1]) / PHI];
                        next.push({ type: 'T', A: C, B: P, C: B });
                        next.push({ type: 't', A: P, B: C, C: A });
                    } else {
                        // Thin triangle: acute angle at A
                        const P = [B[0] + (A[0] - B[0]) / PHI, B[1] + (A[1] - B[1]) / PHI];
                        const Q = [B[0] + (C[0] - B[0]) / PHI, B[1] + (C[1] - B[1]) / PHI];
                        next.push({ type: 't', A: Q, B: P, C: B });
                        next.push({ type: 'T', A: P, B: A, C: Q });
                        next.push({ type: 't', A: A, B: Q, C: C });
                    }
                }
                tris = next;
            }

            function inClip(p) {
                if (values.clip === "circle") return Math.hypot(p[0] - CX, p[1] - CY) < CLIP_R;
                return p[0] > 40 && p[0] < 960 && p[1] > 40 && p[1] < 960;
            }

            // Draw tile outlines (deduplicated edges)
            if (values.style !== "strap") {
                const seen = new Set();
                const edgeKey = (p, q) => {
                    const a = Math.round(p[0] * 10) + "," + Math.round(p[1] * 10);
                    const b = Math.round(q[0] * 10) + "," + Math.round(q[1] * 10);
                    return a < b ? a + "|" + b : b + "|" + a;
                };
                for (const { type, A, B, C } of tris) {
                    for (const [p, q] of [[A, B], [B, C], [C, A]]) {
                        const k = edgeKey(p, q);
                        if (seen.has(k)) continue;
                        seen.add(k);
                        if (inClip(p) || inClip(q)) {
                            lines.push({ pts: [p, q], w: type === 'T' ? 0.7 : 0.5 });
                        }
                    }
                }
            }

            // Draw Girih strapwork bands
            if (values.style !== "tiles") {
                const BW = values.strapWidth;

                function midpt(a, b) {
                    return [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
                }

                for (const { type, A, B, C } of tris) {
                    const cx = (A[0] + B[0] + C[0]) / 3;
                    const cy = (A[1] + B[1] + C[1]) / 3;
                    if (!inClip([cx, cy])) continue;

                    // Fat triangle T: connect midpoints of the two short edges (AB and BC)
                    // Thin triangle t: connect midpoints of the two short edges (AB and CA)
                    const edgePairs = type === 'T'
                        ? [[A, B], [B, C]]   // fat: two short edges both touching B
                        : [[A, B], [C, A]];  // thin: two short edges not touching B

                    const m0 = midpt(edgePairs[0][0], edgePairs[0][1]);
                    const m1 = midpt(edgePairs[1][0], edgePairs[1][1]);

                    const dx = m1[0] - m0[0], dy = m1[1] - m0[1];
                    const len = Math.hypot(dx, dy);
                    if (len < 1e-6) continue;
                    const px = -dy / len, py = dx / len;

                    // Scale band offset by edge length
                    const edgeLen = Math.hypot(
                        edgePairs[0][1][0] - edgePairs[0][0][0],
                        edgePairs[0][1][1] - edgePairs[0][0][1]
                    );
                    const offset = edgeLen * BW;

                    for (const s of [-1, 1]) {
                        const p0 = [m0[0] + px * offset * s, m0[1] + py * offset * s];
                        const p1 = [m1[0] + px * offset * s, m1[1] + py * offset * s];
                        lines.push({ pts: [p0, p1], w: 0.9 });
                    }
                }
            }

            // Clip boundary
            if (values.clip === "circle") {
                const framePts = [];
                for (let i = 0; i <= 80; i++) {
                    const a = i / 80 * Math.PI * 2;
                    framePts.push([CX + CLIP_R * Math.cos(a), CY + CLIP_R * Math.sin(a)]);
                }
                lines.push({ pts: framePts, closed: true, w: 1.2 });
            } else {
                lines.push({ pts: [[40, 40], [960, 40], [960, 960], [40, 960]], closed: true, w: 1.2 });
            }

            api.status(tris.length + " Dreiecke · Stil: " + values.style);
            api.done(lines);
        }
    });
    </script>
</body>
</html>
