<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>86 · Turing-Spire — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header><a class="back" href="./">← Übersicht</a><h1>86 · Turing-Spire</h1></header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Ein grauer Turm schwebt frei im Raum: Turing-Muster treibt rechtwinklige Äste heraus, Stockwerk um Stockwerk, wie Proteinkristall oder Spielturm.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "turing-spire",
        params: [
            { key: "f",         label: "Feed-Rate",          min: 0.025, max: 0.075, step: 0.001,  value: 0.055 },
            { key: "k",         label: "Kill-Rate",           min: 0.055, max: 0.067, step: 0.0005, value: 0.062 },
            { key: "steps",     label: "Simulationsschritte", min: 200,   max: 2000,  step: 200,    value: 800 },
            { key: "height",    label: "Höhe",                min: 8,     max: 24,    step: 1,      value: 14 },
            { key: "threshold", label: "Schwelle",            min: 5,     max: 60,    step: 5,      value: 20 }
        ],
        generate(api) {
            const { rnd, values } = api;

            // --- Gray-Scott simulation ---
            const N = 64;
            const A  = new Float32Array(N * N).fill(1);
            const B  = new Float32Array(N * N);
            const A2 = new Float32Array(N * N);
            const B2 = new Float32Array(N * N);

            // seed random patches of chemical B
            const patches = 4 + Math.floor(rnd() * 5);
            for (let p = 0; p < patches; p++) {
                const cx = 8 + Math.floor(rnd() * (N - 16));
                const cy = 8 + Math.floor(rnd() * (N - 16));
                for (let dy = -3; dy <= 3; dy++) {
                    for (let dx = -3; dx <= 3; dx++) {
                        const idx = (cy + dy) * N + (cx + dx);
                        if (idx >= 0 && idx < N * N) B[idx] = 1;
                    }
                }
            }

            const f = values.f, k = values.k, DA = 1.0, DB = 0.5;
            let a = A, b = B, a2 = A2, b2 = B2;

            function simStep() {
                for (let y = 1; y < N - 1; y++) {
                    for (let x = 1; x < N - 1; x++) {
                        const i = y * N + x;
                        const av = a[i], bv = b[i];
                        const lapA = 0.2 * (a[i-1] + a[i+1] + a[i-N] + a[i+N])
                                   + 0.05 * (a[i-N-1] + a[i-N+1] + a[i+N-1] + a[i+N+1]) - av;
                        const lapB = 0.2 * (b[i-1] + b[i+1] + b[i-N] + b[i+N])
                                   + 0.05 * (b[i-N-1] + b[i-N+1] + b[i+N-1] + b[i+N+1]) - bv;
                        const abb = av * bv * bv;
                        a2[i] = av + (DA * lapA - abb + f * (1 - av));
                        b2[i] = bv + (DB * lapB + abb - (f + k) * bv);
                    }
                }
                const tmp = a; a = a2; a2 = tmp;
                const tmp2 = b; b = b2; b2 = tmp2;
            }

            // preview during simulation
            const off = document.createElement("canvas");
            off.width = N; off.height = N;
            const offCtx = off.getContext("2d");
            function preview() {
                const img = offCtx.createImageData(N, N);
                for (let i = 0; i < N * N; i++) {
                    const v = Math.max(0, Math.min(255, 255 - b[i] * 600));
                    img.data[i * 4] = v; img.data[i * 4 + 1] = v;
                    img.data[i * 4 + 2] = v; img.data[i * 4 + 3] = 255;
                }
                offCtx.putImageData(img, 0, 0);
                const canvas = document.getElementById("canvas");
                const ctx = PR4.fitCanvas(canvas);
                ctx.fillStyle = "#fff";
                ctx.fillRect(0, 0, PR4.SIZE, PR4.SIZE);
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(off, 40, 40, 920, 920);
            }

            let stepsDone = 0;

            function buildSpire() {
                // find max B field
                let bMax = 0;
                for (let i = 0; i < N * N; i++) if (b[i] > bMax) bMax = b[i];
                if (bMax < 1e-6) bMax = 1;

                const threshVal = (values.threshold / 100) * bMax;
                const H = values.height;     // number of branch levels
                const G = 16;                // isometric grid size
                const u = 700 / G;
                const AX = 0.866 * u, AY = 0.5 * u;
                const BX = -0.866 * u, BY = 0.5 * u;
                const OX = 500, OY = 620;

                // Isometric projection: (i, j, h) → screen
                // i: right-forward, j: left-forward, h: upward
                // height unit matches u
                const P = (i, j, h) => [OX + i * AX + j * BX, OY + i * AY + j * BY - h * u];

                const lines = [];

                // Central spine column: i=G/2, j=G/2
                const ci = G / 2, cj = G / 2;

                // Collect all branches: { level, dir, length }
                // dir: 0=+i, 1=-i, 2=+j, 3=-j
                const branches = [];

                for (let lev = 0; lev < H; lev++) {
                    // Sample B field at this level's row in the grid
                    const row = Math.floor((lev / H) * (N - 1));

                    // Find peaks in this row, pick up to 3 strongest
                    const peaks = [];
                    for (let col = 1; col < N - 1; col++) {
                        const bv = b[row * N + col];
                        if (bv > threshVal &&
                            bv > b[row * N + col - 1] &&
                            bv > b[row * N + col + 1]) {
                            peaks.push({ col, bv });
                        }
                    }
                    // Sort by B value descending, take top 3
                    peaks.sort((x, y) => y.bv - x.bv);
                    const used = peaks.slice(0, 3);

                    for (const pk of used) {
                        // Determine direction and length from column position
                        const relCol = (pk.col / N) - 0.5; // -0.5..+0.5
                        const armLen = Math.max(1, Math.round(Math.abs(relCol) * (G / 2 - 1)));
                        let dir;
                        if (relCol > 0.1) dir = 0;       // +i direction
                        else if (relCol < -0.1) dir = 1;  // -i direction
                        else dir = 2;                      // +j direction
                        branches.push({ level: lev, dir, len: armLen, bv: pk.bv });
                    }
                }

                // Draw from bottom to top (painter's order)
                // Draw the two spire edge lines first as context
                // Left edge of spire column (j side)
                const spireBottom = P(ci, cj, 0);
                const spireTop    = P(ci, cj, H);
                // The spire front face: two vertical lines
                const spireR0 = P(ci + 1, cj, 0);
                const spireR1 = P(ci + 1, cj, H);
                const spireL0 = P(ci, cj + 1, 0);
                const spireL1 = P(ci, cj + 1, H);

                // Draw all branches bottom to top
                for (let lev = 0; lev < H; lev++) {
                    const levBranches = branches.filter(br => br.level === lev);

                    for (const br of levBranches) {
                        const h = lev + 0.5; // mid-level height

                        // Branch base point on spire
                        const base = P(ci, cj, h);

                        // Arm endpoint
                        let tipI = ci, tipJ = cj;
                        if (br.dir === 0) tipI = ci + br.len;
                        else if (br.dir === 1) tipI = ci - br.len;
                        else if (br.dir === 2) tipJ = cj + br.len;
                        else tipJ = cj - br.len;

                        const tip = P(tipI, tipJ, h);

                        // Horizontal arm line
                        lines.push({ pts: [base, tip], w: 0.9 });

                        // Small platform cube at tip (top face + front edges)
                        const cs = 0.35; // cube half-size in grid units
                        const cubeh = 0.3; // cube height in grid units

                        const cTL  = P(tipI - cs, tipJ - cs, h + cubeh);
                        const cTR  = P(tipI + cs, tipJ - cs, h + cubeh);
                        const cTRJ = P(tipI + cs, tipJ + cs, h + cubeh);
                        const cTLJ = P(tipI - cs, tipJ + cs, h + cubeh);

                        const cBR  = P(tipI + cs, tipJ - cs, h);
                        const cBRJ = P(tipI + cs, tipJ + cs, h);
                        const cBLJ = P(tipI - cs, tipJ + cs, h);

                        // Top face of cube
                        lines.push({ pts: [cTL, cTR, cTRJ, cTLJ, cTL], w: 0.7, closed: true });
                        // Front right vertical edge
                        lines.push({ pts: [cTR, cBR], w: 0.6 });
                        // Front left vertical edge (j side)
                        lines.push({ pts: [cTLJ, cBLJ], w: 0.6 });
                        // Bottom edge of right face
                        lines.push({ pts: [cBR, cBRJ], w: 0.5 });
                        lines.push({ pts: [cBRJ, cBLJ], w: 0.5 });

                        // Horizontal hatch lines on right face (subtle)
                        for (let hs = 0.05; hs < cubeh; hs += 0.1) {
                            lines.push({ pts: [
                                P(tipI + cs, tipJ - cs, h + hs),
                                P(tipI + cs, tipJ + cs, h + hs)
                            ], w: 0.35 });
                        }
                    }

                    // Spine segment at this level
                    const segBot = P(ci + 1, cj, lev);
                    const segTop = P(ci + 1, cj, lev + 1);
                    lines.push({ pts: [segBot, segTop], w: 0.8 });
                    const segBotL = P(ci, cj + 1, lev);
                    const segTopL = P(ci, cj + 1, lev + 1);
                    lines.push({ pts: [segBotL, segTopL], w: 0.8 });
                }

                // Spire top cap
                const capTL  = P(ci,     cj,     H);
                const capTR  = P(ci + 1, cj,     H);
                const capTRJ = P(ci + 1, cj + 1, H);
                const capTLJ = P(ci,     cj + 1, H);
                lines.push({ pts: [capTL, capTR, capTRJ, capTLJ, capTL], w: 1.0, closed: true });
                // Front edge at top
                lines.push({ pts: [capTR, capTRJ], w: 0.8 });

                // Bottom horizontal lines of spire (base)
                const baseR0 = P(ci + 1, cj,     0);
                const baseR1 = P(ci + 1, cj + 1, 0);
                const baseL1 = P(ci,     cj + 1, 0);
                lines.push({ pts: [baseR0, baseR1], w: 0.7 });
                lines.push({ pts: [baseR1, baseL1], w: 0.7 });

                return lines;
            }

            function frame() {
                if (api.cancelled()) return;
                for (let s = 0; s < 30 && stepsDone < values.steps; s++) {
                    simStep(); stepsDone++;
                }
                preview();
                if (stepsDone < values.steps) {
                    api.status("Simuliere… " + stepsDone + " / " + values.steps);
                    requestAnimationFrame(frame);
                } else {
                    api.status("Baue Turm…");
                    requestAnimationFrame(() => {
                        if (api.cancelled()) return;
                        const lines = buildSpire();
                        api.status("Turing-Spire — " + lines.length + " Pfade · f=" + values.f + " k=" + values.k);
                        api.done(lines);
                    });
                }
            }

            requestAnimationFrame(frame);
        }
    });
    </script>
</body>
</html>
