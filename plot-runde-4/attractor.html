<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strange Attractor — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>4 · Strange Attractor</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">De-Jong- und Clifford-Attraktoren: Eine simple
            nichtlineare Formel wird tausendfach iteriert, die Bahn als eine
            einzige durchgehende Polylinie verbunden — ein seidiges
            Liniengewebe aus vier Parametern. „Neu" würfelt neue Parameter.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "attraktor",
        svgOpts: { width: 0.5 },
        drawOpts: { width: 0.7, stroke: "rgba(22,33,62,0.45)" },
        params: [
            { key: "type", label: "Typ", value: "dejong", options: [
                { value: "dejong", label: "De Jong" },
                { value: "clifford", label: "Clifford" }
            ]},
            { key: "a", label: "a", min: -2.5, max: 2.5, step: 0.01, value: 1.4 },
            { key: "b", label: "b", min: -2.5, max: 2.5, step: 0.01, value: -2.3 },
            { key: "c", label: "c", min: -2.5, max: 2.5, step: 0.01, value: 2.4 },
            { key: "d", label: "d", min: -2.5, max: 2.5, step: 0.01, value: -2.1 },
            { key: "points", label: "Punkte", min: 500, max: 10000, step: 250, value: 3000 }
        ],
        onRegen(rnd, params, values) {
            // roll parameters until they produce a real attractor (no collapse)
            const dejong = values.type === "dejong";
            for (let attempt = 0; attempt < 50; attempt++) {
                const a = Math.round((rnd() * 5 - 2.5) * 100) / 100;
                const b = Math.round((rnd() * 5 - 2.5) * 100) / 100;
                const c = Math.round((rnd() * 5 - 2.5) * 100) / 100;
                const d = Math.round((rnd() * 5 - 2.5) * 100) / 100;
                let x = 0.1, y = 0.1;
                let minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
                const cells = new Set();
                for (let i = 0; i < 1200; i++) {
                    const nx = dejong ? Math.sin(a * y) - Math.cos(b * x)
                                      : Math.sin(a * y) + c * Math.cos(a * x);
                    const ny = dejong ? Math.sin(c * x) - Math.cos(d * y)
                                      : Math.sin(b * x) + d * Math.cos(b * y);
                    x = nx; y = ny;
                    if (i >= 100) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                        // quantized cell occupancy detects periodic orbits
                        cells.add(Math.round(x * 12) + ":" + Math.round(y * 12));
                    }
                }
                if (Math.max(maxX - minX, maxY - minY) > 1.2 && cells.size > 250) {
                    for (const p of params) {
                        if (p.key === "a") p._set(a);
                        if (p.key === "b") p._set(b);
                        if (p.key === "c") p._set(c);
                        if (p.key === "d") p._set(d);
                    }
                    return;
                }
            }
        },
        generate(api) {
            const { values } = api;
            const { a, b, c, d } = values;
            const n = values.points;
            let x = 0.1, y = 0.1;
            const raw = [];
            const dejong = values.type === "dejong";
            for (let i = 0; i < n + 100; i++) {
                let nx, ny;
                if (dejong) {
                    nx = Math.sin(a * y) - Math.cos(b * x);
                    ny = Math.sin(c * x) - Math.cos(d * y);
                } else {
                    nx = Math.sin(a * y) + c * Math.cos(a * x);
                    ny = Math.sin(b * x) + d * Math.cos(b * y);
                }
                x = nx; y = ny;
                if (i >= 100) raw.push([x, y]);
            }
            // fit to page
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (const p of raw) {
                if (p[0] < minX) minX = p[0];
                if (p[0] > maxX) maxX = p[0];
                if (p[1] < minY) minY = p[1];
                if (p[1] > maxY) maxY = p[1];
            }
            const span = Math.max(maxX - minX, maxY - minY, 1e-6);
            const scale = 900 / span;
            const ox = 500 - (minX + maxX) / 2 * scale;
            const oy = 500 - (minY + maxY) / 2 * scale;
            const pts = raw.map(p => [p[0] * scale + ox, p[1] * scale + oy]);
            if (span < 0.01) {
                api.status("Parameter kollabieren auf einen Punkt — neu würfeln!");
                api.done([[[60, 940], [940, 60]], [[60, 60], [940, 940]]]);
            } else {
                api.done([pts]);
            }
        }
    });
    </script>
</body>
</html>
