<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolam — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>55 · Kolam</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Südindisches <b>Kolam</b> (Pulli): Eine glatte Linie
            schlingt sich um ein <b>Punktraster</b>, ohne die Punkte zu berühren —
            klassische Schwellenkunst. Über abgerundete Truchet-Bögen entstehen
            verschlungene Schleifen; mit Symmetrie wird daraus ein Mandala.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "kolam",
        params: [
            { key: "grid", label: "Punkte je Seite", min: 5, max: 17, step: 2, value: 11 },
            { key: "symmetry", label: "Symmetrie", value: "d4", options: [
                { value: "none", label: "Frei" },
                { value: "d4", label: "4-zählig gespiegelt" },
                { value: "diag", label: "Diagonal" }
            ]},
            { key: "dots", label: "Punkte zeigen", value: "an", options: [
                { value: "an", label: "Ja" },
                { value: "aus", label: "Nein" }
            ]}
        ],
        generate(api) {
            const { rnd, values } = api;
            const lines = [];
            const N = values.grid;            // dots per side
            const cell = 820 / N;
            const M = 90;
            const dotXY = (i, j) => [M + (i + 0.5) * cell, M + (j + 0.5) * cell];

            // arc lattice points carry one of two rounded-Truchet orientations;
            // folding the orientation across the centre gives the chosen symmetry.
            const foldCache = {};
            const foldBit = (ii, jj) => {
                const k = ii + ":" + jj;
                if (!(k in foldCache)) foldCache[k] = rnd() < 0.5 ? 1 : 0;
                return foldCache[k];
            };
            const bits = [];
            for (let j = 0; j <= N; j++) {
                bits.push([]);
                for (let i = 0; i <= N; i++) {
                    if (values.symmetry === "none") { bits[j].push(rnd() < 0.5 ? 1 : 0); continue; }
                    let ii = Math.min(i, N - i), jj = Math.min(j, N - j);
                    if (values.symmetry === "diag" && ii > jj) { const t = ii; ii = jj; jj = t; }
                    bits[j].push(foldBit(ii, jj));
                }
            }

            // each lattice point between dots carries two quarter arcs (rounded Truchet)
            // grid points at G = M + i*cell (i=0..N), arcs of radius cell/2 around them
            const r = cell / 2;
            for (let j = 0; j <= N; j++) {
                for (let i = 0; i <= N; i++) {
                    const cx = M + i * cell, cy = M + j * cell;
                    const flip = bits[j][i] === 1;
                    // two opposite quarter-circles -> smooth weave around the dots
                    const quarters = flip ? [[Math.PI, 1.5 * Math.PI], [0, 0.5 * Math.PI]]
                                          : [[0.5 * Math.PI, Math.PI], [1.5 * Math.PI, 2 * Math.PI]];
                    for (const [a0, a1] of quarters) {
                        const pts = [];
                        for (let s = 0; s <= 8; s++) {
                            const a = a0 + (a1 - a0) * s / 8;
                            const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
                            if (x < M - 1 || x > M + N * cell + 1 || y < M - 1 || y > M + N * cell + 1) continue;
                            pts.push([x, y]);
                        }
                        if (pts.length > 1) lines.push({ pts, w: 1.2 });
                    }
                }
            }
            // the dots
            if (values.dots === "an") {
                for (let j = 0; j < N; j++) {
                    for (let i = 0; i < N; i++) {
                        const [x, y] = dotXY(i, j);
                        const c = [];
                        for (let s = 0; s <= 8; s++) {
                            const a = s / 8 * Math.PI * 2;
                            c.push([x + 2.4 * Math.cos(a), y + 2.4 * Math.sin(a)]);
                        }
                        lines.push({ pts: c, closed: true, w: 0.7 });
                    }
                }
            }
            api.status(N + "×" + N + " Punkte · " + values.symmetry);
            api.done(lines);
        }
    });
    </script>
</body>
</html>
