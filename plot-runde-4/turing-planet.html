<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>85 · Turing-Planet — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header><a class="back" href="./">← Übersicht</a><h1>85 · Turing-Planet</h1></header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Das Gray-Scott-Turing-Muster läuft auf einer Kugeloberfläche — biologische Flecken und Labyrinthe als Planetentextur, orthografisch projiziert.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "turing-planet",
        params: [
            { key: "f",       label: "Feed-Rate",          min: 0.025, max: 0.075, step: 0.001,  value: 0.055 },
            { key: "k",       label: "Kill-Rate",           min: 0.055, max: 0.067, step: 0.0005, value: 0.062 },
            { key: "steps",   label: "Simulationsschritte", min: 400,   max: 3000,  step: 200,    value: 1600 },
            { key: "rings",   label: "Konturringe",         min: 3,     max: 10,    step: 1,      value: 5 },
            { key: "radius",  label: "Kugel-Radius",        min: 300,   max: 460,   step: 10,     value: 400 },
            { key: "azimuth", label: "Azimut",              min: 0,     max: 360,   step: 5,      value: 30 },
            { key: "tilt",    label: "Neigung",             min: -90,   max: 90,    step: 5,      value: 20 }
        ],
        generate(api) {
            const { rnd, values } = api;

            // --- Gray-Scott simulation ---
            const N = 64;
            const A  = new Float32Array(N * N).fill(1);
            const B  = new Float32Array(N * N);
            const A2 = new Float32Array(N * N);
            const B2 = new Float32Array(N * N);

            // seed random patches of chemical B
            const patches = 4 + Math.floor(rnd() * 5);
            for (let p = 0; p < patches; p++) {
                const cx = 8 + Math.floor(rnd() * (N - 16));
                const cy = 8 + Math.floor(rnd() * (N - 16));
                for (let dy = -3; dy <= 3; dy++) {
                    for (let dx = -3; dx <= 3; dx++) {
                        const idx = (cy + dy) * N + (cx + dx);
                        if (idx >= 0 && idx < N * N) B[idx] = 1;
                    }
                }
            }

            const f = values.f, k = values.k, DA = 1.0, DB = 0.5;
            let a = A, b = B, a2 = A2, b2 = B2;

            function simStep() {
                for (let y = 1; y < N - 1; y++) {
                    for (let x = 1; x < N - 1; x++) {
                        const i = y * N + x;
                        const av = a[i], bv = b[i];
                        const lapA = 0.2 * (a[i-1] + a[i+1] + a[i-N] + a[i+N])
                                   + 0.05 * (a[i-N-1] + a[i-N+1] + a[i+N-1] + a[i+N+1]) - av;
                        const lapB = 0.2 * (b[i-1] + b[i+1] + b[i-N] + b[i+N])
                                   + 0.05 * (b[i-N-1] + b[i-N+1] + b[i+N-1] + b[i+N+1]) - bv;
                        const abb = av * bv * bv;
                        a2[i] = av + (DA * lapA - abb + f * (1 - av));
                        b2[i] = bv + (DB * lapB + abb - (f + k) * bv);
                    }
                }
                const tmp = a; a = a2; a2 = tmp;
                const tmp2 = b; b = b2; b2 = tmp2;
            }

            // preview during simulation
            const off = document.createElement("canvas");
            off.width = N; off.height = N;
            const offCtx = off.getContext("2d");
            function preview() {
                const img = offCtx.createImageData(N, N);
                for (let i = 0; i < N * N; i++) {
                    const v = Math.max(0, Math.min(255, 255 - b[i] * 600));
                    img.data[i * 4] = v; img.data[i * 4 + 1] = v;
                    img.data[i * 4 + 2] = v; img.data[i * 4 + 3] = 255;
                }
                offCtx.putImageData(img, 0, 0);
                const canvas = document.getElementById("canvas");
                const ctx = PR4.fitCanvas(canvas);
                ctx.fillStyle = "#fff";
                ctx.fillRect(0, 0, PR4.SIZE, PR4.SIZE);
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(off, 40, 40, 920, 920);
            }

            let stepsDone = 0;

            function buildPlanet() {
                // find max of B field
                let bMax = 0;
                for (let i = 0; i < N * N; i++) if (b[i] > bMax) bMax = b[i];
                if (bMax < 1e-6) bMax = 1;

                const az = values.azimuth * Math.PI / 180;
                const tl = values.tilt    * Math.PI / 180;
                const R  = values.radius;

                // rotation matrices: first rotate around z-axis by azimuth,
                // then rotate around x-axis by tilt
                function rotatePoint(px, py, pz) {
                    // azimuth around z-axis
                    const rx = px * Math.cos(az) - py * Math.sin(az);
                    const ry = px * Math.sin(az) + py * Math.cos(az);
                    const rz = pz;
                    // tilt around x-axis
                    const fx = rx;
                    const fy = ry * Math.cos(tl) - rz * Math.sin(tl);
                    const fz = ry * Math.sin(tl) + rz * Math.cos(tl);
                    return [fx, fy, fz];
                }

                // map grid coordinates to 3D sphere point
                function gridToSphere(gx, gy) {
                    const theta = (gx / N) * 2 * Math.PI;
                    const phi   = (gy / N) * Math.PI;
                    const px = Math.sin(phi) * Math.cos(theta);
                    const py = Math.sin(phi) * Math.sin(theta);
                    const pz = Math.cos(phi);
                    return rotatePoint(px, py, pz);
                }

                // orthographic projection
                function project(rp) {
                    return [500 + rp[0] * R, 500 - rp[2] * R];
                }

                const lines = [];

                // Sphere outline circle
                const circPts = [];
                for (let i = 0; i <= 80; i++) {
                    const ang = (i / 80) * 2 * Math.PI;
                    circPts.push([500 + R * Math.cos(ang), 500 + R * Math.sin(ang)]);
                }
                lines.push({ pts: circPts, w: 1.0, closed: true });

                // Extract contour lines at multiple thresholds
                const rings = values.rings;
                for (let ri = 1; ri <= rings; ri++) {
                    const t = (ri / (rings + 1)) * bMax;

                    // Use PR4.contourLines on the flat grid
                    const contours = PR4.contourLines(
                        (ix, iy) => b[iy * N + ix],
                        N, N, t,
                        (ix) => ix,  // return raw grid coords
                        (iy) => iy
                    );

                    // Map each contour polyline to sphere
                    for (const contour of contours) {
                        // Split into segments where back-hemisphere transitions occur
                        let seg = [];
                        for (const [gx, gy] of contour) {
                            const rp = gridToSphere(gx, gy);
                            if (rp[1] < -0.05) {
                                // Back hemisphere — break segment
                                if (seg.length >= 2) {
                                    lines.push({ pts: seg, w: 0.7 });
                                }
                                seg = [];
                            } else {
                                seg.push(project(rp));
                            }
                        }
                        if (seg.length >= 2) {
                            lines.push({ pts: seg, w: 0.7 });
                        }
                    }
                }

                return lines;
            }

            function frame() {
                if (api.cancelled()) return;
                for (let s = 0; s < 30 && stepsDone < values.steps; s++) {
                    simStep(); stepsDone++;
                }
                preview();
                if (stepsDone < values.steps) {
                    api.status("Simuliere… " + stepsDone + " / " + values.steps);
                    requestAnimationFrame(frame);
                } else {
                    api.status("Projiziere auf Kugel…");
                    requestAnimationFrame(() => {
                        if (api.cancelled()) return;
                        const lines = buildPlanet();
                        if (lines.length <= 1) {
                            api.status("Muster ausgestorben — andere f/k-Werte probieren");
                            api.done([{ pts: [[40,40],[960,40],[960,960],[40,960],[40,40]], w: 1.2 }]);
                        } else {
                            api.status("Turing-Planet — " + lines.length + " Pfade · f=" + values.f + " k=" + values.k);
                            api.done(lines);
                        }
                    });
                }
            }

            requestAnimationFrame(frame);
        }
    });
    </script>
</body>
</html>
