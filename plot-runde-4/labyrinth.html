<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theta-Labyrinth — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>8 · Theta-Labyrinth</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Kreisförmiges Labyrinth auf einem Polargitter
            (Recursive Backtracker): Ring-Gänge werden nach außen feiner
            unterteilt, damit die Zellen gleich groß bleiben. Eingang in der
            Mitte, Ausgang am Rand — ein Mandala zum Plotten und Lösen.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "theta-labyrinth",
        params: [
            { key: "rings", label: "Ringe", min: 5, max: 22, step: 1, value: 13 },
            { key: "sectors", label: "Startsektoren", min: 4, max: 16, step: 1, value: 8 },
            { key: "twist", label: "Verdrehung", min: 0, max: 360, step: 5, value: 0 }
        ],
        generate(api) {
            const { rnd, values } = api;
            const CX = 500, CY = 500;
            const rings = values.rings;
            const r0 = 70, rOut = 470;
            const ringW = (rOut - r0) / rings;
            const radius = (i) => r0 + i * ringW;
            const twist = values.twist * Math.PI / 180;

            // cells per ring: double when arcs get too wide
            const counts = [values.sectors];
            for (let i = 1; i < rings; i++) {
                const arc = 2 * Math.PI * radius(i) / counts[i - 1];
                counts.push(counts[i - 1] * (arc > ringW * 1.7 ? 2 : 1));
            }

            const passages = new Set();
            const pkey = (a, b) => {
                const k1 = a[0] + "." + a[1], k2 = b[0] + "." + b[1];
                return k1 < k2 ? k1 + "|" + k2 : k2 + "|" + k1;
            };

            function neighbors(i, j) {
                const out = [];
                const c = counts[i];
                out.push([i, (j + 1) % c]);
                out.push([i, (j - 1 + c) % c]);
                if (i > 0) {
                    const ratio = counts[i] / counts[i - 1];
                    out.push([i - 1, Math.floor(j / ratio)]);
                }
                if (i < rings - 1) {
                    const ratio = counts[i + 1] / counts[i];
                    if (ratio === 1) out.push([i + 1, j]);
                    else { out.push([i + 1, 2 * j]); out.push([i + 1, 2 * j + 1]); }
                }
                return out;
            }

            // recursive backtracker over the polar grid
            const visited = counts.map(c => new Uint8Array(c));
            const stack = [[0, Math.floor(rnd() * counts[0])]];
            visited[0][stack[0][1]] = 1;
            while (stack.length) {
                const cur = stack[stack.length - 1];
                const unvis = neighbors(cur[0], cur[1]).filter(nb => !visited[nb[0]][nb[1]]);
                if (unvis.length === 0) { stack.pop(); continue; }
                const nb = unvis[Math.floor(rnd() * unvis.length)];
                passages.add(pkey(cur, nb));
                visited[nb[0]][nb[1]] = 1;
                stack.push(nb);
            }

            const lines = [];
            function arc(r, a0, a1) {
                const steps = Math.max(4, Math.ceil(r * Math.abs(a1 - a0) / 7));
                const pts = [];
                for (let s = 0; s <= steps; s++) {
                    const a = a0 + (a1 - a0) * s / steps + twist;
                    pts.push([CX + r * Math.cos(a), CY + r * Math.sin(a)]);
                }
                return pts;
            }
            function radial(angle, rIn, rOutr) {
                const a = angle + twist;
                return [[CX + rIn * Math.cos(a), CY + rIn * Math.sin(a)],
                        [CX + rOutr * Math.cos(a), CY + rOutr * Math.sin(a)]];
            }

            // radial walls within each ring
            for (let i = 0; i < rings; i++) {
                const c = counts[i];
                for (let j = 0; j < c; j++) {
                    if (!passages.has(pkey([i, j], [i, (j + 1) % c]))) {
                        lines.push(radial(2 * Math.PI * (j + 1) / c, radius(i), radius(i + 1)));
                    }
                }
            }
            // arc walls between rings (use the finer outer ring's divisions)
            for (let i = 0; i < rings - 1; i++) {
                const ratio = counts[i + 1] / counts[i];
                const cOut = counts[i + 1];
                for (let k = 0; k < cOut; k++) {
                    const j = Math.floor(k / ratio);
                    if (!passages.has(pkey([i, j], [i + 1, k]))) {
                        lines.push(arc(radius(i + 1), 2 * Math.PI * k / cOut, 2 * Math.PI * (k + 1) / cOut));
                    }
                }
            }
            // inner boundary with entrance, outer boundary with exit
            const entrance = Math.floor(rnd() * counts[0]);
            for (let j = 0; j < counts[0]; j++) {
                if (j === entrance) continue;
                lines.push(arc(r0, 2 * Math.PI * j / counts[0], 2 * Math.PI * (j + 1) / counts[0]));
            }
            const exit = Math.floor(rnd() * counts[rings - 1]);
            for (let j = 0; j < counts[rings - 1]; j++) {
                if (j === exit) continue;
                lines.push(arc(rOut, 2 * Math.PI * j / counts[rings - 1], 2 * Math.PI * (j + 1) / counts[rings - 1]));
            }
            // a dot marking the center room
            const dot = [];
            for (let s = 0; s <= 20; s++) {
                const a = s / 20 * Math.PI * 2;
                dot.push([CX + 6 * Math.cos(a), CY + 6 * Math.sin(a)]);
            }
            lines.push({ pts: dot, closed: true });
            api.done(lines);
        }
    });
    </script>
</body>
</html>
