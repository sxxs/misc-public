<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaktions-Topografie — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>59 · Reaktions-Topografie</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Das Gray-Scott-Reaktions-Diffusions-Feld wird als <b>Höhenkarte</b> gelesen: Spots werden Hügelgipfel, Labyrinthe werden Täler — gezeichnet als topografische Isokonturen wie auf einer Landkarte.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "rd-topo",
        svgOpts: { width: 1.0 },
        drawOpts: { width: 1.3 },
        params: [
            { key: "f", label: "Feed-Rate", min: 0.025, max: 0.075, step: 0.001, value: 0.055 },
            { key: "k", label: "Kill-Rate", min: 0.055, max: 0.067, step: 0.0005, value: 0.062 },
            { key: "steps", label: "Schritte", min: 800, max: 4000, step: 200, value: 2400 },
            { key: "bands", label: "Höhenbänder", min: 4, max: 14, step: 1, value: 8 },
            { key: "style", label: "Stil", value: "topo", options: [
                { value: "topo", label: "Topografisch" },
                { value: "relief", label: "Relieflinien" }
            ]}
        ],
        generate(api) {
            const { rnd, values } = api;
            const N = 128, M = 40, S = 920;
            const A = new Float32Array(N * N).fill(1);
            const B = new Float32Array(N * N);
            const A2 = new Float32Array(N * N);
            const B2 = new Float32Array(N * N);

            // seed random patches of chemical B
            const patches = 5 + Math.floor(rnd() * 4);
            for (let p = 0; p < patches; p++) {
                const cx = 15 + Math.floor(rnd() * (N - 30));
                const cy = 15 + Math.floor(rnd() * (N - 30));
                for (let y = -3; y <= 3; y++) {
                    for (let x = -3; x <= 3; x++) {
                        B[(cy + y) * N + cx + x] = 1;
                    }
                }
            }

            const f = values.f, k = values.k, DA = 1.0, DB = 0.5;
            let a = A, b = B, a2 = A2, b2 = B2;

            function simStep() {
                for (let y = 1; y < N - 1; y++) {
                    for (let x = 1; x < N - 1; x++) {
                        const i = y * N + x;
                        const av = a[i], bv = b[i];
                        const lapA = 0.2 * (a[i - 1] + a[i + 1] + a[i - N] + a[i + N]) +
                            0.05 * (a[i - N - 1] + a[i - N + 1] + a[i + N - 1] + a[i + N + 1]) - av;
                        const lapB = 0.2 * (b[i - 1] + b[i + 1] + b[i - N] + b[i + N]) +
                            0.05 * (b[i - N - 1] + b[i - N + 1] + b[i + N - 1] + b[i + N + 1]) - bv;
                        const abb = av * bv * bv;
                        a2[i] = av + (DA * lapA - abb + f * (1 - av));
                        b2[i] = bv + (DB * lapB + abb - (f + k) * bv);
                    }
                }
                const t = a; a = a2; a2 = t;
                const t2 = b; b = b2; b2 = t2;
            }

            // grayscale preview during simulation
            const off = document.createElement("canvas");
            off.width = N; off.height = N;
            const offCtx = off.getContext("2d");
            function preview() {
                const img = offCtx.createImageData(N, N);
                for (let i = 0; i < N * N; i++) {
                    const v = Math.max(0, Math.min(255, 255 - b[i] * 600));
                    img.data[i * 4] = v; img.data[i * 4 + 1] = v;
                    img.data[i * 4 + 2] = v; img.data[i * 4 + 3] = 255;
                }
                offCtx.putImageData(img, 0, 0);
                const canvas = document.getElementById("canvas");
                const ctx = PR4.fitCanvas(canvas);
                ctx.fillStyle = "#fff";
                ctx.fillRect(0, 0, PR4.SIZE, PR4.SIZE);
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(off, M, M, S, S);
            }

            let stepsDone = 0;
            function frame() {
                if (api.cancelled()) return;
                for (let s = 0; s < 40 && stepsDone < values.steps; s++) {
                    simStep(); stepsDone++;
                }
                preview();
                if (stepsDone < values.steps) {
                    api.status("Simuliere… " + stepsDone + " / " + values.steps);
                    requestAnimationFrame(frame);
                } else {
                    // find min/max of B field
                    let bMin = Infinity, bMax = -Infinity;
                    for (let i = 0; i < N * N; i++) {
                        if (b[i] < bMin) bMin = b[i];
                        if (b[i] > bMax) bMax = b[i];
                    }
                    const range = bMax - bMin;
                    if (range < 1e-6) {
                        api.status("Muster ausgestorben — andere f/k-Werte probieren");
                        api.done([{ pts: [[M, M], [M + S, M], [M + S, M + S], [M, M + S], [M, M]], w: 1.2 }]);
                        return;
                    }

                    const lines = [];
                    const mapC = (v) => M + v * (S / (N - 1));

                    if (values.style === "topo") {
                        // topographic contour lines at evenly spaced thresholds
                        const numBands = values.bands;
                        for (let bi = 0; bi < numBands; bi++) {
                            const t = bMin + range * (bi + 0.5) / numBands;
                            const cs = PR4.contourLines(
                                (x, y) => b[y * N + x], N, N, t, mapC, mapC
                            );
                            const isIndex = (bi % 4 === 0);
                            // higher thresholds (inner contours / peaks) get bolder lines
                            const heightFactor = (bi + 1) / numBands;
                            const w = isIndex ? 1.4 : 0.5 + heightFactor * 0.6;
                            for (const c of cs) lines.push({ pts: c, w });
                        }
                    } else {
                        // relief style: horizontal scanlines displaced by B field
                        const lineCount = 60;
                        for (let li = 0; li < lineCount; li++) {
                            const gy = Math.round(li / (lineCount - 1) * (N - 1));
                            const pts = [];
                            for (let gx = 0; gx < N; gx++) {
                                const bv = b[gy * N + gx];
                                // normalize bv to [0,1]
                                const bn = (bv - bMin) / range;
                                const x = M + gx * (S / (N - 1));
                                const y = M + li * (S / lineCount) - bn * 80;
                                pts.push([x, y]);
                            }
                            lines.push({ pts, w: 0.7 });
                        }
                    }

                    // frame
                    lines.push({ pts: [[M, M], [M + S, M], [M + S, M + S], [M, M + S]], closed: true, w: 1.2 });

                    api.status("Fertig — " + lines.length + " Linien · f=" + values.f + " k=" + values.k);
                    api.done(lines);
                }
            }
            requestAnimationFrame(frame);
        }
    });
    </script>
</body>
</html>
