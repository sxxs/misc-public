<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Die Welle — Plot Runde 4</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <header>
        <a class="back" href="./">← Übersicht</a>
        <h1>28 · Die Welle</h1>
    </header>
    <main>
        <section class="paper"><canvas id="canvas"></canvas></section>
        <section class="panel">
            <div id="controls"></div>
            <div class="buttons">
                <button id="regen" class="primary">🎲 Neu</button>
                <button id="download">⬇ SVG</button>
            </div>
            <p id="status" class="status"></p>
            <p class="hint">Hommage an Hokusais Große Welle: Eine brechende Welle
            aus geschichteten Strömungslinien, die in eine <b>Gischt-Spirale</b>
            einrollen, mit Schaumklauen an der Kante. Dahinter Sonne und Berg —
            japanische Holzschnitt-Ästhetik aus reinen Plotterlinien.</p>
        </section>
    </main>
    <script src="shared.js"></script>
    <script src="app.js"></script>
    <script>
    "use strict";
    PR4App({
        svgName: "welle",
        params: [
            { key: "layers", label: "Wellenlinien", min: 8, max: 24, step: 1, value: 15 },
            { key: "curl", label: "Einrollung", min: 0.6, max: 1.6, step: 0.05, value: 1.1 },
            { key: "claws", label: "Schaumklauen", min: 0, max: 16, step: 1, value: 9 }
        ],
        generate(api) {
            const { rnd, values } = api;
            const noise = PR4.makeNoise2D(rnd);
            const lines = [];
            const SEA = 640;                          // sea horizon
            const C = [560 + rnd() * 40, 360];        // curl center

            // sun (drawn later, clipped against the wave)
            const sunX = 815 + rnd() * 60, sunY = 165 + rnd() * 40, sunR = 62;

            // mountain (Fuji) behind the sea, right side
            {
                const mx = 770, mw = 130, mtop = 535;
                lines.push([[mx - mw, SEA], [mx - 16, mtop], [mx + 16, mtop], [mx + mw, SEA]]);
                const cap = [];
                for (let i = 0; i <= 8; i++) {
                    const u = i / 8;
                    cap.push([mx - 30 + u * 60, mtop + 20 + (i % 2 ? 8 : 0)]);
                }
                lines.push(cap);
            }

            // ---- the big curling wave ----
            // nested arcs around the curl center, opening to the lower right,
            // each flowing out left into the sea
            const N = values.layers;
            const maxR = 270;
            for (let i = 0; i < N; i++) {
                const t = i / (N - 1);
                const r = 26 + t * maxR;
                // inner arcs hook further around (the curl)
                const aStart = Math.PI * 0.52;                     // lower left
                const aEnd = -Math.PI * (0.15 + (1 - t) * 0.55 * values.curl);
                const pts = [];
                const steps = 48;
                for (let s = 0; s <= steps; s++) {
                    const a = aStart + (aEnd - aStart) * (s / steps);
                    const wob = 1 + (noise.fbm(a * 1.3 + i * 3.1, i * 0.7, 2) - 0.5) * 0.12;
                    pts.push([C[0] + r * wob * Math.cos(a), C[1] + r * wob * Math.sin(a)]);
                }
                // flow tail: from the arc start, run left into the sea
                const start = pts[0];
                const seaY = SEA + 10 + t * 240;
                const tail = [];
                for (let s = 1; s <= 30; s++) {
                    const u = s / 30;
                    const x = start[0] - u * (start[0] - 40);
                    const y = start[1] + (seaY - start[1]) * (u * u * (3 - 2 * u)) +
                        (noise.fbm(x * 0.01, i * 1.7, 2) - 0.5) * 18;
                    tail.push([x, y]);
                }
                lines.push(tail.reverse().concat(pts));
            }
            // foam claws along the outer rim of the curl (upper right edge)
            for (let k = 0; k < values.claws; k++) {
                const t = k / Math.max(1, values.claws - 1);
                const baseA = -1.45 + t * 1.15;            // upper-right rim
                const r = 26 + maxR + 6;
                const bx = C[0] + r * Math.cos(baseA);
                const by = C[1] + r * Math.sin(baseA);
                const len = 14 + rnd() * 18;
                const claw = [];
                for (let s = 0; s <= 8; s++) {
                    const u = s / 8;
                    const a = baseA + 0.4 + u * 1.9;       // hook curls down into the hollow
                    const rr = len * (1 - u * 0.7);
                    claw.push([bx + rr * Math.cos(a), by + rr * Math.sin(a)]);
                }
                lines.push(claw);
            }
            // sun, clipped where the wave body is
            {
                let run = null;
                for (let i = 0; i <= 80; i++) {
                    const a = i / 80 * Math.PI * 2;
                    const x = sunX + sunR * Math.cos(a), y = sunY + sunR * Math.sin(a);
                    if (Math.hypot(x - C[0], y - C[1]) > 26 + maxR + 30) {
                        if (!run) run = [];
                        run.push([x, y]);
                    } else if (run) {
                        if (run.length > 1) lines.push({ pts: run, w: 1.4 });
                        run = null;
                    }
                }
                if (run && run.length > 1) lines.push({ pts: run, w: 1.4 });
            }

            // sea: undulating lines to the right of / behind the wave
            for (let row = 0; row < 9; row++) {
                const y0 = SEA + row * (300 / 9) * (0.4 + row * 0.12);
                if (y0 > 950) break;
                const pts = [];
                for (let x = 40; x <= 960; x += 6) {
                    const y = y0 + Math.sin(x * 0.02 + row * 2.2) * (3 + row * 1.6) +
                        (noise.fbm(x * 0.006, row * 3.3, 2) - 0.5) * 12;
                    // hide where the wave body is (inside the outermost arc region)
                    const d = Math.hypot(x - C[0], y - C[1]);
                    if (d < 30 + maxR + 12 && x < C[0] + 80 && y < SEA + 240) {
                        if (pts.length > 1) lines.push(pts.slice());
                        pts.length = 0;
                        continue;
                    }
                    pts.push([x, y]);
                }
                if (pts.length > 1) lines.push(pts);
            }
            // a small secondary wave bottom right
            {
                const c2 = [820, 870];
                for (let i = 0; i < 6; i++) {
                    const r = 18 + i * 13;
                    const pts = [];
                    for (let s = 0; s <= 30; s++) {
                        const a = Math.PI * 0.6 - s / 30 * Math.PI * (0.9 + (1 - i / 6) * 0.5);
                        pts.push([c2[0] + r * Math.cos(a), c2[1] + r * Math.sin(a)]);
                    }
                    lines.push(pts);
                }
            }
            api.done(lines);
        }
    });
    </script>
</body>
</html>
